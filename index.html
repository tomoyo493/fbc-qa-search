あります。\nタイチさんのレッスンは伸ばすことが多い印象なのですが、レッスンを受ける前にフォームローラーなどでほぐした方が効果的だったり安全だったりするのでしょうか？\nご教示いただけますと幸いです。\nよろしくお願い申し上げます。", "question_author": "Saki782149", "answer": "【タイチ】\nこんにちは！ご質問ありがとうございます😊\n\nおっしゃる通りで、筋肉は伸ばす前にある程度ほぐしておく方が安全で効果も出やすいです。\n筋肉や筋膜が硬いまま強くストレッチをかけると、可動域が出にくかったり、無理な負荷がかかる場合があります！\n\nそのため、軽く筋膜リリースなどでほぐしてからストレッチを行うと、可動域も出やすくなり安全に伸ばすことができます。\n\nちょうど今週、\n筋膜リリースだけをまとめた「上半身編・下半身編」のアーカイブ動画を出す予定なので、よければそちらも参考にしてみてください😊", "answer_authors": ["タイチ"], "date": "2026-03-12", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1481507001879236650", "reply_count": 1, "message_id": "1481507001879236650", "tags": ["ストレッチ", "リリース", "回答済み", "柔軟性"]}, {"question": "こんにちは！\n３月に入会しました。アーカイブの多さに驚き、試してみたい動画がたくさんあるのでこれから視聴していくのが楽しみです☺️\n\n動画を開けてみると、基本的には90分動画が多いように見受けられるのですが\n平日は帰宅時間が遅いため90分は厳しく、30〜40分ほどの時間でおさめたいのですがその場合は90分動画を途中まで出来るところまで行うのでも大丈夫でしょうか。", "question_author": "SHIORI 769046", "answer": "【タイチ】\nこんにちは！ご入会ありがとうございます😊\n\n90分動画は途中まででも全く問題ありません👌\n30〜40分できるところまで行っていただければ効果はあります。\n\nまた、\n・30分のショートクラス\n・30〜40分の毎日LIVEクラスのアーカイブ\n\nも配信しているので、そちらもぜひ活用してみてください！\n\n▼ショートクラス\nURL👇\n\nhttps://youtube.com/playlist?list=PLcR4m2aFRv09k7MjgkTi72R5j9nsFWqVp&si=hcI28ye_Yd4TPehL\n\n▼毎日LIVEクラス\nURL👇\nhttps://youtube.com/playlist?list=PLcR4m2aFRv0-QIQu_WVwN0JUahFqMblFc&si=-3C02WUSso9SJi41\n\nご自身の生活リズムに合わせて、無理なく続けて下さい👍\n今後は30分ショートクラスも増えていくのでご活用頂ければと思います！", "answer_authors": ["タイチ"], "date": "2026-03-12", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1481534760168853637", "reply_count": 1, "message_id": "1481534760168853637", "tags": ["回答済み"]}, {"question": "こんにちは！\n3月にサロンに入会し、昨日初めてライブレッスンを受講しました。\n\n基礎的な内容とのことでしたが、わたしには少し難しく、特に母指球から内ももにつながる感覚がうまく掴めませんでした😭\nまずはここを課題にしたいと思っています。\n\n昨日のレッスンのアーカイブを繰り返し行うのが良いのか、\n「初心者＆時短トレ」の動画から取り組むのが良いのか、\nもしくはおすすめのアーカイブ動画（番号など）があれば教えていただけると嬉しいです🙇🏻‍♀️\n\nよろしくお願いいたします！", "question_author": "aki821717", "answer": "【まつだ822477】\nわたしも同様に3月に入会したものです。同じくどこから手をつけていいのか迷っておりました。\n\nご教示いただけますと幸いです！みなさまよろしくお願いいたします\n\n---\n\n【タイチ】\n遅くなりました🙇‍♂️\nもしまだお悩みが解消されていないようでしたら、\n\nまずは\n・ショート動画の「月曜 足首編」\n・「下半身の筋膜リリース編」\n\nこの2つをベースにやりつつ、\n56のアーカイブを繰り返し取り組んでみてください！\n\n内ももの感覚を掴むためには、\n母指球でしっかり押せる状態を作ることがかなり重要です。\n\n足首が整ってくると、\n自然と内腿に繋がる感覚も出てくるので、\n焦らずに積み上げていきましょう！\n\n---\n\n【タイチ】\n返信遅くなりました🙇‍♂️\n\nまずは1番下にあるロードマップを参考に進めてみてください！\n\n最初は\n**STEP1：ダウンドッグ・前屈を深める**\nここからスタートがおすすめです！\n\nその後に\n**STEP2：縦開脚**\nという順番で進めていきましょう👍\n\n⸻\n\nなのでまずは、ご自身ができているモノをSTEP1から確認し\n自分の課題になるアーカイブを\n下記のページから検索して、実践するクラスを選んでみてください！\n\n📚アーカイブクラス\nhttps://www.notion.so/FBC-2b6079b8449d80a59f72f26ab6ffa417?source=copy_link\n\n⸻\n\nSTEP1を例に目安をお伝えすると\n\n・前屈 → 坐骨と踵が離れる＋膝裏が伸びる状態\n・ダウンドッグ → 坐骨がしっかり上がる＋踵が床に近づく＋膝裏が伸びる状態\n\nここを一つのゴールにして進めていきましょう！", "answer_authors": ["まつだ822477", "タイチ"], "date": "2026-03-12", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1481539839462477947", "reply_count": 3, "message_id": "1481539839462477947", "tags": ["ヨガ", "リリース", "内もも", "回答済み", "膝", "足首", "開脚", "首"]}, {"question": "3/9に入会しました。\n質問です🙇‍♀\n\n立位では、内ももに力が入っているのが正しいですか？足裏はどこに力が入っているのが正しいでしょうか？\n私は骨盤後傾、腸腰筋が弱い自覚があります。(スウェイバックです)何も考えずに姿勢を正して立つと、内ももには力が入っていません。足も母指球には体重が乗っていないようです。因みにO脚もあります。\n\nどこかですでに説明がありましたら、申し訳ありません。よろしくお願いします🙇‍♀", "question_author": "なこ642956", "answer": "", "answer_authors": [], "date": "2026-03-12", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1481631713917538344", "reply_count": 0, "message_id": "1481631713917538344", "tags": ["LIVE回答", "内もも", "姿勢", "脚の形", "腰", "腸腰筋", "骨盤"]}, {"question": "質問です🙋‍♀️\n\n母指球で踏み込むこと、内ももから母指球まで繋がってる感覚を意識することの重要性を理解したので、普段の生活から母指球で踏み込むことを意識して動いていきたいと思っています。\n\n例えば、自転車を漕ぐときにペダルを母指球で踏んで漕ぐ…みたいなことは効果的でしょうか？\n\n歩くときも母指球で踏み込むことを意識して歩いているのですが、そうするとかかとから母指球のラインだけで歩いている感覚で、もはや小指側はずっと浮いている感覚なのですが、そんな感覚で歩くのは正しいでしょうか？\n\nちなみに靴底を見てみると、外側だけが減っていたので、今までいかに小指側を重心にして歩いていたかがわかりました😅\n母指球で踏み込むことを意識して歩くと、歩くスピードも前ほど速く歩けなくなります😂", "question_author": "Hiroko256904", "answer": "【タイチ】\n返信遅くなりました🙇‍♂️\n\n3つ答えていきますね！\n\n### ❌ 小指側が浮くのはNG\n\n母指球だけで踏もうとすると、\n足の外側の安定がなくなってしまいます！\n\n足は母指球・小指球・かかとの3点で支える（トライポッド）\nこれが基本なので\n小指側も“軽く接地している状態”が正解です👍\n\n※ベタ踏みじゃなくてOK、あくまで「浮かない」が大事\n\n⸻\n\n### 🚶‍♀️ 歩き方について\n\n今の状態だと\n「母指球に寄せすぎてる」可能性があります!\n正しくはかかと → 足裏全体 → 母指球で蹴る⭕️\n\n母指球“だけ”で歩くのではなく、最後に母指球で押し出す感覚を意識してください！\n\n⸻\n\n### 🚴‍♀️ 自転車はどうか？\n\n母指球で踏むのはOKです！◎\nただしここでも同じで\n母指球“だけ”じゃなくて足裏全体で乗りつつ母指球で踏む⭕️\n\n\n### 歩くスピードが落ちるについて\n\nこれは今まで外側重心で前に進んでた”状態から正しく使おうとして“コントロールが入った状態だと思うので一時的に遅くなってるのかなと思います\n\nなので気にしなくてOKです👌", "answer_authors": ["タイチ"], "date": "2026-03-12", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1481644104789000336", "reply_count": 1, "message_id": "1481644104789000336", "tags": ["内もも", "回答済み"]}, {"question": "@みお640569 @しゅーご821968 @な551308 @yukiyuki511927 @フジ🐬822099 @おもち @MIKI458054 @Saki782149\n@SHIORI 769046 @aki821717\n@まつだ822477 @なこ642956 @Hiroko256904\n\n質問を頂きありがとうございます👍\n\n現在たくさんのご質問を頂いており、\nレッスンやサポート対応が立て込んでいるため\n返信が少し遅れてしまっています🙇‍♂️\n\n順番に必ず回答していきますので、\n今しばらくお待ち頂けると嬉しいです！", "question_author": "タイチ", "answer": "", "answer_authors": [], "date": "2026-03-12", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1481663700627750943", "reply_count": 0, "message_id": "1481663700627750943", "tags": ["LIVE回答"]}, {"question": "聞く場所が違ったらすみません。スターターキットがまだ届いていないのは普通ですか？フォーム申請ができているかどうかの確認方法はありますか？", "question_author": "Masami822552", "answer": "【なな426430】\n横から失礼します。ここでは個人情報の確認ができないでしょうし、「その他質問-問い合わせ窓口」にあるLINEから問い合わせされたほうがよいかと思います。\n\n---\n\n【Masami822552】\nありがとうございます！\n\n---\n\n【FBC運営サポート🌿】\nお問い合わせありがとうございます😊\n\nそしてLINEにご連絡いただき、ありがとうございます。\nご返信させていただきましたので、\nお手隙の際にご確認くださいませ🌿\n\n---\n\n【FBC運営サポート🌿】\nコメントいただきありがとうございます😊\n大変助かりました。", "answer_authors": ["FBC運営サポート🌿", "なな426430", "Masami822552"], "date": "2026-03-13", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1481678021210673233", "reply_count": 4, "message_id": "1481678021210673233", "tags": ["回答済み"]}, {"question": "こんにちは😃\n外側重心なので母指球で踏むことがとても難しく、意識して踏み込むと足首の内側に負担？違和感を感じます。\nこれは母指球で踏む事に慣れてないからでしょうか？\n足先も外に向きがちなので足首に負担がかかるのでしょうか？\n足先真っ直ぐ、母指球で踏み込むを意識すると内転筋が使えるようになりますか？", "question_author": "いぬみ822116", "answer": "【タイチ】\n返事遅くなりました🙏\nご相談ありがとうございます！\n\n外側重心の状態だと、いきなり母指球で踏み込もうとすると、今まで使えていなかった足首の内側や内もも側に負担や違和感が出やすいです。\nなのでその感覚自体は「使えていなかった部分を使い始めているサインの可能性が高いのですが、\n足先が外に向いたまま母指球で踏もうとすると、足首にねじれが出て負担がかかりやすくなるので、無理に踏み込むよりも、まずは足先をまっすぐに整える意識を優先してみてください！\n\nその上で、軽く母指球に体重を乗せるイメージでOKです。\n最初から強く踏み込む必要はありません。\n\n足先がまっすぐで、母指球に乗れるようになってくると、内もも（内転筋）とのつながりも徐々に感じやすくなってくると思います！\n\nまだ解決してないようであれば実践してみて下さい🙂‍↕️", "answer_authors": ["タイチ"], "date": "2026-03-13", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1481816555665756181", "reply_count": 1, "message_id": "1481816555665756181", "tags": ["内もも", "回答済み", "足首", "首"]}, {"question": "スウェイバックなので、巻き肩気味で猫背になりやすいです。\n上半身に関して、正しい立位の姿勢が知りたいです。胸を張るのではなく、肩関節を外旋させると良いということで、そのコツはつかめました。正しい姿勢もその姿勢で良いでしょうか？\n私は、何も考えずに立つと、肩関節は外旋せず、手のひらが大腿にくっつく姿勢になります😥", "question_author": "なこ642956", "answer": "", "answer_authors": [], "date": "2026-03-13", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1481863561859956797", "reply_count": 0, "message_id": "1481863561859956797", "tags": ["LIVE回答", "姿勢", "肩"]}, {"question": "初めまして、股関節の調子が悪いのを治したくて最近入会しました。\n股関節のお悩み相談をさせてください。\n\n以下、自分が今までやってきたことや現在の股関節の状態について書かせていただきますので、\nなぜ調子が悪いのか、どうすれば治るのか、おススメのアーカイブ動画など、\nタイチさんの考えを教えていただければ幸いです。\n\n\n●経緯\n趣味の卓球で柔軟性を獲得したくて、去年の３月ごろからyoutubeなどを見て独学でストレッチを開始。\n昔から全身が硬く、立位前屈は指が地面につかない、開脚前屈は骨盤が立たないレベルの柔軟性。\n股関節には何の不調もなかったが、O脚で内腿・お尻タプタプ、靴のかかとは外側だけ削れている。\n↓\nタイチさんの拮抗筋ストレッチとは真逆の考えで,力を抜いて体重をかけて無理やり伸ばすストレッチを３か月ほど続けた。\n体は少し柔らかくなり、立位前屈で指が地面につくようになったが、\nどんどん股関節の調子が悪くなり、最終的には歩くのも痛くて股関節前側を手で押さえながら小さな歩幅でしか歩けない状態に。\n他にも、モモ裏の軽い坐骨神経痛や、股関節前側のつまり感・弾発音など、様々な不調を抱えるようになる。\n↓\nその後も3か月ほど独学で股関節の状態改善を試みたがあまり改善せず。\nしばらくしてコンディショニングトレーナーの方にオンラインで相談したところ、\nストレッチによって獲得した可動域をコントロール出来ていないのが原因だと思うと言われる。\n↓\n柔軟性獲得を目的としたストレッチは一旦禁止。\nトレーナーの方から四つ這いや座位などで代償動作が出ないように股関節だけを滑らかに動かすコンディショニング等を色々教わり、５か月ほど教えてもらったメニューをこなす。\n（タイチさんのような筋力を使う動作ではなく、負荷はあまりない神経制御？を学習させるコンディショニングが主）\n↓\n現在、普通に歩けるようになり日常生活に支障が出るレベルの股関節の不調は治ったが、\nまだ日常的に股関節のハマりの悪さや違和感、ごく軽い痛みが出ることがある。\nまた、モモ裏の軽い坐骨神経痛や、股関節前側の弾発音など、様々な軽微の不調を抱える。\n\n\n●不調の原因かもしれない、特に重点的に行っていたストレッチ\n・カエルストレッチ\n・座位での股関節内旋ストレッチ\n・仰向けで脚を四の字に組む殿筋ストレッチ\n・腸腰筋ストレッチ\n・モモ裏ストレッチ\n\n\n●現在も抱えている不調\n・日常的に股関節のハマりの悪さや違和感、ごく軽い痛み。特に長時間胡坐をかいたり、デスクワークをした後になりやすい気がする。\n・殿筋ストレッチをやった直後、仰向けで強く膝を抱え込むようにしたり、そこからさらに膝を内寄せさせると股関節前側で骨がぶつかったような鋭い痛みが出ることがある\n・カエルストレッチを強くやると股関節内側付け根から大腿骨頭がずれて外れるような違和感が出ることがある\n・座位で股関節外旋を強くやるとカエルストレッチと同じく股関節内側付け根から外れるような違和感が出ることがある\n・座位で股関節内旋をやると、股関節前側に詰まり感が出たり、股関節内側付け根でズレる感じや軽い痛みを伴うバキ音が出ることがある\n\n\n●ここ4日ほどタイチさんの動画をやってみた感想など\n上記の不調になる動作・ストレッチは怖いので、ストレッチ感は控えめに感じながら拮抗筋の使い方を意識してやってみています。\n結果、特に調子が悪化するようなことはなく問題なくこなせています。\n\nタイチさんの動画で、母指球を押し出して内転筋のつながりを感じるなど、新たな感覚を感じとれるようになってきているので、\n一からストレッチをやり直すつもりで体の使い方を体得していけば、股関節の不調がもう一段階改善するのではないかと考えています。\n\nちなみに参考までにChatGPTにも相談してみたところ、\n股関節の安定性（特に殿筋など）が弱くなっている可能性があるのではと言われ、\nヒップリフトやクラムシェルなどを勧められました。\nあくまでAIなので間違っているかもですが、タイチさんの見解も聞いてみたいです。", "question_author": "股関節⭐ふちょ男822412", "answer": "", "answer_authors": [], "date": "2026-03-13", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1481888431872147590", "reply_count": 0, "message_id": "1481888431872147590", "tags": ["LIVE回答", "お尻", "ストレッチ", "内もも", "柔軟性", "痛み", "股関節", "脚の形", "腰", "腸腰筋", "膝", "開脚", "骨盤"]}, {"question": "はじめまして。\n今日ビフォー撮影会に参加する予定ですが、あらかじめ準備しておくこととかありますか？\n慣れなくてもたもたしてしまいそうで心配です😅", "question_author": "なつき822420", "answer": "【タイチ】\n初めまして！\n本日はよろしくお願いいたします😊\n\nご準備いただくものは、ヨガマットとiPhoneがあれば基本的に大丈夫です👌\nただ、スマホ以外に別端末がある場合は、2台使っていただくと撮影がしやすくなります！\n\n例\n・パソコンでZoomに参加\n・iPhoneは撮影用カメラとして使用", "answer_authors": ["タイチ"], "date": "2026-03-13", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1481958805796421714", "reply_count": 1, "message_id": "1481958805796421714", "tags": ["ヨガ", "回答済み"]}, {"question": "ありがとうございます。\niPadでzoom参加なので、iPhoneもスタンバイしておきます😄", "question_author": "なつき822420", "answer": "", "answer_authors": [], "date": "2026-03-13", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1481965000196096010", "reply_count": 0, "message_id": "1481965000196096010", "tags": ["LIVE回答"]}, {"question": "忙しいと思いますので回答はいつでも大丈夫です🙇🏻‍♀️\nレッスンを受けていてストレッチというよりは筋トレのようなキツさを感じる場面が多々あるのですがあってますでしょうか…？\n例えば、巻き肩のレッスンで手をクロスさせながら肘で丸を描くみたいな動きをしたときに、肩などが筋トレのように疲れてくる感覚です！", "question_author": "rina822081", "answer": "", "answer_authors": [], "date": "2026-03-13", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1482012252151222513", "reply_count": 0, "message_id": "1482012252151222513", "tags": ["LIVE回答", "ストレッチ", "トレーニング", "肩"]}, {"question": "こんにちは。最近入会させていただき、何もできないところからもがいております。\n\n長座の時に骨盤が立てられないです(座骨で座れない)。立てようとすると、前もも付け根に力が入ってしまいます。膝を一定曲げても解決しきれません。何から着手すればいいか教えていただけませんでしょうか。\nよろしくお願いします🙇‍♀️", "question_author": "信夫咲希", "answer": "【タイチ】\n大変お待たせしてます！\nご質問ありがとうございます🙏\n\nまず、骨盤を立てようとする時に「10の力で一気に起こす」のではなく、3〜5くらいの力でじわっと起こす意識を持ってみてください！\n前ももに力が入るのはフルパワーでアウターを使うことが原因のことが多いです！\n\n次に、長座で骨盤が立たない大きな原因は\n足裏〜ふくらはぎ〜もも裏（坐骨まで）の硬さなので\n①ダウンドッグ\n②前屈（立位）\nこのあたりのアーカイブを優先的に取り組んでみてください！\n\nその上で、\n内転筋・腸腰筋・腹横筋も一緒に使えるようにしていくと良いので上記の筋肉に関連付いたタイトルのアーカイブに取り掛かってみて下さい！\n\n続けていけば必ず変わるので、安心してコツコツ積み上げてみて下さい🙂‍↕️", "answer_authors": ["タイチ"], "date": "2026-03-14", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1482136412571828376", "reply_count": 1, "message_id": "1482136412571828376", "tags": ["ふくらはぎ", "ヨガ", "内もも", "前もも", "回答済み", "柔軟性", "腰", "腸腰筋", "膝", "骨盤"]}, {"question": "zoom待機中で画面出ません(>_<)", "question_author": "なつき822420", "answer": "【いくよ🧸763352】\nなつきさん、たぶんURLが違っています、私もさっき間違えたので😅ひとつ上の、昨日夜の投稿のURLからはいれます！\n\n---\n\n【Kyoko 765396】\n私も今日は入れず（ずっと待機中）ズームアプリをインストールし直したら入れました。", "answer_authors": ["いくよ🧸763352", "Kyoko 765396"], "date": "2026-03-14", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1482163951017136138", "reply_count": 2, "message_id": "1482163951017136138", "tags": ["回答済み"]}, {"question": "ありがとうございます", "question_author": "なつき822420", "answer": "", "answer_authors": [], "date": "2026-03-14", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1482164574919856343", "reply_count": 0, "message_id": "1482164574919856343", "tags": ["LIVE回答"]}, {"question": "本日の質疑応答zoomに質問したものをコピペします。\n\n体が硬すぎてピジョンのポーズで等で後ろ手で足が掴めません。\nアイテム使って補助の仕方をレッスン内でも都度アナウンスしていただけないでしょうか。\n\n水曜日のレッスンで右側の鼠蹊部が痛くなってしまいました。初日は痛くなくじわじわ痛くなってきて昨日はじっとしてても痛かったです。\n腸腰筋というか…恥骨筋？そんな感じがしてます。\nそんな時はやらない方がいい？もっと伸ばした方がいいですか？", "question_author": "ゆきえ821697", "answer": "【タイチ】\nお返事遅くなりました！\n\nピジョンの補助動作は、可動域チェックの時の内容ですよね？\n補助を使ったレクチャーについて、次回からしっかりアナウンスしますね！\n\nあと、鼠蹊部の痛みはその後いかがでしょうか？🤔\n今回の痛みはおそらく、\n「伸ばすこと」を優先しすぎたことが原因の可能性が高いです。\n\n大事なポイントとして\n①伸ばすことを目的にすると痛めやすい\n②必ず“収縮（使う意識）”をセットにする\n\n今回のアーカイブでいうと、\n・内転筋\n・大臀筋\nこのあたりを使いながら行うのが大切です！\n\nもしまだポーズをした時に痛くなる場合は無理に伸ばさず、\n軽めに動かす or 一度休む判断でもOKです！\n\nどのポーズで痛めたか、またできればそのポーズの状態を動画などで教えていただけたら、そこからさらに細かくお伝えできるのでおっしゃって下さい！", "answer_authors": ["タイチ"], "date": "2026-03-14", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1482181915292336159", "reply_count": 1, "message_id": "1482181915292336159", "tags": ["お尻", "ピジョン", "内もも", "回答済み", "柔軟性", "痛み", "腰", "腸腰筋"]}, {"question": "質疑応答Liveの際の質問コピペです。\n\nカエルストレッチで踵を押してお尻を収縮させる感覚が分かりません。\n踵を押さずにお尻をピクピク収縮させるのは違いますよね？\n踵で床を押すというのは、\nカエルストレッチの体勢から股関節を内転させる力の入れ方ですか？\nそれとも股関節を外旋させる力の入れ方ですか？\n\nちなみにカエルストレッチの体勢になると、踵が浮いてしまうぐらい硬いです。", "question_author": "股関節⭐ふちょ男822412", "answer": "", "answer_authors": [], "date": "2026-03-14", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1482182160495542293", "reply_count": 0, "message_id": "1482182160495542293", "tags": ["LIVE回答", "お尻", "ストレッチ", "柔軟性", "股関節"]}, {"question": "質疑応答LIVEの際の質問です⬇\n\n3ヶ月前くらいから四十肩？で右の三角筋がポーズを取ると痛いです。\nアーカイブの動画でポーズを取る時に痛くて、他の伸ばすべき箇所が伸びてるのかわからないくらいです。\nネットでは『安静に』と書かれていましたが、ストレッチやリリース等した方が良いですか？", "question_author": "shigu822107", "answer": "【タイチ】\nお返事遅くなりました！\n\n現時点でお伝えできることとしては三角筋というよりも肩関節の使い方や周りの硬さが影響している可能性が高いです！\n\nなのでまずは\n①上半身特化の筋膜リリース（肩まわり）\n②肩甲骨まわりのアーカイブ\n\nもしまだお困りのようであればここから始めてみてください！\n\nどのポーズで痛みが出るかによって対処がかなり変わるので、\nもし可能であれば実際の動き（動画）を送っていただけると、より正確にアドバイスできます！", "answer_authors": ["タイチ"], "date": "2026-03-14", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1482212025739378801", "reply_count": 1, "message_id": "1482212025739378801", "tags": ["ストレッチ", "リリース", "回答済み", "柔軟性", "痛み", "肩"]}, {"question": "本日のライブレッスンの質問です。\n角度が９０度くらいしか開かないですが、今日やったストレッチで角度も開くようになりますか？\n足前後に開いて後脚の内旋外旋するときのお尻の感覚がわかりませんでした。\nあと関係あるかわかりませんが重度のO脚です。", "question_author": "関康平", "answer": "", "answer_authors": [], "date": "2026-03-14", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1482212941284643070", "reply_count": 0, "message_id": "1482212941284643070", "tags": ["LIVE回答", "お尻", "ストレッチ", "脚の形"]}, {"question": "3／14質疑応答Liveの際の質問\n\n横開脚の時に床に手を付くと背が丸まるのでブロックを使っても良いですか？\n20分30分で出来る鼠蹊部と薄筋の硬さを取るアーカイブがあれば伺いたいです", "question_author": "Azusa765175", "answer": "【タイチ】\nお返事遅くなりました！\n\n横開脚の際に背中が丸まってしまう場合は、\nブロックを使ってOKです！\n\nむしろ、背骨は軽く反らせる（丸めない）意識が大切なので、高さを作れるブロックはかなり有効です🙆‍♂️\n\n30分ほどのアーカイブとしては\n\n・下半身の筋膜リリース（鼠蹊部）\n・30分 股関節×骨盤リセットクラス（鼠蹊部＋薄筋）\n\nこのあたりが効果的かなと思います！\nまずはリリースで緩めてから、\n動きの中で使えるようにしていく流れでやってみてください！", "answer_authors": ["タイチ"], "date": "2026-03-14", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1482213769424932894", "reply_count": 1, "message_id": "1482213769424932894", "tags": ["リリース", "回答済み", "柔軟性", "股関節", "背中", "開脚", "骨盤"]}, {"question": "3/14 レッスン質問\n\n足首を立てるとき、足首が内側にこけやすいです。真上に上げづらくて硬い感じです。\n本日のzoomレッスン時、足首をたてたまま、股関節から回す動きの時も感じました。\n改善方法あれば、教えてほしいです！", "question_author": "yume821289", "answer": "", "answer_authors": [], "date": "2026-03-14", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1482216054842331340", "reply_count": 0, "message_id": "1482216054842331340", "tags": ["LIVE回答", "柔軟性", "股関節", "足首", "首"]}, {"question": "撮影会の時に気づいたのですが、正しく立つとは、両足をどのように付けたら良いんですか？\n\n左右の足の親指をつける、左右の踵をつける、左右の足の親指と踵の両方を付けて立つ、どれが正解なんでしょうか？", "question_author": "Tako🥳", "answer": "【タイチ】\n深いテーマですね🤔\n「どれか1つが絶対の正解」ではなく、目的によって使い分けるのが正解だと思います！\nただし、正しく立つ（ニュートラル）という意味では基準があって\n\n①両足はこぶし1個分くらいの間隔\n②つま先はやや正面〜ほんの少し外\n③体重は母指球・小指球・かかとの3点に均等\n\nこれが撮影時に意識させたい立ち方です！\n\nそれぞれの立ち方の意味は\n\n① 親指〜かかとをつける\n\n・内もも（内転筋）を使いやすい\n・骨盤が安定しやすい\n・お尻（後部 大臀筋）を使いやすい\n\n②小指＋かかとつける\n\n・お尻(中臀筋)を使いやすい\n安定しやすくなる\n\nただしこれをずっお日常で意識するのは難しい+逆にロボットのようにカチカチになるので\n\n・股関節がロックされ、骨盤が動きにくくなる\n・無意識にどこかに力が入る\n\nなので正解は1つじゃなく\n目的で使い分けることが大切です！", "answer_authors": ["タイチ"], "date": "2026-03-14", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1482217113903960115", "reply_count": 1, "message_id": "1482217113903960115", "tags": ["お尻", "内もも", "回答済み", "股関節", "骨盤"]}, {"question": "ビフォー撮影会に参加しました。\n全身、絶望的な柔軟性のなさでした😂\n\n撮影会での19種類のポーズについて質問です。\nそれぞれのポーズの柔らかさにつながるおすすめの動画（アーカイブ番号など）があれば教えていただくことは可能でしょうか？🙇🏻‍♀️\n\n動画がとても豊富で、どれを選んで取り組めばよいのか悩んでしまって…💦\nまずは教えていただいたものから取り組みたいと思っています！\n\n伸びしろしかないと思って、コツコツ頑張ります！\n何卒よろしくお願いいたします✨", "question_author": "aki821717", "answer": "【タイチ】\nお返事遅くなりました🙇‍♂️  \n撮影会ご参加ありがとうございました！\n\nまず大前提として、全部を一気に改善しようとするよりも「順番」がすごく大事だと思っています😊\n\nおすすめの流れは\n\n① ダウンドッグ・前屈  \n② 縦開脚  \n③ 後屈（ブリッジ・ピジョン）  \n④ 横開脚  \n⑤ Y字・倒立系\n\nです！\n\nアーカイブも、まずはその順番でタイトル通りに進めていただければ大丈夫です🙆‍♂️\n\n特に最初は  \n「ダウンドッグ」「前屈」「股関節×骨盤リセット」系を中心に進めていくのがおすすめです✨\n\nそしてクラス中でもお伝えしていますが、最初のダウンドッグ・前屈では  \n腸腰筋、内転筋、腹筋のインナーがかなり重要になります！\n\n要は、\n・伸びる部位の“拮抗筋”を鍛えること  \n・伸びる部位自体も鍛えること\n\nこの両方が必要です🔥\nなので、ふくらはぎ・もも裏のトレーニングも合わせて行っていくとかなり変わりやすいと思います😊\n\n今ちょうど、この順番で進められるロードマップも準備中なので、完成したらぜひ参考にして下さい🙂‍↕️", "answer_authors": ["タイチ"], "date": "2026-03-14", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1482225664869535766", "reply_count": 1, "message_id": "1482225664869535766", "tags": ["ふくらはぎ", "トレーニング", "ピジョン", "ヨガ", "内もも", "回答済み", "柔軟性", "股関節", "腰", "腸腰筋", "開脚", "骨盤"]}, {"question": "3/14の股関節特化 開脚クラスの質問です\n\n開脚して前に倒れようとすると、左側のお尻と腿の境目(横側)が痛すぎてそれ以上倒れることができません😢\n右脚の痛みはないので左右差があるのだと思いますが、この場合はどこにアプローチするのがいいでしょうか？", "question_author": "あみ_782401", "answer": "【タイチ】\nお返事遅くなりました🙇‍♂️\n\n左右差がある場合、原因としては\n\n・左足の内腿が使えていない  \n・左足首が90度になっていない  \n・左股関節の内旋が足りていない  \n・もも裏の筋力不足\n\nこの辺りが考えられるかなと思います😊\n\n特に足首90度はすぐ取り組める内容なので、まずそこから意識してみてください！\n\nそれでも改善しない場合は、開脚中に  \n「脚を閉じようとする力」を軽く入れてみて下さい！\n\nイメージとしては、\n1〜10で表した時の “5” くらいの力感です！\n\n内腿が使えるようになると、痛みが減るケースはかなり多いので一度実践下さい！\n\n---\n\n【あみ_782401】\nタイチさん、返信ありがとうございます‼️\n\n足首90度は自分でできてるつもりでしたが前に倒れているとじわじわ足首が緩んでいることがわかったのでまずは90度を意識してみたいと思います。\n内腿も弱い自覚があるのでそこも使えるよう意識してみます😊", "answer_authors": ["あみ_782401", "タイチ"], "date": "2026-03-14", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1482351077117661185", "reply_count": 2, "message_id": "1482351077117661185", "tags": ["お尻", "回答済み", "痛み", "股関節", "足首", "開脚", "首"]}, {"question": "@everyone \n\n## 【質疑応答LIVEのアーカイブ配信】\n\nこんばんは🌃\n本日の質疑応答LIVEを配信します👇\n\nご自身の質問への回答はもちろん、\n「他の人の質問を聞いて、自分の悩みも解決できた！」という声も多く届いています✨\n\n1人では気づけなかった発見や、\n体をより良く動かすためのヒントがたくさん詰まっています!\n\n### 🧘‍♀️ぜひお好きなタイミングでご視聴ください👇\n\nhttps://youtube.com/playlist?list=PLcR4m2aFRv08oIfu4XDuPeuKs6X6udpj4&si=iagb0hGRd1Hq4I3v", "question_author": "タイチ", "answer": "", "answer_authors": [], "date": "2026-03-14", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1482352835655110831", "reply_count": 0, "message_id": "1482352835655110831", "tags": ["LIVE回答"]}, {"question": "いつもありがとうございます😊\n脂肪燃焼ブートキャンプ🔥に登録したのですが、何もお知らせなど来ない感じですか？始まるまで待っていれば大丈夫でしょうか？", "question_author": "はる782206", "answer": "【タイチ】\nはるさん申し込みありがとうございます！\n招待されたグループに今日から発信していくので案内をお待ち下さい！✨\n\n---\n\n【はる782206】\nタイチさん、お返事ありがとうございます😊待ってます♪", "answer_authors": ["はる782206", "タイチ"], "date": "2026-03-15", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1482551860224331816", "reply_count": 2, "message_id": "1482551860224331816", "tags": ["回答済み"]}, {"question": "3月から入り、みなさんの投稿などで刺激をもらい、\n素晴らしい環境に感謝しています。ありがとうございます。\n\n今日はのんびりやろうとしていたのに、全然できず、笑っていますが、\nここで質問です。\n\n【質問】\nNo.44 骨盤の安定〜肩の開きを深める〜\nhttps://www.youtube.com/watch?v=euGjAgXFxvg\nをやっていて、\n56:55くらいからのところでですが、\n背中に効くはずが、\n①腕を耳まで上げることが全然できず、\n②背中に効かず、腰ばかりに力が入ります。\n\n現状\nかかと同士を押し合い、お尻に力は入れられるけれど、\n腕を耳の位置まで上げることが全然できず、\n上げようとすると腰に力が入る感じ。\n\n\n①②を克服するにあたって、\nどのようなトレーニングをしていったらいいですか？", "question_author": "れいこ", "answer": "【タイチ】\nお返事遅くなりました！\nご質問ありがとうございます😊\n\nまず大前提として、腕は耳の高さまで上がらなくても背中には効くので、現段階では無理に上げなくて大丈夫です！\n\nそして、いきなり “10” の力で腕を上げようとすると、かなり腰に入りやすくなります！\n\nなので今のお尻の意識はそのまま使いつつ、\nまずは「お腹を薄く保つ」ことを優先してみて下さい✨\n\nイメージとしては\n\n・恥骨を床に軽く押し付ける\n・床と下腹の間に5mmほど空間を作る\n・腰ではなく下腹とお尻で支える\n\nこの状態を保ったまま、\nまずは “3” くらいの力感で腕を上げようとしてみてください😊\n\nすると、腰ではなく「背中から腕が浮く感覚」が少し分かってくると思います！\n\nそこから徐々に\n3→5→6→7…\nと出力を上げていきながらも、\n\n「背中から上がる感覚」を優先して集中してみてください🔥\n\n続けていくと、腰を使わなくても自然と腕が耳横まで上がりやすくなってきます！", "answer_authors": ["タイチ"], "date": "2026-03-15", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1482572820121649232", "reply_count": 1, "message_id": "1482572820121649232", "tags": ["お尻", "トレーニング", "回答済み", "肩", "背中", "腰", "骨盤"]}, {"question": "タイチさん、いつもありがとうございます😊大阪マスターズむつみです。大谷さんストレッチの動作で背中周りの伸びよりも上腕の痛みの方が強いのですが何が原因だと思われますか？あまりしない動作なので結構辛いです。", "question_author": "mutsumi765027", "answer": "", "answer_authors": [], "date": "2026-03-15", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1482708214452719809", "reply_count": 0, "message_id": "1482708214452719809", "tags": ["LIVE回答", "ストレッチ", "痛み", "背中"]}, {"question": "こんばんは。昼間は介護士をしています。毎日バタバタと動き回っていますが、動きが少なく立ちっぱなしの日もあり、立ちっぱなしの日はずっと立っていると腰が痛くなってきます。若い時(ヨガやストレッチを全くしていなかった)は、立ちっぱなしだと、かかとがよく痛くなりました。2年ほど前にヨガを始めたら、かかとが痛いのはなくなりました。\n動かずずっと立ちっぱなしだと腰が痛くなるのは、身体的にどのような特徴があるからなんでしょうか？\n開脚では骨盤が立たないです。整体師さんには反り腰だと言われたことがあります。\nよろしくお願いいたします🙇", "question_author": "KozueF116", "answer": "", "answer_authors": [], "date": "2026-03-15", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1482711133075804220", "reply_count": 0, "message_id": "1482711133075804220", "tags": ["LIVE回答", "ストレッチ", "ヨガ", "姿勢", "痛み", "腰", "開脚", "骨盤"]}, {"question": "3/14股関節特化 開脚クラスで疑問に感じたことを質問させていただきます。\n\n下記の内容に対してどんなことを意識して動かすことが大事でしょうか。\n\n①    卍ポーズの深層外旋六筋トレーニングで後ろ脚の外旋する動きで前足の膝が床から離れてしまいます。床につけようとするとなかなか外旋できないのですが、どうすればよいか\n②    卍ポーズの深層外旋六筋トレーニングで内旋する動きも骨盤を開いた状態から左右平行にすることができません。どんなことを意識すればよいですか。お尻やももは内旋する意識は気を付けています\n③    開脚をして脚を内旋させるときに足首の背屈が抜けています。どのようにすれば背屈が抜けずに内旋できますか\n④    開脚したとき右足の足首が外旋方向に倒れてしまいます。原因と意識すべきところはありますか。お尻から腸腰筋、膝裏のつながりが感じずらいです", "question_author": "ひでゆき765314", "answer": "", "answer_authors": [], "date": "2026-03-15", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1482745827309912305", "reply_count": 0, "message_id": "1482745827309912305", "tags": ["LIVE回答", "お尻", "トレーニング", "股関節", "腰", "腸腰筋", "膝", "足首", "開脚", "首", "骨盤"]}, {"question": "@タイチ \nお世話になります。\n場違いな質問かもしれませんが、投稿させてください💦\n\nタイチさんは身体をどのようにして作り上げたのか知りたいです。\n\n以下質問理由↓\nタイチさんの身体に憧れています！\n（ボディビルダーのように見せる筋肉ではなく、しなやかな身体でありつつも、筋肉のラインが綺麗にあり、バランスのとれた身体）\n\nメンズですが華奢な身体がコンプレックスで、今まで、ウェイトトレーニングとピラティスを併用してトレーニングをしてきましたが、まずは筋肥大させたいという思いが勝り、アウターをがっつり使ってトレーニングをしていたので、身体が固くなっていくのを感じています。\n\nしかしこのサロンに入り、タイチさんの身体・動きをみて、しっかりと身体の厚みもあり筋肉のラインも綺麗なのに、硬さが全くないことに衝撃を受けました！\n\n一朝一夕で作り上げられた身体ではないことは、承知しておりますし、非常に失礼な質問をしているかと思います💦\n\nしかし、少しでも自分のトレーニング内容を改善したいと思い、ご質問させていただきました！", "question_author": "マキパパ328736", "answer": "", "answer_authors": [], "date": "2026-03-17", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1483244117977731103", "reply_count": 0, "message_id": "1483244117977731103", "tags": ["LIVE回答", "トレーニング", "柔軟性"]}, {"question": "ハーフスプリッドやもも裏のストレッチを説明しているアーカイブあったら教えていただきたいです！", "question_author": "q 763408", "answer": "", "answer_authors": [], "date": "2026-03-17", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1483452601251926026", "reply_count": 0, "message_id": "1483452601251926026", "tags": ["LIVE回答", "ストレッチ"]}, {"question": "30分の夜ヨガを\n動画を見ながらやったことがあるのですが、探しても探してもその動画にたどり着けなくなってしまいました(>_<)\n\nURLをご共有いただけたら大変助かります", "question_author": "Tomoyo821741", "answer": "【Kaori 763784】\nhttps://youtu.be/9LjXoJXxCYo?si=A1Oa_bejYUnfNpEB\n\nこちらでしょうか？\n\n---\n\n【Tomoyo821741】\nありがとうございます！はいこちらです✨\n大変助かりました！", "answer_authors": ["Tomoyo821741", "Kaori 763784"], "date": "2026-03-17", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1483465168225828945", "reply_count": 2, "message_id": "1483465168225828945", "tags": ["ヨガ", "回答済み"]}, {"question": "皆さん、高度な質問ばかりなのに大変申し訳ないのです。股関節はそこまで固くないのですが、手首も指も硬くて巻き肩、肩甲骨を動かしにくいなどもありますが、そもそも体力、筋力がなくてLIVEレッスン最後まで出来ないです。\n(アーカイブでも最後まで出来てないです。)\n途中でリタイアするのにLIVE参加しても大丈夫ですか？\nカメラオンにしていて途中で抜けるのも申し訳なくて、、、\n\n初心者でも出来る緩いレッスンアーカイブも教えていただけると嬉しいです。", "question_author": "poodles 388286", "answer": "", "answer_authors": [], "date": "2026-03-17", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1483467143487029308", "reply_count": 0, "message_id": "1483467143487029308", "tags": ["LIVE回答", "股関節", "肩", "首"]}, {"question": "No.52 腸腰筋を使うのレッスンで、横に両足を開脚した状態から、腸腰筋で片足ずつ上げるのが全く上がりませんでした、、。これは腸腰筋の筋力不足というよりは、上手く腸腰筋が使えていないからでしょうか？😭その前にあった片足は曲げた状態でもう片方の足を上げるのはいけました！\nお忙しいと思うのですが、いつかご助言いただけたら嬉しいです！", "question_author": "な551308", "answer": "", "answer_authors": [], "date": "2026-03-17", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1483477470782030030", "reply_count": 0, "message_id": "1483477470782030030", "tags": ["LIVE回答", "腰", "腸腰筋", "開脚"]}, {"question": "こんにちは😃\n\n自分でもびっくりするくらい、カエルのポーズがキツく😂お尻の感覚を掴むところまで全然いけません😭\n（お尻を右左動かしたいです✨）\n\nもともと身体は柔らかい方で、他のポーズは「ちょっとキツイな〜」くらいで出来るのですが…\n\nカエルのポーズだけは別格の難しさで衝撃です🥹\n\nかなり痛みもあるのですが、\n克服するにはどんな段階で進めていけば良いでしょうか？🥹🥹🥹", "question_author": "ふーみん", "answer": "", "answer_authors": [], "date": "2026-03-22", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1485174539015950437", "reply_count": 0, "message_id": "1485174539015950437", "tags": ["LIVE回答", "お尻", "痛み"]}, {"question": "レッスンの質問ではなく個人的なことの質問になります。不適でしたらすいません。\n\n先週から背骨から左肩、肩甲骨にかけて広範囲に強い張りと痛みを感じて病院を受診して肩や関節に問題がなく炎症が起こってるのではないかと言われました。\n\nその後に整体•鍼灸に行って診てもらったところ、巻き肩・ストレートネックも強く肩の辺りが浮腫みやすい骨格をしている。そして上半身は左に症状が出やすくお尻(腰)は右に出やすく、対角線上に引っ張り合ってるため左肩に集中して症状が出てるのではないかという見解をもらいました。\n\nその場合、巻き肩改善のアーカイブ以外にどのアーカイブがオススメでしょうか？\n\nむくみという視点でみると1番きつかった時は頭の先から足の先までむくみの症状(違和感とも表現されてました)が出てる状態で全体的に流れが悪いのかなという認識をしてます。", "question_author": "しのゆか765479", "answer": "", "answer_authors": [], "date": "2026-03-22", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1485229065186312344", "reply_count": 0, "message_id": "1485229065186312344", "tags": ["LIVE回答", "お尻", "痛み", "肩", "腰"]}, {"question": "@everyone\n\nこんばんは🌿\nタイチです！\n\n**これまで質問部屋でやり取りしてきた**\n**過去のQ&Aをまとめたデータベースを**\n\n**なんとサロン生が作ってくださいました👏**\n（うちのサロン生、強すぎませんか…？😂）\n\nこれまでの質問ややり取りが\n**“検索してすぐ見れる状態”**になっています！\n\n### ・前に見たあの質問なんだっけ？\n### ・同じ悩みの人はどう解決してる？\n\nこういった時にかなり役立ちます👍\n\n**今後はまずここで探していただき、**\n**それでも前例がない場合は気軽に質問ください😊**\n\nぜひ活用してください👇\nhttps://tomoyo493.github.io/fbc-qa-search/", "question_author": "タイチ", "answer": "", "answer_authors": [], "date": "2026-03-23", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1485628768293884027", "reply_count": 0, "message_id": "1485628768293884027", "tags": ["LIVE回答"]}, {"question": "2025年12月に入会した者です。\nX脚やＯ脚に悩むサロン生に特化したメニューを年末に準備しておられ、大変心待ちにしていました。\n延期された後、改めての連絡を見つけることができず、ずっと気になっていました。\nその後、進捗はどのようになっておられますか？\n質問の場が違っていたら申し訳ありません。", "question_author": "かず764793", "answer": "【タイチ】\nかずさん\n\nご連絡いただきありがとうございます！\nまた、年末から気にかけてくださっていたこと、本当に嬉しく思います。\n\nX脚・O脚に特化したメニューについてですが、\n当初出す予定だった内容から、\n「もっとこうした方がいい」という自分の中での考えが出てきて、現在もブラッシュアップを続けている状態です。\n\nその分、ご案内が遅くなってしまい申し訳ありません。\n\nただ、しっかりと変化につながる内容としてお届けしたいので、\nもう少しだけお時間をいただけると嬉しいです🙇‍♂️\n\n改めてご案内させていただきますので、楽しみにお待ちいただけたら嬉しいです。", "answer_authors": ["タイチ"], "date": "2026-03-24", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1485901052673785907", "reply_count": 1, "message_id": "1485901052673785907", "tags": ["回答済み", "脚の形"]}, {"question": "質問です。\n足をまんじの状態で深層外旋六筋を鍛えるトレーニングで大腿筋膜張筋の方に効いてしまうのですが、深層外旋六筋にきかせるにはどうしたらいいでしょうか？", "question_author": "アルム469279", "answer": "", "answer_authors": [], "date": "2026-03-26", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1486497796965011629", "reply_count": 0, "message_id": "1486497796965011629", "tags": ["LIVE回答", "トレーニング", "リリース"]}, {"question": "お世話になっております！\n上半身特化筋膜リリースを受講したのですが、ヨガブロックを使った脇全体のリリースと、ボールを使った鎖骨下・肩甲骨〜背中のリリースはなんとかできたのですが、フォームローラーに二の腕を乗せてのリリースがとてつもなく痛かったです。\n\nタイチさんの使用されているフォームローラーは突起のないものですが、私が持っているものは硬めでボコボコの突起がついています。\nリリースに使うには、突起のないもののほうがよいでしょうか？\nふくらはぎなど、自分の肉が分厚い（笑）箇所は突起のローラーが気持ち良いのですが、肉の薄いところはとても痛いです…。", "question_author": "なつみ822228", "answer": "", "answer_authors": [], "date": "2026-03-26", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1486610547922174045", "reply_count": 0, "message_id": "1486610547922174045", "tags": ["LIVE回答", "ふくらはぎ", "ヨガ", "リリース", "痛み", "肩", "背中"]}, {"question": "@sena 728493 　いつもありがとうございます✨　#毎日ショートliveレッスンのセイナさんの投稿のリクエスト&質問です✨\n\n3月26日のお尻レッスンで、ゴムバンドをつけてよつばいから足をあげるとき、お尻のどのあたりに力が入ると正解でしょうか？✴️\n\nそしてリクエストですが、セイナさんみたいに鎖骨がキレイにでるレッスンを希望したいです☺️　鎖骨が埋まってますので出したいです😣\nよろしくお願いします🍀", "question_author": "はるか154335", "answer": "", "answer_authors": [], "date": "2026-03-29", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1487732997020057722", "reply_count": 0, "message_id": "1487732997020057722", "tags": ["LIVE回答", "お尻"]}, {"question": "横開脚を目指したくて、アーカイブレッスンの横開脚関連を受講しております。1/30のno.4を受けて、股関節が動く感覚は掴めたのですが、外側太もも、膝裏が固くて股抜きができません。。横開脚に必要な柔軟を高めたいのですが、オススメのアーカイブレッスンはどちらになりますでしょうか。よろしくお願い致します。", "question_author": "RIE822458", "answer": "", "answer_authors": [], "date": "2026-04-01", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1488591049571176731", "reply_count": 0, "message_id": "1488591049571176731", "tags": ["LIVE回答", "柔軟性", "股関節", "膝", "開脚"]}, {"question": "セイナさんのアーカイブNo.10を最近毎日やっています(ロールダウン、ロールアップ)\nロールダウンはゆっくり下りれるようになりましたが、ロールアップはまだまだ😅です。\nでも、ヨガマットの上ではまだまだですが、お布団の上では出来る、この差はなんですか？\nそして、ダウンの時の背骨の使い方は分かりましたが、アップの時に使えないのはなぜですか？\nよろしくお願い致します😊", "question_author": "いづみん　331395", "answer": "", "answer_authors": [], "date": "2026-04-01", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1488652524931125299", "reply_count": 0, "message_id": "1488652524931125299", "tags": ["LIVE回答", "ヨガ"]}, {"question": "レッスンについての質問でなくて申し訳ないのですが…💦\n\nリアクションのボタンが押せないコメントがあるのですが、どのように改善できますでしょうか？🙇‍♀️\n\nコメントの長押しでリアクションが表示されるコメントと、されないものがあります。\n添付されている画像を押すとマークは出るものの，リアクションはできない…などです💦\n\nブートキャンプの皆さんのコメント見てもリアクションができずにいます😢\n\n何か原因、解決法など教えていただけましたら幸いです。\nよろしくお願いいたします🙇‍♀️", "question_author": "おつな70757", "answer": "【タイチ】\nご質問ありがとうございます😊\n\nこちらの現象ですが、\nDiscordの仕様やスマホアプリ側の不具合によって起きることがあるものになります🙇‍♂️💦\n\n特にスレッド内や画像付きの投稿では、\n・長押ししてもリアクションが出ない\n・表示は出るけど押せない\nといったことが起きる場合がたまにあります💦\n\n対処方法としては以下をお試しください！\n\n・アプリの再起動\n・Discordを最新版にアップデート\n・一度ログアウト→ログイン\n・可能であればPCから試す\n\n\nそれでも改善しない場合は、\n携帯や回線の不具合の可能性が高いです🙇‍♂️\n\n---\n\n【おつな70757】\nリアクションの件、改善された…かもです！\n今日リアクションできました✨\n\nありがとうございました🙇‍♀️✨\n\n---\n\n【みーこ】\nこの症状私も何やっても続いてました…💦\nが、\nレベル上がったらリアクションできるようになりましたー！✨😆\nある程度リアクションの限度とかあるのでしょうかねぇ。。？？😢\n\n---\n\n【おつな70757】\n昨日は全くできなかったんですが，私も同じくレベル上がったからなのか？できるようになりました👏✨\n何が原因なのでしょうね…🤔", "answer_authors": ["おつな70757", "みーこ", "タイチ"], "date": "2026-04-02", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1489030153802612756", "reply_count": 4, "message_id": "1489030153802612756", "tags": ["回答済み"]}, {"question": "タイチさん\nお世話になっております。\n今日開催される「股関節を柔らかくする絶対要素を知るクラス」にぜひ参加したいのですが、お仕事で参加ができずアーカイブの配信などはしていただけますでしょうか？\nなかなかオンラインで受講ができず、アーカイブ頼りになってしまっていて申し訳ないです🙇\nよろしくお願いいたします。", "question_author": "Naoko 820702", "answer": "【タイチ】\nもちろん本日のクラスはアーカイブを残しますのでご安心ください✨\n\nお仕事などでリアルタイム参加が難しい方がほとんどだと思います。\nそれでもしっかり学んでいただけるようにしていきますのでご安心ください\n\nご自身のペースでご活用くださいね😌\n\n---\n\n【Naoko 820702】\nタイチさん\nお忙しい中、お返事いただきありがとうございます🙇\n今まで行ったパーソナルヨガも忙しくて時間がとれないことが本気で変わる姿勢がないと言われ、かなり答える時もありましたが、お言葉にとても救われます😭\nリアルタイムで参加できない方もアーカイブで取り組んでいらっしゃるのを知り、とても励みになります！\n引き続き、よろしくお願いいたします🙇", "answer_authors": ["Naoko 820702", "タイチ"], "date": "2026-04-02", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1489059884363157504", "reply_count": 2, "message_id": "1489059884363157504", "tags": ["ヨガ", "回答済み", "姿勢", "股関節"]}, {"question": "横開脚練習時にやはり右足の内腿がピキピキ痛んでおり、原因が膝下からの捻れからきているのではないかと思います。\n捻れでこのような事が起きる可能性はありますか？\nまた、この膝下からの捻れの改善ストレッチなどあれば教えていただきたいです！\n普段から気付けば右のつま先が外側に向いています、意識がある時はつま先真っ直ぐに戻すなどをしていて、開脚練習時も気をつけはするのですが、自分の中で他にも気をつけるところが沢山あり捻れから意識が離れてしまうことがあります😂", "question_author": "ひ782024", "answer": "【タイチ】\n膝下の捻りも多少関係あるかなとは思いますが、開脚する時に骨盤前傾は入っていますか？🤔\n少し丸くなっていませんか？\nもしかしたら今日やるクラスで意識する「坐骨を後ろへ押し上げる」ことで改善されるかもしれません😌\n\n一度どのように開脚しているか確認してみて下さい！\n\n---\n\n【ひ782024】\n回答ありがとうございました！\n今たいち先生のレッスンやっててわかりました！\nかかとを床に押し付けが足らず、足首も手で押すと倒れるくらいに力が入っていませんでした🤣\nそしてイラスト付きほんとにわかりやすいです！\n坐骨！坐骨ー！\n本日も勉強になりました😆！\n質疑応答聞きながらの投稿🤣", "answer_authors": ["ひ782024", "タイチ"], "date": "2026-04-02", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1489197262184644680", "reply_count": 2, "message_id": "1489197262184644680", "tags": ["ストレッチ", "回答済み", "膝", "足首", "開脚", "首", "骨盤"]}, {"question": "いつも貴重なクラスを配信くださり、ありがとうございます😊 \n\nクラスに参加するようになってから、アップドックやダウンドックでの腕の肘の向きを意識しやすくなり、おかげさまで肩の力が抜きやすくなりました🙏 💕 \nそこから湧いている質問ですが、一般的なプッシュアップ（腕立て伏せ）をする時の理想の肘の向きの基準は、人それぞれ違うとおもわれますか？　プランクで腕前面にある肘のシワを前方に向けた形から、なるべく脇を締めた形で腕立てをする意識で合っているでしょうか？\nまた、巻き肩で腕立てをする場合の注意点も知りたいです。", "question_author": "JuJuma🌞🌻822124", "answer": "", "answer_authors": [], "date": "2026-04-02", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1489215044888559686", "reply_count": 0, "message_id": "1489215044888559686", "tags": ["LIVE回答", "肩"]}, {"question": "あと、法則として気づいたのは、\n誰かがリアクションしていたら、そこにはリアクションできるんですけど、\n誰もリアクションしてないやつは長押ししてもリアクションできない。。💦\n添付画像あっても無くても…😢", "question_author": "みーこ", "answer": "【おつな70757】\nわかります！\nただ、他のチャンネルのコメントのリアクションはできたんですよね…\n仕様のせいなのか、何なのでしょうね💦", "answer_authors": ["おつな70757"], "date": "2026-04-03", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1489467501397151856", "reply_count": 1, "message_id": "1489467501397151856", "tags": ["回答済み"]}, {"question": "ストレッチボールでお尻をほぐす時に痛いと力が入ってしまいます。力が入った状態だと上手くほぐれませんか？", "question_author": "MAMI", "answer": "【タイチ】\nMAMIさん\n\n結論から言うと\n力が入った状態だとほぐれにくいです！\n\n理由はシンプルで、\n筋肉は力が入っていると緩めることができないからです💪\n\n痛すぎると\n無意識に力が入ってしまい逆効果になります！\n\n🔽意識すること\n\n・呼吸を止めない（ゆっくり吐く）\n・力が入るなら少し圧を弱める\n・乗る位置を微調整する\n\n“力が抜ける位置”を探しながらやってみて下さい！", "answer_authors": ["タイチ"], "date": "2026-04-04", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1489759194306576574", "reply_count": 1, "message_id": "1489759194306576574", "tags": ["お尻", "ストレッチ", "回答済み", "痛み"]}, {"question": "4/2の股関節を柔らかくするレッスンに参加しました。骨盤前傾の感覚は分かるし、ボールも少し押し上げることもでたのですが、後傾に比べ前傾の可動域がなく、あまり動きません。こういう場合ボールに乗って前傾後傾を地道に繰り返していれば可動域も広がるのでしょうか？\n\n最後になりましたが、新米パパさんおめでとうございます㊗️子育てを楽しんでください🎶", "question_author": "TGM 415378", "answer": "【タイチ】\nTGMさん\nレッスンのご参加ありがとうございました！\nそして温かいお言葉もありがとうございます😊\n\n\nご質問の件ですが、\n前傾の可動域が少ないのはよくある状態で問題ありません👌\n\n骨盤前傾を広げるには「坐骨を上に引き上げ続ける力」をつけることが大切です！\n\nなのでおすすめとしては\n\n① 前屈で坐骨を引き上げる練習\n→ 開脚だけではこの力はつきにくいので\nまずは前屈でしっかり練習するのがおすすめです！\n\n② お尻を使う感覚を身につける為に、**アーカイブ「57」**でお尻を使って開脚する方法を解説しています👌\n\nボールでの前傾後傾もすごく良いので続けつつ、\nお尻を使って「坐骨を上げる力」を意識して取り組んでみてください🔥\n\nここがわかると前傾が変わってくると思います！\n\n---\n\n【TGM 415378】\nタイチさん\nお忙しい中アドバイスありがとうございます！\nアーカイブ57やってみます。\n\nゆうひさんのご質問も私の悩みの一つでした。Y字バランスの軸足の腰とお尻辺りが引っ張られる感覚！29もやってみます。\nやることいっぱい😅\n4/25のレッスンも楽しみにしています。", "answer_authors": ["TGM 415378", "タイチ"], "date": "2026-04-04", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1489784941230428322", "reply_count": 2, "message_id": "1489784941230428322", "tags": ["お尻", "回答済み", "柔軟性", "股関節", "腰", "開脚", "骨盤"]}, {"question": "ポイント制導入嬉しいです🥰\n質問なんですが、ライブレッスン参加している時は自動でポイント付くんでしょうか？😅\n2日木曜日のタイチさんのライブレッスン前の「ポイント制度のミニ解説」で説明されてたかもしれないですが、\nその時は遅れて参加したので、その質問や説明が出てたか分からなくて…\n\n遅れて参加した時には皆さんがDiscordの名前とMOSHIDをメッセージ打ってたので、\n同じようにしてみたのですが、毎回それも必要なのか教えていただけたら…😢", "question_author": "みーこ", "answer": "【なな426430】\nもしかしたら解決済みかもしれませんが、横からお返事失礼します。\n\nライブレッスン参加のポイントは、運営さんが手動でつけてくださっています。そのため、ライブレッスンのたびに、チャットに各自でDiscord表示名(省略せずにそのまま)を入力する必要があります。途中退室の場合もポイントはつきますが、最短でも20分の参加が必要です。\n\n---\n\n【みーこ】\nご丁寧に教えてくださってありがとうございます！☺️\nちなみに…なんですが、\nアーカイブはポイント付く。とかって\nどこか質疑応答で出てきましたでしょうか？\nもうどこを探しいいのか分からないくらい項目が沢山あるので分からなくって…😢\n\n---\n\n【なな426430】\nアーカイブ視聴自体はポイントにはなりません。運営さん側でポイントをつける手段がそもそも難しいようです。\n\nなので、「アーカイブ視聴をした後に感想レポートを書いて、そこでポイントを貯める」のがお勧め、とのことでした。場合によっては、ビフォーアフターや気づきでもよいと思います。\n\nご参考までに😌\n\n---\n\n【みーこ】\nななさん！✨\nまたしてもお答えくださり、ありがとうございます😊\nオススメまで教えていただいて…🥰\nお互いポイ活頑張りましょうね〜😆", "answer_authors": ["なな426430", "みーこ"], "date": "2026-04-04", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1489879154550640662", "reply_count": 4, "message_id": "1489879154550640662", "tags": ["回答済み"]}, {"question": "前屈をする際に足首や脛が痛くなります。\n改善方法などあれば教えていただけると嬉しいです。", "question_author": "はるか821818", "answer": "【タイチ】\nはるかさん\n\n前屈時の足首や脛の痛みは、\n前側が頑張りすぎている状態なのでまずはリリースからやってみてください！👍\n\n\nおすすめとしては、\n【下半身特化の筋膜リリース】\n→ 脛のリリースがあるのでしっかりほぐす！\n\nアーカイブ「60」\n股関節を柔らかくする絶対要素を知るクラス\n\nこのクラスでは裏側の伸ばし方がわかります！👌\n\nぜひ試してみてください！\n\n---\n\n【はるか821818】\nタイチさん\nご回答ありがとうございます！\n早速今夜リリースやってみます👍", "answer_authors": ["はるか821818", "タイチ"], "date": "2026-04-04", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1489990102599077989", "reply_count": 2, "message_id": "1489990102599077989", "tags": ["リリース", "回答済み", "痛み", "股関節", "脛", "足首", "首"]}, {"question": "タイチさん、ブリッジのレッスンありがとうございました。あんなにしっかり準備も教えてもらったのに、やっぱり全然腕が伸ばせませんでした。\n\nブロック使って練習していますが、写真のところからひざ裏伸ばそうとしても頭の血管切れそうになるだけでした😅  どこを意識したらいいでしょうか？", "question_author": "しの822525", "answer": "【タイチ】\nしのさん\nブリッジナイスチャレンジです👏✨\n\n今の状態だと膝裏（ハムストリングス）がまだ伸びきっていないので\n→ 体幹がしっかり使えない\n→ 代わりに首（僧帽筋）で無理やり上げようとしている状態です😓\nそれで頭に血が溜まる感覚が出てしまっています💦\n\nまずやるべきことはシンプルで\n膝裏をしっかり伸ばせる状態を作ることです！\n\nここができるようになると\n首に頼らずブリッジが上がるようになります👌\n\nおすすめのアーカイブ「51」 → 膝裏・ハムの改善に◎\n\nあとは今日のダウンドッグクラスで\n僧帽筋のリリース＋正しい使い方もやるので\nここで土台を作るのがベストです！\n\nその上で改めて「61」のブリッジクラスを再挑戦してみてください👍", "answer_authors": ["タイチ"], "date": "2026-04-05", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1490207300428759132", "reply_count": 1, "message_id": "1490207300428759132", "tags": ["ヨガ", "リリース", "回答済み", "膝", "首"]}, {"question": "レッスンリクエストってこちらでしたっけ？違ったら投稿し直します💦\nタイチさんの【ねじり】と【Y字バランス】のレッスンを受けてみたいです！\nポールの技でネックになりがちな柔軟要素でして、Y字バランスはちょっと上級者むけですが、そこに向けたストレッチは他の部位の柔軟性にも生きると思うので、Y字の手前のステップだけでも、是非お願いしたいです🙂‍↕️❤️\n\n私の状態としては、横開脚で側屈した時足に耳が付くくらいは行けるのですが、Y字バランスになると、上げる足と反対側の腰のあたりの筋が引っ張られてのびきらず、軸足がフラフラしてまっすぐできずにきれいなY字ができない状態です🥲\n体側の柔軟でも脇下より腰付近が特に引っかかることが多く、ほぐしたりはしているのですが、そのあたりへのアプローチ方法を教えて貰えるとありがたいです🙂‍↕️\n\nねじりは、うまく言語化できてないのですが、ある程度柔軟はできるものの【使う】要素がイマイチわかってなくて、深めるきっかけがほしいなぁと思ってのリクエストです。\n\nよろしくお願いします🙇🍀", "question_author": "ゆうひ765552", "answer": "【タイチ】\nゆうひさん\nリクエストありがとうございます！🙏✨\n\nY字バランスに関しては、\nちょうど4/25に基礎作りのレッスンを予定しています！\n\n今おっしゃっている\n反対側の腰が引っ張られる感覚によって軸足が安定しない腰横の筋肉・筋膜が硬い状態なので\n筋膜リリースは腹横筋側転&大腿筋膜張筋をほぐすと良いです！上半身＆下半身リリース編で出てきます！\n\nあとは筋肉へのアプローチは側屈がかなりオススメです！\n側屈を単体でおこなうのも良いですし、49のアーカイブクラスを受けて頂いても良いと思います👍\n\n\nねじりに関してもリクエストありがとうございます！\n\nまずは今あるアーカイブだと\n**「29：背骨を動かすクラス」**がねじりを中心に構成されているので一旦そちらがおすすめです！\n\n今後のクラス展開にも参考にさせて頂きます☺️\n\n---\n\n【ゆうひ765552】\nタイチさんありがとうございます🥹✨\nなんと！すでに予定頂いてたとは！\n4/25楽しみにしております🥰\nああ〜腰横硬いと思います😅特に腰の下の方⋯スワンでも腰横つっかえる感じがあるので💦ほぐします！筋膜リリースとLesson49とか29やります！！\nねじりレッスンもいつか楽しみにしております❤️", "answer_authors": ["ゆうひ765552", "タイチ"], "date": "2026-04-05", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1490224072435437618", "reply_count": 2, "message_id": "1490224072435437618", "tags": ["ストレッチ", "スワン", "リリース", "回答済み", "柔軟性", "腰", "開脚"]}, {"question": "先日スワンのポーズのレッスンで撃沈しました。\nスワンのポーズをとったときに前の足がマットの横の辺と全然平行にならないし、後ろ足もマットとの距離が遠すぎて、体が起こせません。\nスワンに行く以前に、アーカイブ動画でこれやるといいっていうレッスンはありますか？", "question_author": "まつ820778", "answer": "【タイチ】\nまつさん\nスワン最初はかなり難しいですよね😌\n\nおっしゃっている状態は、\n股関節や骨盤のコントロールがまだ整っていない段階なので全然心配しなくて良いです！\n\n\nまずは基礎作りとして\nアーカイブの「59・60」のクラスがおすすめです！\n\nここで土台を作っていくと、\nスワンの形もかなり取りやすくなります👌\n\nそして少し慣れてきたら、\nスワンは“スワンで練習する”のもすごく大事です！\n\nなので「58」のクラスもぜひ繰り返しやってみてください！\n\n焦らなくて大丈夫なので\n基礎→実践を繰り返して少しずつ近づけていきましょう☺️", "answer_authors": ["タイチ"], "date": "2026-04-05", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1490271249169907723", "reply_count": 1, "message_id": "1490271249169907723", "tags": ["スワン", "回答済み", "股関節", "骨盤"]}, {"question": "いつも丁寧なお返事をありがとうございます🥹\n\nわたしは酷い肩凝りで、酷いときは首から後頭部までも痛くなって気持ち悪くなるほど。\nそれを解消したくヨガをやっているのもあるのですが、酷い時よりはよくなっては来てますが、まだ僧帽筋がガチガチです😭\nなので、腕を上げる時など肩が引っ張られるように上がってしまいます😢\nこれでも、ヨガをやる前よりはだいぶ上がるようになりました😊\nでも、このガチガチを取り除きたくて🙏\nどうすれば解れていくでしょうか？😣", "question_author": "はる782206", "answer": "【タイチ】\nはるさん\nいつもありがとうございます😊\n\n肩こり辛いんですね。\nヨガで改善してきているのはすごく良い変化です👏\n\nそちらは僧帽筋が頑張りすぎている状態なので\n一度しっかりリリースして緩めることが大切です！\n\n特に\n✔ 肩まわり\n✔ 首の付け根\nここを緩めるとかなり変わります👌\n\n\nちょうど今日のクラスで\n肩首のリリース＋正しい使い方やるので\nお時間合えばご参加下さい！", "answer_authors": ["タイチ"], "date": "2026-04-05", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1490328781997604968", "reply_count": 1, "message_id": "1490328781997604968", "tags": ["ヨガ", "リリース", "回答済み", "痛み", "肩", "首"]}, {"question": "今日のダウンドッグの基礎作りのLIVEレッスンなんですが、21:00過ぎには子供達の寝かしつけで参加できないかもしれません😭(早く寝てくれーーー💦)\nアーカイブレッスンでUPしていただけると嬉しいです！！\n太もも裏、膝裏、お尻が硬いのでこの部分に効くストレッチということで是非毎日のストレッチのメニューに取り入れたいと思っております。ご検討頂けると嬉しいです！🙇‍♀️", "question_author": "RIE822458", "answer": "【タイチ】\nアーカイブもちろん残しますのでご安心下さい！\n僕のクラスは全てアーカイブ残りますので👍", "answer_authors": ["タイチ"], "date": "2026-04-06", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1490669764417294467", "reply_count": 1, "message_id": "1490669764417294467", "tags": ["お尻", "ストレッチ", "ヨガ", "回答済み AO", "mari481515", "arumi821780", "Naomi390526"], "date": "2026-04-08", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1491299332853469254", "reply_count": 9, "message_id": "1491299332853469254", "tags": ["ヨガ", "回答済み", "柔軟性", "膝"]}, {"question": "ダウンドッグのアーカイブ有り難うございます✨\n坐骨引いてプリケツからベクトルが足の方にいき、手に乗る力が軽くなるを体幹出来て、ダウンドッグを機能的にとる方向性が分かり有り難うございました!\n一つ質問なのですが、肩関節が緩くて特に左肩は脱臼癖があります。ダウンドッグや肘付きプランク等で肩に沈んでしまったり、肩がアウトしてしまって脇下〜前鋸筋〜お腹の繋がりが入りません。ダウンドッグのアーカイブの前鋸筋ワーク（スタンス広くとった四つん這いでcat）も難しいです。三頭筋ストレッチ（ピジョン）の形やバインド系も鏡見ながらお腹ずっと意識で慎重に入るようにしてからは大丈夫なのですが、元々、軽く亜脱臼状態でやっていたので、意識抜けると直ぐ肩外してしまう癖が出てしまいます。整体の方に指摘されて、肩外して腕扱ってる事に気付かされました。痛みは無いし直ぐ、はめれるのですが靭帯に良くなくて危ないと言われて外さないよう、肩甲骨から動かす意識で今はコントロール出来るようになってきた所です。\n\n今、改善したい事として、大円筋&前鋸筋が使えずカチコチで、更に使えない事です（他にも色々あると思いますが）。\n①大円筋はブロックでのリリースや、いつもよくやる伸ばして縮めてのワークに取り組み中で、それにより背筋が入るようになってきました。\n②一方で前鋸筋の方はどうしたら良いか迷子です。壁にもたれかかって伸ばす方法や四つん這いで伸ばす方法が、前鋸筋の伸びに上手く入れません。ただ緩い肩周りが代償してしまう感じになってしまいます。\nそして今回のcatのワークや、ブロックに肘付きでやる前鋸筋ワークなども厳しいです。\nこれらの方法が出来るヒントや、他に前鋸筋を使えるようになるステップ&方法があれば教えて頂きたいです。", "question_author": "masami 279065", "answer": "", "answer_authors": [], "date": "2026-04-08", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1491316959202115584", "reply_count": 0, "message_id": "1491316959202115584", "tags": ["LIVE回答", "ストレッチ", "ピジョン", "ヨガ", "リリース", "痛み", "肩"]}, {"question": "ここで聞いてもいいものなのかわかりませんが、これは合ってるのでしょうか🤔 タイチさんのインスタストーリーをチラ見して①坐骨②背中を意識してダウンドッグしてみました。仕事中に笑", "question_author": "Naomi390526", "answer": "【タイチ】\nNaomiさんおはようございます☀️\nまさかの仕事場で👍 熱量伝わってきます！\n動画を見ると、坐骨がまだまだ引ききれておらず肩に重心が乗ってると思います！\nなので膝をもっと曲げて、坐骨をひく事を強めてみてください！\n肩の負担がなくなる所まで坐骨を引くのが目安です🤸‍♀️\n\n---\n\n【Naomi390526】\nやっぱりちゃんとアーカイブします笑 タイチさんありがとうございました🫶🏻", "answer_authors": ["Naomi390526", "タイチ"], "date": "2026-04-09", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1491490083680026828", "reply_count": 2, "message_id": "1491490083680026828", "tags": ["ヨガ", "回答済み", "肩", "背中", "膝"]}, {"question": "いつも有難うございます！\n\nアーカイブをいくつかやっていくうちに気付いたのですが、足関節のストレッチ、アップドッグ、ひばりのポーズなど、足の甲を床につけて伸ばす動作があると毎回足が攣ります。\n\nどこを直せば改善されるでしょうか？\n運動を始める前にできる対策などあればお聞きしたいです！\n宜しくお願いします。", "question_author": "もも", "answer": "", "answer_authors": [], "date": "2026-04-09", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1491689883708948642", "reply_count": 0, "message_id": "1491689883708948642", "tags": ["LIVE回答", "ストレッチ"]}, {"question": "腰に気をつけながらハムストリングを伸ばすおすすめのアーカイブあったら教えてください！", "question_author": "q 763408", "answer": "", "answer_authors": [], "date": "2026-04-09", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1491786079022612680", "reply_count": 0, "message_id": "1491786079022612680", "tags": ["LIVE回答", "腰"]}, {"question": "いつもわかりやすいレッスンありがとうございます。\n一点リクエストなのですが、ほぼ平日出張の生活でアイテム（ブロックやポール等）を全部は持参できないため、アーカイブ一覧にアイテムから検索できる項目があると、大変ありがたいなと思いました。ご検討頂けたら大変嬉しいです☺️\nよろしくお願いします。", "question_author": "risa 1605.123049", "answer": "", "answer_authors": [], "date": "2026-04-09", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1491797970864312503", "reply_count": 0, "message_id": "1491797970864312503", "tags": ["LIVE回答"]}, {"question": "皆さんはどのようにレッスンやアーカイブ動画を利用されていますか？\n\n初歩的な質問で申し訳ありません🙇‍♂️\n仕事の時間が不規則で忙しく、限られた時間しかできないため毎日のLIVE Lessonに参加することができていません。また、運動もほぼしてこなかったので、まずは一番気になっている腹筋・背筋・骨盤メインでアーカイブ動画を見ようかと思っているのですが、あまりにも数が多すぎて最近入った身からするとどれからやれば…状態です😅\nまた、同じ動画を繰り返し見てその動きに慣れてから次の動画に行った方が良いのか、それともどんどん他の動画も見るべきなのか、決めかねています。\n個人的には一回視聴しただけではなかなかできるようになった気にならないので、数回見たいなとは思っているのですが、そんな事をしていたらいつまで経っても見終わらない気がしてしまって😇\n\n自分はこうしてるよ、や、こういう使い方便利だよ、などアドバイスございましたら、ぜひ教えていただきたく存じます。\nよろしくお願いいたします‼️", "question_author": "蒼743048", "answer": "【なな426430】\nどれを受講したら？は、私もずいぶん悩んだし、他の方がどうしているのか聞いてみたいです。\n\n私は、まず20分の時短トレーニング編から始めました。\n\nその後は\n・筋膜リリース上半身編・下半身編\n・タイチさんのライブレッスン(参加できない時はアーカイブ)\n・自分の目標や課題に合わせたアーカイブ\nをやっています。\n\n筋膜リリースは、定期的に繰り返し受講しています。\n・20分・30分でできて取り組みやすい\n・可動域改善の基礎になると思うので、動画無しでも自分で必要な筋膜リリースをできるようになるため\n・90分動画でも筋膜リリースはよく出るので、覚えておくと楽\nというのが理由です。\n\nタイチさんのライブレッスンは、ライブまたはアーカイブで最新のものは極力受講するようにしています。\n・一見自分の目標と関係なさそうでも、大抵つながる部分がある\n・Q&Aコーナーで、参加者の質問を踏まえて、タイチさんが関連する過去のお勧めアーカイブを教えてくれたりする\n・受講後の参加者の感想レポートを読むことで理解が深まる\nというのが理由です。\n\n自分の目標や課題に合わせたアーカイブは、必ずしもすべて確信を持ってやっているわけではありません。それでも、以下のようにして、自分に何が必要なのか模索しています。\n・タイチさんに自分の課題を伝えてお勧めのトレーニングやアーカイブを教えてもらう\n・自分のダンスの先生から課題を指摘された週は、その部位に関連したアーカイブをやる\n・コミュニティの中で、自分と似た課題の方を見つけて、選ぶアーカイブや日々の取り組みを参考にさせてもらう\n\n少しでも参考になれば幸いです😌", "answer_authors": ["なな426430"], "date": "2026-04-10", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1491816890937638992", "reply_count": 1, "message_id": "1491816890937638992", "tags": ["トレーニング", "リリース", "回答済み", "柔軟性", "骨盤"]}, {"question": "いつもレッスン、アーカイブ動画の方ありがとうございます！\n自分自身でも、レッスンでの体の使い方の理解を深めるためにも、解剖学などの本などを読んでいきたいなと思うのですが、オススメの本などがありますでしょうか？\n差し支えなければ、お聞きしたいです！", "question_author": "しゅーご821968", "answer": "", "answer_authors": [], "date": "2026-04-10", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1492109654220869883", "reply_count": 0, "message_id": "1492109654220869883", "tags": ["LIVE回答"]}, {"question": "先日入会したてホヤホヤです🔰\n\n皆さんのやりとりが活発で\n驚いています😳\n\n私は土日が仕事のことが多く\n夜は、最近\n21時に寝てしまうんです😂\n\nライブに参加したいけど\nなかなか参加できなくて😭\n\nそんな方もたくさんいらっしゃるのでしょうか😭", "question_author": "香織　45058", "answer": "【ルーシー370566】\n@香織　45058 香織さん\n\n私も子育てしながらなので、就寝早めです🥲\n時間の合間をみてアーカイブをやっております。\n自分のペースが1番大切だと思うので、無理せずお互い頑張りましょう🥰\n\n---\n\n【aki821717】\n香織さん、おはようごさいます！\nわたしも先月入会したばかりです😊\nまだまだできないことの方が多くて、皆さんすごいなぁって思ってます。\n疲れて何もできない日もありますが、10分でもできたら“今日はよし🙆‍♀️”って自分を褒めてます✨\n一緒にマイペースに頑張りましょう☺️", "answer_authors": ["ルーシー370566", "aki821717"], "date": "2026-04-11", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1492293194195402943", "reply_count": 2, "message_id": "1492293194195402943", "tags": ["回答済み"]}, {"question": "香織さん\n私も朝型&体力無くて夜20時過ぎには寝てしまうので、土曜午前のライブしか参加出来てないです。。。\n仕事終わってからの夜にライブ参加されてる方々の感想を拝見しては尊敬します。そして正直、焦っちゃう気持ちもあります。。。\nなので来週か er": "", "answer_authors": [], "date": "2026-04-12", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1492731925687963668", "reply_count": 0, "message_id": "1492731925687963668", "tags": ["LIVE回答", "ふくらはぎ", "リリース", "痛み", "膝", "開脚"]}, {"question": "縦開脚や鳩のポーズを深めるレッスンで骨盤後傾をたくさん練習すると次の日朝起きた時に腰が痛くなっていることが多いです。\n原因としてお腹とお尻の筋肉もっと締めると良いのかなと思うのですが、改善方法は\nありますでしょうか？", "question_author": "Himeka25585", "answer": "", "answer_authors": [], "date": "2026-04-12", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1492768742826967221", "reply_count": 0, "message_id": "1492768742826967221", "tags": ["LIVE回答", "お尻", "痛み", "腰", "開脚", "骨盤"]}, {"question": "ずっと分からないで悩んでいる事があり教えて欲しいです\n\n私はストレートネックと巻き肩で慢性的な首肩凝りがあります。\n\n翌日に疲れを残さない様、夜寝る前にストレッチをする事が多いのです。\nタイチさんの胸椎や、巻き肩のレッスンをやるととても楽になり、痛みから解放されたー！と感じる事がでしました\n\nでも朝起きると元に戻ってしまいます\n\n寝ている間にすごく身体に力が入っているみたいで\n起きた時首肩がガチガチ凝り固まってしまい辛い状態で目が覚めます。\n\n枕を変えたりいろいろ試してみましたが、何年もこの悩みから解放されず。\n\nこの不調を改善するために\nどんな事をしたら良いかアドバイス欲しいです\n宜しくお願いします", "question_author": "かおる", "answer": "【Hitomi179012】\nかおるさん、初めまして！\n全然専門家でも何でもないのですが、私も同じ経験があるので、少しだけ共有させて頂きます😊\n\n私は普段から、体が緊張気味のタイプだと思っていて、それは思考の問題でずっと交感神経優位になっていたり、体のミネラル不足だったり、ストレスだったり色んな所からきています。\nその辺りの体の仕組みとかを詳しく教えてくれるbody workerさんを私はフォローしてるのですが、もし良かったら見てみてください。タイチさんと同じように、しっかりとした知識を持って正しい事を教えてくれる方です！\n\nhttps://www.instagram.com/mori_taku6?igsh=MXR2Y3R0NmpwZ3N0Nw==\n\n私がやっている（やった）事としては、ベッドマットレスや枕を変えたり、マグネシウムを飲み始めたりしました。私の1番の原因としては、寝てる間の食い縛りがあって、それが首凝り肩凝り頭皮の凝りに繋がっていました。食い縛りはストレスからくる事が多いとされているので、ストレスを改善させないと根本解決にはならないのですが、、\n恐らく同じ症状でも、原因は千差万別なので中々これだ！っと特定する事は出来ないと思いますが、何かしらのヒントにらなれば幸いです😌\n\n---\n\n【かおる】\nヒトミさん返信ありがとうございます\n\n私も睡眠中の食い縛りがあり、そこから首肩凝りがきていと思っています\n食い縛りはストレスが原因とよく言われていますが\n現代社会でストレス無い人なんているのかな？とも思っていて、もっと何か原因があるようにも感じていました\n\nヒトミさんのメールで鉄分とマグネシウム不足とあって、確かにこの前鉄分入りのお水を飲んだらすごく美味しいと感じたんですね、\nもしかしたら私は鉄分とマグネシウム足りてないのかもしれません\n\nすごく貴重なアドバイスありがとうございます\n\n送って頂いたリンクも早速見てみます\n\n改善作があると思うとすごく嬉しいです\n\nありがとうございまた\n\n---\n\n【Hitomi179012】\nかおるさんも、食い縛りあるんですね😭\n\nストレスがあると食い縛りだけじゃなく、ストレスホルモンも出て交感神経優位になってしまう事も緊張状態に関係しているのかなと思います。\n\n因みに私はマグネシウムの液体を摂取しています！一応写真添付しておきますね！\nお水やコーヒーなどの飲み物や食事の時の汁物に数滴垂らすだけで摂取出来るのでお手軽です☺️\n\n朝起きた時に少しでも変化があると良いですね✨\n\n---\n\n【かおる】\nヒトミさん画像ありがとうございます\n\nメッセージ頂いてから鉄やマグネシウムの体に不足している成分をどう摂取しようか迷っていたので\n同じ悩みを持っていた方のアドバイスはすごく心強いです\n\n寝起きの首肩凝り食い縛りに悩まされ、解決策をもう10年以上探していたので\nこのコミュニティで\nヒトミさんのアドバイスと出会えて良かったです\n\n感謝です！\n\n---\n\n【yui 731927】\nかおるさん、はじめまして。\n睡眠中の食い縛りに悩まれている、ということで1つだけお伝えしたいと思ったのでコメントさせていただきます☺️\n睡眠時に装着するマウスピースを試してみても良いかもしれません。\n夜間の歯ぎしり、食い縛りは無意識に行なっていて自身でコントロールが出来ないものです。\nそして、その時の力は普段の食事のときの数十倍にもなると言われています。\nマウスピースで食い縛りを止めさせることは出来ませんが、かかる力のバランスを整えたり負担を軽くすることは出来ますのでよろしければご検討ください☺️\nもしすでにお試しだったら申し訳ありません！\n\n歯科医院に勤務していまして、似たような悩みをお持ちの方がマウスピースで改善していく姿も見ています！\nご参考になれば幸いです☺️\n\n---\n\n【かおる】\nyuiさんありがとうございます\n私は食い縛りで歯を割ってしまった事があり、歯医者さんに勧められてマウスピースを数年使用していて、今もたまに使用しているんですけど、\nマウスピースを使用した時の方が食い縛りが酷く、\nできれば使いたくないなと思っていて、\n\nでも使わないと食い縛って歯を割ってしまうかも、使うとより首肩がガチガチになってしまう、\nどうしたら良いんだろうと\n改善策を探している最中です\n\nマウスピースをしただけで\n神経が過敏になってしまうのかもしれないです\n\n歯から、首から、身体の内側からと、改善いっぱありますね\n\nアドバイスありがとうございます、励みになります！\n\n---\n\n【yui 731927】\nそうだったんですね😔\n確かに、マウスピースは異物といえば異物なのでどうしても受け入れられない方もいらっしゃいます。\nマウスピースをした方が眠れない、という方もいらっしゃいます…\n良ければ、咬筋のマッサージなどやってみてください☺️\nあとは医院によりますがボトックスを打つというのも1つです。\n保険適用外になりますし、永久的な効果はないのですが…\n\n体って本当に全身つながっているんだなって実感しますよね。\n少しでも改善することを願っております☺️\n\n---\n\n【かおる】\nヒトミさん、メッセージを頂いてから\n以前飲んだ時、身体が美味しいと反応したお水を飲み始めたんです。\nそしたら寝起きの強張りが全く無くなったんです\n毎朝、感動して起きます\nアドバイス本当にありがとうございました\n\nマグネシウムやナトリウムが入っていて、私の身体には不足していたんだなと実感しました\n\nしばらく飲み続けてみようと思います\n\n画像送ります\n\n---\n\n【Hitomi179012】\nかおるさん、\nほんとですか‼️\nそれは本当に良かったです😭\n\n私もお伝えはしましたが、まさかそんなに変化が出るなんて驚きです！\n\nミネラル成分って本当に大事なんですね、私もかおるさんの実体験を通じて、また学ばせてもらいました🙏🏻\n\nお水の写真もありがとうございます！多分ちょうど良い濃度で入っていると思うので始めやすいですね！\n私も試してみたいです。\n\n何より、毎朝起きて首肩凝りって他人からは全く分からないのに本人は本当に辛いし、何をやるにもその凝りが気になって辛かったと思うので、それが改善された事が本当に私も嬉しいです！", "answer_authors": ["yui 731927", "Hitomi179012", "かおる"], "date": "2026-04-13", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1493079661595594905", "reply_count": 9, "message_id": "1493079661595594905", "tags": ["ストレッチ", "回答済み", "痛み", "肩", "背中", "首"]}, {"question": "毎回レッスンに入る時、10分以上かかってしまいます😅\n皆さんzoomにパッと入ることはできていらっしゃいますか…？\n通信環境のせいなのでしょうか…😇", "question_author": "蒼743048", "answer": "", "answer_authors": [], "date": "2026-04-13", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1493221126170607656", "reply_count": 0, "message_id": "1493221126170607656", "tags": ["LIVE回答"]}, {"question": "今日13日のLIVEレッスン「ヒップラインを鍛える3種ワークアウト」について、1種目の四つん這い→片足を90度に曲げたままあげる→膝を伸ばす\nのときに、膝を伸ばすと外太もも(真横より若干後ろ側)がつりそうになります。お尻に効く前にピキピキつりそうな外太ももに意識がむいてしまうのですが、どのように改善したらいいのでしょうか。\n外太もものつまりを改善したらいいのか、お尻ワークアウトの時の力の使い方が間違っているのか、、アドバイス頂けると嬉しいです！！", "question_author": "RIE822458", "answer": "", "answer_authors": [], "date": "2026-04-13", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1493236157046194176", "reply_count": 0, "message_id": "1493236157046194176", "tags": ["LIVE回答", "お尻", "膝"]}, {"question": "ヒップラインを鍛える3種ワークアウトについて質問です！\n2種目目の肩肘ブロックの上について膝とかかとを90度に曲げて足を上げる動きなんですが、バランスが上手く取れずに何回も体勢が崩れてしまいました。\n上手くバランスが取りやすい方法があったら教えて頂きたいです。", "question_author": "りな788081", "answer": "", "answer_authors": [], "date": "2026-04-13", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1493253071864860702", "reply_count": 0, "message_id": "1493253071864860702", "tags": ["LIVE回答", "肩", "膝"]}, {"question": "ヒップラインを鍛える3種ワークアウトで前屈をしながら足を横に上げる動作でタイチさんの映像を見てるとキレイに真横に上がってるのですが、私はそもそも開脚が全然できないこともあり、足が斜め後ろに下がってしまってることに気づきました。\n\n真横にあげる場合と斜め後ろでは使う筋肉が違ってきますよね？椅子に手をつきながらだと意識すれば横に上げられるかな？という状態なので、ヨガブロックだけでは私の柔軟性では高さが低すぎると考えていいのでしょうか？", "question_author": "しのゆか765479", "answer": "【るおりん764873】\nしのゆかさん、レッスンおつかれさまでした！\nわたしは昨日のレッスンで前屈から横に全く上がらず効いてる感じもなく…💦だったのですが、しのゆかさんのコメントを拝見して、手をつく高さを変えて、キッチンくらいの高さでやってみたら、お尻横に効いてきました！😳\nその後ヨガブロックでもやってみて、真横に上げられてなかったことにも気づきました！😳\nしのゆかさんのコメントで気づくことができました。ありがとうございました☺️✨\n\nそして、タイチさんに質問です。\n中殿筋に効かせながら真横にあげるためには、膝の向きを真正面にしたまま、かかと側から上げていくといいのかな？？？？\nと思ったのですが、この解釈でいいのでしょうか？？？？🤔🤔\n\n---\n\n【しのゆか765479】\nるおりんさん、レッスンお疲れさまでした。\n\n私のコメントで気づいてもらえたことがあったんですね。読んでもらえて、返信してもらえるの嬉しいです。\n\nお尻トレーニングの後数時間たってから、お尻だけじゃなくて太ももあたりから重だるさがあったので効かせたいところじゃないところに効いてるのかもですね。筋トレにも柔軟性が必要だし、柔軟性を高めるためにも筋トレいるしできることいっぱいありますね♪これからも一緒にがんばっていきましょう♪", "answer_authors": ["しのゆか765479", "るおりん764873"], "date": "2026-04-13", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1493263971464253521", "reply_count": 2, "message_id": "1493263971464253521", "tags": ["お尻", "トレーニング", "ヨガ", "回答済み", "柔軟性", "膝", "開脚"]}, {"question": "ヒップラインを鍛える三種のワークアウト参加しました　いつもありがとうございます\n\n質問です\n二つ目肘ブロックで足を上げる時　　あげてない側の伸び全く感じなかったのはどこか姿勢がおかしかったのでしょうかね\n\n膝足首90度は出来てたと思います\n両側のお尻に効いてる感じもしたのですが\nまたよかったら教えてください", "question_author": "こじぞう667697", "answer": "", "answer_authors": [], "date": "2026-04-14", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1493265190723260580", "reply_count": 0, "message_id": "1493265190723260580", "tags": ["LIVE回答", "お尻", "姿勢", "膝", "足首", "首"]}, {"question": "ヒップラインのワークアウト、キツかったです😓\nお尻は使えてたと思うのですが2種目の肩肘ついて捻りながらストレッチ➕筋トレのをやってる時に支え側の前鋸筋？大円筋？が攣りそうに痛くなりリタイアしてしまいました。肩を外旋も意識していたのですが、肘の位置が悪かったのでしょうか？\nそれと膝90度って自分ではわからなくないですか？90度だと思ってたら全然60度ぐらいだったり。フォームがちゃんとできてるか、カメラオンにした方がいいですね。\nでも恥ずかしいんです。トレーナーさんだけのカメラにオンができる機能はないですか？", "question_author": "TGM 415378", "answer": "", "answer_authors": [], "date": "2026-04-14", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1493265590259945492", "reply_count": 0, "message_id": "1493265590259945492", "tags": ["LIVE回答", "お尻", "ストレッチ", "トレーニング", "痛み", "肩", "膝"]}, {"question": "4/13レッスンのヒップラインを鍛えるワークアウトで質問です。\n\n①前屈から片足を真横に上げる動作ですが、脚の付け根とお尻の境目外側(中臀筋の少し下あたり？)が攣りそうな状態になり真横まで上がりません。\n開脚して前に倒れる時も同じところが詰まって(実際外れはしないと思いますが外れそうな痛みが走り)120度以上開かない&前に倒れることが出来ないのですが、このケースは何処にどのようなアプローチをするのが良いでしょうか？左右差があり特に左の方がつまりが強い感じがします。\n\n②最後のブルガリアンスクワットをした際に、お尻に効く前にブロックに乗ってる足の前もも(膝のすぐ上)とその横(内側)に効いてしまい、しゃがむのがかなりキツいです。ちゃんとお尻に効かせるには何処を意識するのが良いでしょうか？", "question_author": "あみ_782401", "answer": "", "answer_authors": [], "date": "2026-04-14", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1493271316852375764", "reply_count": 0, "message_id": "1493271316852375764", "tags": ["LIVE回答", "お尻", "前もも", "痛み", "膝", "開脚"]}, {"question": "ヒップラインのワークアウト参加しました。\n汗だくでヘロヘロになりました‪💦‬\n\n肘をブロックについて足を上げ 骨盤を前に倒す時、下側の足が膝だけ地面に接していて足首から下はほとんど浮いて指がかろうじて当たっている状態でバランスを取るのが大変でした。\n\nタイチさんはきちんとあしの側面(小指側)でも支えているように見えたのに...\n膝下の骨が外側に湾曲しているからでしょうか？\n\nあと下側のお尻のストレッチも私にはわからなかったです", "question_author": "shigu822107", "answer": "", "answer_authors": [], "date": "2026-04-14", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1493273895766069338", "reply_count": 0, "message_id": "1493273895766069338", "tags": ["LIVE回答", "お尻", "ストレッチ", "膝", "足首", "首", "骨盤"]}, {"question": "お尻のLIVEレッスンに参加しました！汗だくで頑張りました✨✨✨\n\nバッチリ効果を感じておりましたが、最後のブルガリアンスクワットだけ、腰が痛くなってしまいました🥹\n（反り腰出身です）\n\n腹圧も入れようとしましたが\n上手く入らなく…\n\nアドバイス宜しくお願いします🔥", "question_author": "ふーみん", "answer": "", "answer_authors": [], "date": "2026-04-14", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1493277532567502858", "reply_count": 0, "message_id": "1493277532567502858", "tags": ["LIVE回答", "お尻", "姿勢", "痛み", "腰"]}, {"question": "お尻トレliveレッスンに参加しました。\nめっちゃキツかったです😅\nお尻にもきましたが、軸足のほうがプルプルして辛かったです。終わってから腿全体からお尻にかけてじんわりしてる感じで、これって違うところにも力が入っているせいでしょうか？筋力無さすぎ？", "question_author": "なつき822420", "answer": "", "answer_authors": [], "date": "2026-04-14", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1493298094253539419", "reply_count": 0, "message_id": "1493298094253539419", "tags": ["LIVE回答", "お尻"]}, {"question": "おはようございます！\nお尻トレLIVEレッスン参加しました！\nすっぴんパジャマだし\n画面オンにして参加するの\n恥ずかしかったんですけど\n皆さん、オンにされてるので\n私もオンにしてみました🤣🤣\n\nそして、めちゃくちゃきつくて\nちゃんとできてるのか全然わからないです笑\n\n体の柔軟性がない場合\n他のトレーニングを先にやったほうがいいのかな？？\nとか思ったのですが\n特にトレーニングの順番とかはあまり気にしなくて良いのでしょうか？？", "question_author": "香織　45058", "answer": "", "answer_authors": [], "date": "2026-04-14", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1493347436209635400", "reply_count": 0, "message_id": "1493347436209635400", "tags": ["LIVE回答", "お尻", "トレーニング", "柔軟性"]}, {"question": "お世話になっております。\n昨夜１４日のレッスンで四つ這いになって、膝を真横にあげ、お尻のストレッチを感じるのは難しかったです。\nお尻がプリッとしていないのか？\n　zoomもカメラにしないと、自分に甘くなり、休み休みになってしまう😉", "question_author": "あっくん😊", "answer": "", "answer_authors": [], "date": "2026-04-14", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1493353951783817266", "reply_count": 0, "message_id": "1493353951783817266", "tags": ["LIVE回答", "お尻", "ストレッチ", "膝"]}, {"question": "4/13お尻トレのライブレッスン参加しました☺️\n質問です！\n\n・中臀筋のアプローチ\n四つん這い→膝を90度→足を横に伸ばしてゆっくりおろす\n\nコチラが上手くできず、徐々に中臀筋が辛くなるものの、膝を90度にあげてからの動作が腰に負担がかかってしまいます😂\n上手く四つん這い姿勢が保てず、腰に力が入る感じでした💦\n\nアドバイスいただけるとください、お願い致します☺️", "question_author": "ルーシー370566", "answer": "", "answer_authors": [], "date": "2026-04-14", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1493364827572404295", "reply_count": 0, "message_id": "1493364827572404295", "tags": ["LIVE回答", "お尻", "姿勢", "腰", "膝"]}, {"question": "ブルガリアンスクワットのフォームについて教えてください！\n\nしゃがむとき、後ろに引いた足の膝の向きは正面がいいんでしょうか？\nそれとも少し外向きがいいんでしょうか？\n\n膝は正面に向けるものだと思っていたのですが、以前トレーナーさんに「少し外向きで」と教えてもらってから、今は外向きでやっています。\n\nただ、「なぜ外向きなのか」をちゃんと理解できていなくて…💦\n後ろに引いた足の膝の向きによって、お尻の効く部分が変わったり、前ももに入りにくくなったりするのでしょうか？", "question_author": "aki821717", "answer": "", "answer_authors": [], "date": "2026-04-14", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1493542645560115281", "reply_count": 0, "message_id": "1493542645560115281", "tags": ["LIVE回答", "お尻", "前もも", "膝"]}, {"question": "すみません😣💦早朝クラスは4月15日からではなくて土日から開始でしたか？？？詳細わかったら教えていただけると嬉しいです✨", "question_author": "はるか154335", "answer": "【さかえ 821242】\nはじめまして、はるかさん。\n詳細はまだ出てないと思います🤔アンケートの結果｢土日6:30〜7:15｣というのをタイチさんが報告したのは見ました。でも、それ以降に詳細出ていたらごめんなさい🙏", "answer_authors": ["さかえ 821242"], "date": "2026-04-15", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1493702661932060893", "reply_count": 1, "message_id": "1493702661932060893", "tags": ["回答済み"]}, {"question": "@さかえ 821242 さかえさんはじめまして✨朝早くにご回答くださりありがとうございます✨　そうでしたよね☺️ 土日なのか15日からなのかどっちかなと思ってました🍀続報を待ちたいと思います✨ありがとうございます🥹", "question_author": "はるか154335", "answer": "", "answer_authors": [], "date": "2026-04-15", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1493712155198095420", "reply_count": 0, "message_id": "1493712155198095420", "tags": ["LIVE回答"]}, {"question": "@えり315115 さんに質問です。\n\nヨガの後のシャバーサナをやることは、なぜ、どれぐらい大事なことでしょうか？というのも、自宅でエクササイズできるスペースがなく、ジムでオンラインレッスンを受けているため周囲がとても騒々しく、シャバーサナの時間がリラックスタイムではなく結構苦痛です。(そもそも、シャバーサナは頑張ったご褒美タイムみたいに捉えているのでなおさら…)\n\nスキップしてもよいのか、あるいは騒々しい中でもどんな心持ちでどんなことに注意して参加すればより意味のある時間になるか、教えてもらえると嬉しいです🙇‍♀️\n\nちょっと特殊な質問かもしれず恐縮ですが、えりさんのヨガを受けるにあたって、私にとっては壁の1つなので、何かよい考え方や対処法などありましたら、お願いします🙏", "question_author": "なな426430", "answer": "【えり315115】\nななさん質問ありがとうございます😳✨\nななさんの状況は分かりました☺️\n教えてくださりありがとうございます😳\n\n私の担当してるジムも周りとトレーニーの器具置く大きい音や叫び声？などが特徴的なので分かります😭\n\n今の私のクラスはシャバーサナはおやすみのポーズ時間として設けていますが、\n本来は『屍、死人を意味するポーズ』です。\n無空のように全てを手放すポーズ、全ての緊張、頑張りすぎているところを外し、まるで死人のように力を抜きましょうとも言われるポーズです。\n普段、頑張っている私たちは無意識に力の入ってしまうところが多いです。分かりやすいところで言うと肩や眉間のしわなど顔の表情筋です。\nそんな力みから解放していく時間、そんな力みに気づく時間でもあります。\n\n\nしかし、\n今のななさんは周りの騒がしさに気を取らやすい環境で外側に意識が向きやすいので\nシャバーサナの時に自分の内側に戻りにくくなってるように思います\n\n周りがどれだけ騒がしくて、外側に意識が向いても\n焦らず、『あ、今また外に向いてしまったな』と気づき\n自分の内側に戻す練習が必要です✨\n『自分の今の体は力を抜けているかな？』と観察するところから始めてみたり、\n『自分の呼吸の始まりと終わりを感じる。吸う息、吐く息で自分の鼻を通る空気を感じる、呼吸のリズム、呼吸の深さを感じる』\n『鼓動の🫀速さや音を感じにいく』\n\nそんな繰り返しの先に外からの世界と切り離され、いつの間にか心の静けさを感じるようになります。\n\n\nある人は『見えないけど、自分の全身を流れてる血液を想像してみる、頭の先から足の先まで』と。それくらい自分の中に意識を向けてあげることがこのシャバーサナの時間、シャバーサナのプラクティスでもあると考えてます😌\n\n大五感を緩めていく心地よさを知ること。\n\n可能であれば\n耳栓をする、フェイスタオルで目元を隠し瞼を閉じてみる、\nより集中できる空間を作ってみるのも対策の一つです。\n\n\n仰向けが落ち着かなければ\n横向きでもいいし、安座で座って瞼を閉じるのもいいです。\nとりあえずその時の自分の体が一番落ち着く体勢から始める。でも🆗です☺️✨\n\n\nそこから少しずつポーズが深まってきます。\n瞑想が苦手な方も当てはまるのですが、頭の中で何かを考えてるのが当たり前になりすぎたり\n外の音に意識が引っ張られやすかったり常に大五感がフルで働いていているんです。\n\nなのでこのシャバーサナの時間はそれを緩めてあげることで\n睡眠と同じくらいの効果があると言われています🌙\n\n\n長くなってきて文章のまとまりが怪しくなってきましたが🤔💦\n\n伝わってくれたら嬉しいです🥹\nそして縁力なく\n分かりづらかったらまた教えてください🥰✨\nななさんのシャバーサナタイムを至福な時間にしてもらいたいので🕯️✨\nまた返事お待ちしてます☺️💕\n\n---\n\n【なな426430】\nえりさん、コメントありがとうございます。私の状況を汲んでくださった上で、こんなに丁寧なお返事をいただき、感動しています🥺✨✨\n\nシャバーサナ＝ご褒美タイムととらえると周りの環境が気になるけれど、本来はマインドフルに自分の状態に注意を向け、力みを抜いていく時間なのですね😳外から与えられるものではなく、能動的に自分自身と関わっていく時間なのだと考えると、それだけでイライラがいくらか軽減されそうな気がします。\n\n具体的な対処法についても、ありがとうございます。レッスンをイヤフォン越しに聞いているので耳栓は難しいかもしれませんが、フェイスタオルを使ってみるのはできそうだと思いました。姿勢についても、自分にとってやりやすいものを探してみようと思います。\n\n実は私はヨガとは違った文脈でマインドフルネスと関わったことがあるのですが…正直なところ苦手意識があります😅雑念が浮かびやすく、「今、○○と考えているな」と思考を捉え、再度自分の内側に注意を向けなおそうとしても、雑念に戻ることを繰り返してしまいます。\n\n私の場合は、難易度の高い環境でいきなりやろうとするより、静かな追いついた環境で練習することから始めた方がいいかもしれないと思いました。\nあとは、最初から完璧にやろうとするとできなくて残念な気持ちになると思うので、少しずつで大丈夫🙆‍♀️という気持ちで取り組みたいと思います。\n\n教えていただいたことをもとに試行錯誤してみて、また報告させていただきますね。本当にありがとうございました🙏\n\n---\n\n【えり315115】\nななさん、丁寧に返信くださりありがとうございます😊✨\n\nご褒美タイムではなく、そもそものポーズの意味を考えると瞑想、マインドフルネスに近いと考えます😌🪽\n\nまずはお家で5分でもいいからそういう瞑想時間を作ってみて\n心を静める練習するのもいいかもしれません。\n寝る前のベッドの中やお風呂に浸かりながらの時間も🫧\n\n実は、私もシャバーサナができるようになったのはここ2年です。\n\nインストラクターをする前は\n本当に苦手なポーズの一つで\n今、思い返せばいつも雑念ばかりでした🥺💦\n『帰ったらご飯何食べよっかなあ』\n『このポーズは一体何の時間だろう〜』\n『あ、後ろの方の人はシャワー行きたいから早めに出てるのかなあ』※当時ホットヨガの生徒\n『私も出たいけど一番前のど真ん中だしなあ』などなど、\n\n今思えば頭の中フル回転。笑\n\nポーズの本当の意味を知ることができてやっとそのプラクティスを経て今ではシャバーサナがだいすきになりました😳\n\nなので、ななさんも最初はそんな自分を知って、気づいて受けて入れるそんなところから始めてみてください☺️🪽\n\nタイチさんのアーカイブに\n1/24 ブレスウェーブ呼吸瞑想がありますのでぜひご覧になってみてください😳✨\n\nまたいつでも待ってます🫶💌\n\n---\n\n【なな426430】\nえりさん、ご経験も含めてのアドバイスありがとうございます🥰\n\nマインドフルネス、すっと入る人には入るようなので、私には向いてないのかなと諦めていました。でも、えりさんでさえも苦手だったと聞くと(もちろん、私とはできないのレベルが違うと思いますが)、訓練次第で私も少しはできるようになるかなあ、と前向きに思いました。\n\nおっしゃるとおり、まずは「そんな自分を知って、気づいて受け入れる」ですね✨✨\n\nブレスウェーブ呼吸瞑想、教えてくださってありがとうございます。アーカイブ受講してみようと思います💪\n\n---\n\n【arumi821780】\nえり先生、シャバーサナにそんなに深い意味があるなんて考えた事もありませんでした😳\n咳が出そう、どうしようとか隣の人、イビキかいてる…😅など私も雑念だらけか半分意識無くして危ない寝るとこだった😪と思ったり…\nシャバーサナの意味を知れた事でこの先のシャバーサ
