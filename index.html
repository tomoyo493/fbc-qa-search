body {

.container {

.search-box {

}
.search-input:focus {

}

/* Tags */
.tag-section {

}

.qa-card {

}

  font-weight: 700;

.discord-link {

.discord-link:hover {

mark {

/* Responsive */
@media (max-width: 480px) {

</style>

で押す感覚をまず練習しながらアーカイブ(22)(34)(36)を練習してみて下さい！\n\n---\n\n【kana 477252】\nありがとうございます！やってみます", "answer_authors": ["kana 477252", "タイチ"], "date": "2025-12-09", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1447923089286496308", "reply_count": 2, "message_id": "1447923089286496308", "tags": ["回答済み", "痛み", "脚の形", "足首", "首"]}, {"question": "自分も横からすみません。Kanaさんと同じ感じなのと、ゴムバンドを指の間に咬ませて、母指球か小指球に通して、伸ばしたり起こしたりするケアで脛の外側が痛くなります。\nひざをついて腸腰筋を伸ばすストレッチで毛布を引いても膝が痛いです。膝についてる筋肉が痛いのかもしれません。\nやり方間違ってるのでしょうか…", "question_author": "しか414021", "answer": "【タイチ】\n脛を筋膜リリースボール(小)でリリースさせてからやれば楽にできます！👍\n腸腰筋を伸ばすストレッチは、基本膝に体重をかけずに、後ろ足の甲に体重をかけるので膝が痛くなってたら重心の位置が間違ってると思って下さい！\n\n---\n\n【しか414021】\n何度もすみません。\n膝をうかして足の甲にしか体重がかかっていないと思うんですが、右側だけ膝の内側上方が痛いです…。\n\n---\n\n【タイチ】\n足の甲っていうよりかは指先にお尻の重さが掛かってるイメージです！\n右膝の内側か🤔\n内腿めっちゃしめてお腹薄く引っ込めながらやってみるとどうですか？\n\n---\n\n【しか414021】\nありがとうございます😊アドバイスのようにやると、若干痛くないかなって感じはします。内腿めっちゃ絞められてるかどうかは疑問ですが🙏右の内側なんですが膝のお皿の隣（骨より内側の辺り）です。筋肉？に引っ張られてる痛みな感じの気かもします。\n\n---\n\n【タイチ】\n筋肉が引っ張られてる感覚なら問題ないかもですね。\nただ、解剖学視点でいうと内股のストレッチはかからない動作なので内腿や腸腰筋の筋肉が弱いとかそういう事も考慮した方がいいかもしれません！\n\n---\n\n【しか414021】\nなるほど🧐です。膝をついている時より上げた時に痛みがピーンと走るので、内転筋、腸腰筋脆弱なのと前腿の張りとかですかね？レッスン参加して治っていけばいいなぁと思います。\nこんなに親身に答えてくださるオンラインあるんですね。また後日、感想レポート書きます🤗", "answer_authors": ["しか414021", "タイチ"], "date": "2025-12-09", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1447924450820358267", "reply_count": 6, "message_id": "1447924450820358267", "tags": ["お尻", "ストレッチ", "リリース", "内もも", "前もも", "回答済み", "痛み", "脛", "腰", "腸腰筋", "膝"]}, {"question": "@あゆみ764688 腸腰筋を伸ばす方向に使う練習と、お尻の筋肉を使って足を外旋、外転させるトレーニングを入れながら、内腿伸ばした方がいいですね！\nまた、足の裏は母指球側に載せる練習をしないといけないです！\n\nダウンドッグに関しては、お腹が抜けていますね！\nあとは、お尻でニューテーションを起こすことができていないので前ももを使ってしまいます！\nこれは立っている時の姿勢も同じです！前ももが疲れやすく張りやすくなります🤦🏻", "question_author": "タイチ", "answer": "【あゆみ764688】\nありがとうございます！\nアーカイブだとどのワークが適切ですか？\n\n---\n\n【タイチ】\nお尻👉(36)\n腸腰筋ストレッチ👉(42)\n足首👉月曜ショート動画\nお腹👉(33)\n\n---\n\n【あゆみ764688】\nありがとうございます😭", "answer_authors": ["あゆみ764688", "タイチ"], "date": "2025-12-10", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1448113748735950968", "reply_count": 3, "message_id": "1448113748735950968", "tags": ["お尻", "ストレッチ", "トレーニング", "ヨガ", "前もも", "回答済み", "姿勢", "腰", "腸腰筋", "足首", "首"]}, {"question": "@あゆみ764688 @kana 477252 @しか414021 \n\n結構X脚で悩んでる方多いですね🤔\n他の方にも需要あれば、X脚改善専用のレッスンも検討しますね👍\n\nただ、X脚O脚は開脚や後屈と同じぐらい改善に時間がかかると思っておいて欲しいです！\n自分のどこが使えていなくて、どこが弱くなっているか理解して、改善トレーニングを長めにコツコツやることで良くなってきます🙂‍↕️", "question_author": "タイチ", "answer": "", "answer_authors": [], "date": "2025-12-10", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1448115824064856168", "reply_count": 0, "message_id": "1448115824064856168", "tags": ["LIVE回答", "トレーニング", "脚の形", "開脚"]}, {"question": "横からすみません。Kaguraです。私もO脚の悩みがあって、O脚だから骨盤は後傾気味で下がってて尻トレどう頑張ってもヒップアップの効果がイマイチ...\n前太ももとても張りやすく、運動強度と時間をあげたら足は疲労がとても溜まりやすくJumpとか軽快に飛べなかったりします。\nO脚改善したいところです！\n\nタイチ先生のコメントを見て気づきましたが、やはり足は外側に重心かけていますね！ヨガもダウンドッグのポーズ日々やっているが、おそらく足が外側に重心をかけてしまっています。\n足首トレーニングは改善の鍵なんでしょうか？ @タイチ", "question_author": "Kagura_Mosh ID 765039", "answer": "【タイチ】\nO脚に関しても足首が鍵ですね！\n僕もO脚ですが、足首の内側が埋まってしまって脛が外に広がるんですよね。\nなので足の裏は母指球側+踵で押すのも大事。プラスで足首の内側を伸ばすように立たないといけないです！\n後は、内腿のトレーニングだったり、外側広筋(外もも)リリースしたりストレッチさせて少しずつ改善させる必要ありですね👍\n\n---\n\n【Kagura_Mosh ID 765039】\n返信ありがとうございます🥹なんで自分が体にこんな欠陥あるの？！改善も見込めず凹んだりしましたが、、まさか姿勢が美しい先生もO脚なんて...驚く一方、努力すれば変わるのではないかと少し心強くなりましたᕦ(ò_óˇ)ᕤ\n親身なアドバイス大変ありがとうございます！母指球で押すこととウチモモを伸ばして立つこと意識します。立つ時常にウチモモ意識すると、ずっと筋トレしてる感覚でウチモモの緊張感を感じで全然長く続けないのですが...やはり内転筋が弱いからですか？\n何か具体的な立ちポーズのアドバイスありますでしょうか？\nウチモモを鍛えるには何かおすすめの動画あがあるでしょうか\n\n---\n\n【タイチ】\n内腿をそのまま閉じるのではなく、外旋をしながら内腿を使うのが大事です！ここの説明が文字では難しいのでLIVEでお伝えしますね！\n内腿はアーカイブ(26)が良いですね👍\n\n---\n\n【Kagura_Mosh ID 765039】\nご返信ありがとうございます内旋ではなくて外旋ですか😳⁉️0脚ですが、元々外旋しているので内旋するように意識しないといけないかなと思いましたが....違うのですね\n\nアーカイブ26見てみます！", "answer_authors": ["Kagura_Mosh ID 765039", "タイチ"], "date": "2025-12-10", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1448124640814960821", "reply_count": 4, "message_id": "1448124640814960821", "tags": ["ストレッチ", "トレーニング", "ヨガ", "リリース", "内もも", "回答済み", "姿勢", "脚の形", "脛", "足首", "首", "骨盤"]}, {"question": "こんばんは！トレーニングについて相談です。\n\nぎっくり腰を3回経験していて、長年スウェイバック気味だったため平背です。骨盤前傾・後傾のトレーニングに取り組んでいますが、動作によって痛めてしまうことがあります。\n\nまた、あぐらや長座体前屈では骨盤が立たず、背中が丸まってしまいます。\nこのようなタイプは、まず何から始めるのが良いか教えていただきたいです。\n\nよろしくお願いします。", "question_author": "q 763408", "answer": "【タイチ】\nなるほど！腰が痛くなるのはかなり辛いですよね。\nこちらは明日の質疑応答LIVEてお答えしますね🙂‍↕️\n見れない場合は、アーカイブも残しますのでご安心下さい。\n\n---\n\n【q 763408】\n返信ありがとうございます！\n明日質疑応答LIVEに参加しますのでよろしくお願いします🙇🏻‍♂️", "answer_authors": ["q 763408", "タイチ"], "date": "2025-12-10", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1448257833731621028", "reply_count": 2, "message_id": "1448257833731621028", "tags": ["トレーニング", "回答済み", "痛み", "背中", "腰", "骨盤"]}, {"question": "すみません！質問なのですが、タイチさんのストレッチ系は結構汗かく系で体幹系も入れたメニュー多めだと思うのですが、よくストレッチは風呂上がりの寝る前にやるって言われていて、今までずっと自分もそれをやって来ていたのですが、さすがこれから寝るぞってときにガッツリやるのは何か違うし、かといってお風呂上がりのストレッチはもう習慣にはなっているので、お風呂上がりのストレッチにこだわりすぎる意味はないですか？？それともストレッチだけを各種2分ほどやったので大丈夫ですか？？", "question_author": "まつもとひびき   310264", "answer": "【タイチ】\n目的によると思います。\n可動域を上げるのには、必ず拮抗筋を使う感覚で2分ストレッチを、かけた方がいいです。\nただお風呂上がりでリラックスするためや睡眠の質をあげるなどであれば汗をかかない程よい感じでやる方がいいです！\nどちらにせよ寝る前は、汗をかくぐらいストレッチしてしまっては本末転倒なのでやらない方が良いと思います👍", "answer_authors": ["タイチ"], "date": "2025-12-10", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1448285099782312058", "reply_count": 1, "message_id": "1448285099782312058", "tags": ["ストレッチ", "回答済み", "柔軟性"]}, {"question": "こんばんは🌙\n運動習慣がなく、体はガチガチ。姿勢も悪く不調があるので、それらを改善したく、この度、入会させていただきました。\nよろしくお願いします🙇\n\n今、痛くて困っているのが、左のお尻から太ももにかけて痛みがあることです。\n以前から痛みはあったのですが、今日は立っているだけでもツライです💦\n考えられる原因と改善方法を教えてください🙇", "question_author": "Deleted User", "answer": "【タイチ】\nまみさん、体の痛みがあると大変ですよね。\nこちらは、明日の質疑応答LIVEでお答えしますね👍\n見れない場合は、アーカイブも残すのでご安心下さい！", "answer_authors": ["タイチ"], "date": "2025-12-10", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1448285410504474685", "reply_count": 1, "message_id": "1448285410504474685", "tags": ["お尻", "回答済み", "姿勢", "痛み"]}, {"question": "水曜日の骨盤前傾のワークでの質問です\n\n①腸腰筋と前もものストレッチの時右足が前の時だけ前ももがキツイです。\n②レッグレイズの時脚の付け根が使われている感もありますが腹筋がプルプルの方が強く終わった後も腹筋が張ってしまいます", "question_author": "あゆみ764688", "answer": "【タイチ】\n①恐らく、前足のつま先側にかかっているor足の距離が近すぎるのかと！あとはお腹抜けてますね👍\n\n②お腹を凹ませる力&内腿を寄せる力が足りない状態ですね！お腹を固めてレッグレイズすると腹筋に効いてしまいます！腸腰筋狙いの時は、お腹を固めずになるべく凹ませてやると腸腰筋に効きます！\n\n---\n\n【あゆみ764688】\nありがとうございます😭\n夜早速試してみます！", "answer_authors": ["あゆみ764688", "タイチ"], "date": "2025-12-10", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1448304554130276382", "reply_count": 2, "message_id": "1448304554130276382", "tags": ["ストレッチ", "前もも", "回答済み", "腰", "腸腰筋", "骨盤"]}, {"question": "@everyone \n\n**📣 質問部屋ご利用の皆さんへ**\n\nたくさんのご質問、いつもありがとうございます！\n\nまずお伝えしておきたいのが、\n皆さんから頂いた質問は 「質疑応答LIVE」 にて回答させて頂きます！\n\n理由は、テキストだけではどうしても伝えきれない部分が多いからです。\n実際に動きで見せたり、細かなニュアンスを説明するには、\nやっぱりLIVEが一番“理解\"を深めて頂きやすいです。\n\nもちろん、すぐに解決できそうな内容は、\nテキストでの回答や、該当アーカイブのご案内を行うこともあります！\n\nまた、質問の意図を正確に理解するために、\nこちらから補足で質問をさせて頂くこともあります🙇‍♂️\n\n質問部屋は、皆さんの「体を変えるヒント」が生まれる場所です。\nどんな小さな疑問でもOKです。\nぜひ、これからも遠慮なく使い倒してください🔥", "question_author": "タイチ", "answer": "", "answer_authors": [], "date": "2025-12-10", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1448324988472918118", "reply_count": 0, "message_id": "1448324988472918118", "tags": ["LIVE回答"]}, {"question": "先日参加しました。有益なレッスンをありがとうございます！\n\n「縦開脚」レッスンについて質問です。\n①腸腰筋は伸長するストレッチの他、強化して鍛える事もやっていましたが、腸腰筋が鍛えられると柔軟性が上がる（逆に弱いと深まらない）理由が知りたいです。\n②腿裏の柔軟性を柔軟性を上げるためバウンスをしていたのですが、ある程度勢いをつけてグイっとやる事ある程度は必要なんですかね。可動域上がりましたが👍\n\nリアタイ参加が時間的にほぼ出来なく、アーカイブで楽しみにしております！", "question_author": "Mizua", "answer": "【タイチ】\n縦開脚を軸にお伝えしますね！\n①縦開脚時の前に伸ばす足は、腸腰筋の収縮がかかることで、裏もも(お尻側にある起始部)までストレッチが掛かります！\nなので腸腰筋を鍛えることで柔軟性が上がります！\n\n②はい！怪我の痛みではない「伸びる痛み」の範囲であれば勢いを使う事がバウンスストレッチ(動的ストレッチ)において重要になります。\n\nアーカイブ視聴でもしっかり結果を出して頂くために頑張ります💪", "answer_authors": ["タイチ"], "date": "2025-12-11", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1448576663133884488", "reply_count": 1, "message_id": "1448576663133884488", "tags": ["お尻", "ストレッチ", "回答済み", "柔軟性", "痛み", "腰", "腸腰筋", "開脚"]}, {"question": "こんばんわ🌙\nバレエ（クラッシック）のパフォーマンス向上のため、12月からサロンに入会しました。\n入会後〜今日まで、\nイチニチイチタイチ（訳：毎日、ショートorアーカイブレッスンをやる習慣）してます。\n\nバレエのレッスンでは「肩下げて」とよく注意されるのですが、\n今日のレッスンでは「肩下がって、胸上がってるね」っと褒められました😌 しかし、、肋骨開くな・お腹閉めろは、相変わらず注意され続けています💧\n\n左右の肩甲骨はさほど寄せてはいませんし\n大胸筋もボールエクセサイズのお陰でストレッチされているハズ。 （腕が長くなった感じがするのは、気のせいかな？）\n ここからが質問です。\n・肋骨やお腹を閉じるためには”腹筋を鍛える”と考えちゃうのですが正しいですか？ ・また腹筋といっても”腹斜筋系””腹直筋”？\n・それとも”背筋を伸ばす”必要がある？ などです。\n\n入会した早々、せっかちに質問してすみません^^;\n教えていただけたら幸いです。 \nあづみ（基本的にはアーカイブ受講です。）", "question_author": "あづみ：763608", "answer": "【タイチ】\n胸が開きやすくなったの素晴らしいですね👍\n結論、腹斜筋、肋間筋、横隔膜、腹横筋などの筋群です！\n\nこれらが肋骨を締める上で必要になりますが\nhttps://discord.com/channels/1441619538293686387/1444506245468913825\nでいうと、(9)(19)(33)あたりがオススメです！\n\nお腹を強くしながら、肩甲骨が下がって胸式呼吸をする必要があります！", "answer_authors": ["タイチ"], "date": "2025-12-11", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1448646419572588755", "reply_count": 1, "message_id": "1448646419572588755", "tags": ["ストレッチ", "回答済み", "肋骨", "肩"]}, {"question": "ショートの胸椎編やってみました。ねじりの時に足がグラグラして倒れるのは、押せてないからか、おなかが抜けているのか、単なる筋力不足か、理由は何でしょうか", "question_author": "ろぴのすけ511517", "answer": "【タイチ】\n色々原因はありそうですね！\n後ろ足に体重が乗っているか、前足はつま先荷重ではなく踵にも乗っているか。\nお腹を引っ込めて捻れているかなど！\n参考にやってみて下さい🙂‍↕️👍", "answer_authors": ["タイチ"], "date": "2025-12-11", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1448687682208272394", "reply_count": 1, "message_id": "1448687682208272394", "tags": ["回答済み", "背中"]}, {"question": "毎日12〜14時間の立ち仕事なため、仕事終わりはいつも下半身がパンパンで痛みもあります。少しでもこの辛さを翌日に持ち越さずにスッキリさせたいのですが、どのトレーニング動画から取り組んだら良いでしょうか？\n\n先日の無料セミナーの動画は下半身のストレッチが多く、やったあとはとてもスッキリしました。他にもまずやった方がいいおすすめがあれば教えてください！", "question_author": "Misa764186", "answer": "【タイチ】\nそうなんですね😓それは辛いですね。\n\n結論からいうと、下半身が入っている動きであればどれからやっても良いと思います！\n\nhttps://discord.com/channels/1441619538293686387/1444506245468913825\nアーカイブ一覧にある(15)(23)は下半身全体の筋肉をバランスよくストレッチする内容なのでオススメです👍", "answer_authors": ["タイチ"], "date": "2025-12-12", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1448691560135790785", "reply_count": 1, "message_id": "1448691560135790785", "tags": ["ストレッチ", "トレーニング", "回答済み", "痛み"]}, {"question": "質問です！インスタのリール動画にもある開脚の片足側屈なのですが、それを行うときの拮抗筋はどこの筋肉になりますか？", "question_author": "まつもとひびき   310264", "answer": "【タイチ】\n良い質問ですね！！反対の脇腹になります👍", "answer_authors": ["タイチ"], "date": "2025-12-12", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1448913372912423013", "reply_count": 1, "message_id": "1448913372912423013", "tags": ["回答済み", "開脚"]}, {"question": "こんにちは！LIVEレッスンありがとうございました！スワンのポーズがいつもできなくて悩んでいます。ブロックを使わないとお尻が浮くし、ブロックを使っても、曲げている足を90°にしようとすると、伸ばしている方の足が曲がってしまいます。身体が開いてしまう、ねじれている感じです。お尻が使えていないからでしょうか？\n曲げる足の角度より、お尻の伸び重視で良いでしょうか？", "question_author": "Kaori 744755", "answer": "【タイチ】\n前足を90度にすると後ろ足が曲がるのは、お尻、裏もも、内ももが使えていないから&お腹を薄くしたまま呼吸ができていないからだと思います！\nまずはアーカイブ(33)で胸式呼吸を練習すると良いと思います👍\n一旦は膝は曲がってもお尻のストレッチを中心に考えると良いです！\nそして後ろ足のお尻を使うこと、前の足もお尻を使えると安定するようになってきます。\n前足は外旋をかけてお尻を使えるようにすると良いです⭕️\n\n---\n\n【Kaori 744755】\nお忙しい中ありがとうございます✨最大限にお腹を薄くして呼吸しながら、腸腰筋の伸びとお尻を使えるように後ろ足の膝を地面に近づける意識でスワンのポーズをしてみたら、いつもより伸びているのを感じました！お尻も床に近付いている感覚がありました！\nたったこれだけの意識の違いでこんなに変わるなんてビックリ！今までスワンのポーズはリラックスポーズと勘違いしていたので、お腹抜けまくってました😂", "answer_authors": ["Kaori 744755", "タイチ"], "date": "2025-12-13", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1449233519787245600", "reply_count": 2, "message_id": "1449233519787245600", "tags": ["お尻", "ストレッチ", "スワン", "内もも", "回答済み", "腰", "腸腰筋", "膝"]}, {"question": "rレッスンありがとうございました。小胸筋ストレッチのときに足が立ちません。おしりと外旋の問題でしょうか？（肘曲げたときだけです）また、スワンのポーズで前の足を９０度にしようとすると膝に痛みがでます。", "question_author": "ろぴのすけ511517", "answer": "【タイチ】\nお尻を使って外旋させると立つんですが、コツとしてはまず足の裏全体でを床を押せるかどうかです。\n足を立てようとしてもダメで、足の裏全体で床を押すようにしながら立たせなければなりません！\nスワンのポーズで前足の膝が痛いのは膝のお皿？膝裏？どちらでしょうか？\n\n---\n\n【ろぴのすけ511517】\n回答ありがとうございます😊\n今日の初心者でなんとなく掴めた気がしますので、足裏ちゃんと踏んでできるように少しずつ積み重ねます。\nスワンの時は左膝裏、外寄りに痛みが出ます。", "answer_authors": ["ろぴのすけ511517", "タイチ"], "date": "2025-12-13", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1449236015167312056", "reply_count": 2, "message_id": "1449236015167312056", "tags": ["お尻", "ストレッチ", "スワン", "回答済み", "痛み", "膝"]}, {"question": "こんばんわ✨いつもありがとうございます。皆さんお疲れさまです！\n質問なのかどうか…\n巻き肩のせいなのかなにをしても肩が詰まる？重い？\n日曜日ーのをみてやってみたのですがブロックを前に立ててチャイルドポーズのときに胸がマットに近付きません。\n私の動きが合っていないのか…自信がなさすぎて凹んでおります", "question_author": "のりこ765136", "answer": "【タイチ】\nブロックを使ったパピーポーズで胸をつけるのはかなりレベルが高いので、つけれなくてもしっかりと脇や胸の伸びを感じながら背中の筋肉を使えていれば大丈夫ですよ👌\nそして、巻き肩や肩のだるさを治すのは胸の筋肉に神経を通せているかどうかです！\n今日開催したビギナークラスのアーカイブと(45)のアーカイブを繰り返し実施してみて下さい！\n\nそして凹む気持ち、わかります🙂‍↕️\n僕も最初は何度も挫折しかけたことがあります。\nスワンのポーズでお尻は全然床に着かなかくて、ダウンドッグでは踵も浮くし膝も曲がるしで。しかもそんな中インストラクターとして教えてました。\n今思うと恥ずかしい。笑\n\nでも今みたいに体を変えれたのは、凹んでも次の日には切り替えて当たり前のように練習に取り組んだ事が今の自分に繋がってます👍\nなので凹みも受け止めながら、でも私は体を変えるんだ。と気持ちを切り替えてストレッチやトレーニングをルーティン化してみて下さい🙂‍↕️\n\n---\n\n【のりこ765136】\nお忙しい所ありがとうございました❤️本日はLIVE参加が難しかったのでアーカイブを見て日々の積み重ねをしてみます！絶対に他にいないインストラクターになりたいです！\nまだ始めたばかり…がんばろー✨", "answer_authors": ["のりこ765136", "タイチ"], "date": "2025-12-13", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1449388530592776263", "reply_count": 2, "message_id": "1449388530592776263", "tags": ["お尻", "ストレッチ", "スワン", "トレーニング", "ヨガ", "回答済み", "肩", "背中", "膝"]}, {"question": "こんにちは。横開脚の股割りですが、そもそもボールに乗るのができないのは何が悪いのでしょうか？", "question_author": "Deleted User", "answer": "【タイチ】\nボールは何センチですか？🤔\n\n---\n\n【Deleted User】\n25cmです\n\n---\n\n【タイチ】\nボールに体が乗り切らないって感じでしょうか？\nそれともお腹は当たってるけど乗り切れないって感じでしょうか？🤔\n\n---\n\n【Deleted User】\nお腹は当たるけど、そこからボールに乗れない感じです。\n\n---\n\n【タイチ】\nでしたらまだまだニューテーションが掛かってないと思うので、お尻を動かす練習が必要ですね！\nあとは、股関節からかかとまで内旋が掛かっているかどうかも重要なので\n\nお尻を使ってニューテーションしながら、股関節から踵まで内旋方向へ持っていけるとお腹がついてくると思います👍\n\n最初の時点では、もう少し大きい30cm〜35cmのボールを使ってみても良いかもしれませんね！\n\n---\n\n【Deleted User】\nありがとうございます✨やってみますね☺️", "answer_authors": ["Deleted User", "タイチ"], "date": "2025-12-14", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1449679862234353734", "reply_count": 6, "message_id": "1449679862234353734", "tags": ["お尻", "回答済み", "股関節", "開脚"]}, {"question": "こんにちは。今日もレッスンありがとうございます。首の前を伸ばす動き、丸くなる動きの時に首や肩がつっぱります。ストレッチやトレーニングで改善できるでしょうか？", "question_author": "Deleted User", "answer": "【タイチ】\n改善できます！\n首を伸ばす、丸める時に、肩甲骨を下げられるかどうかです！\n下げるためにはまず胸が柔らかくないといけません。\nなので最近の(45)(46)初心者アーカイブシリーズはかなりオススメです👍\n\n胸を反る⇨首を反る\n胸を丸める⇨首を丸める\n\nが意識できると肩甲骨も動くので改善させれると良いですね。", "answer_authors": ["タイチ"], "date": "2025-12-14", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1449729984297173155", "reply_count": 1, "message_id": "1449729984297173155", "tags": ["ストレッチ", "トレーニング", "回答済み", "肩", "首"]}, {"question": "お世話になります。\nかえるのポーズのとき、踵を床に押しつけるということですが足の小指側側面を押しつけることはなんとかできますが踵は浮いてしまいます。その状態でもいいのでしょうか？", "question_author": "ともみ764251", "answer": "", "answer_authors": [], "date": "2025-12-14", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1449762394397085797", "reply_count": 0, "message_id": "1449762394397085797", "tags": ["LIVE回答"]}, {"question": "ご質問です！ストレッチは1日で2分伸ばさないと意味が無いとタイチさんは仰っていたと思いますが、2分以上伸ばすのは効果はあまり変わらないですか？？", "question_author": "まつもとひびき   310264", "answer": "【タイチ】\n研究結果的には変わらないと言われていますが僕は絶対変わると思ってます👍\n2分伸ばすと、だんだんストレッチの痛みも緩んでくるのでそこからニューテーションを強めたり肩甲骨の下制を強めたりできます。\nなのでやればやるほど柔らかくはなりますがずっと同じ形で伸ばすのは変わらないです。\n伸ばしている中で骨を動かしてよりストレッチがかかる方向へと深め続けると変わっていくという考え方です👍", "answer_authors": ["タイチ"], "date": "2025-12-16", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1450332084236456017", "reply_count": 1, "message_id": "1450332084236456017", "tags": ["ストレッチ", "回答済み", "痛み", "肩"]}, {"question": "12/13の質疑応答LIVEで教えてもらった50:40ぐらいの股関節の屈曲の練習について質問したいんですが、最後のお尻を締める時はカウンターニューテーションでしょうか？", "question_author": "q 763408", "answer": "【タイチ】\nはい！その通りです！\n最後にお尻をしめます👍\n\n---\n\n【q 763408】\n返信ありがとうございます！\n意識してやってみます！", "answer_authors": ["q 763408", "タイチ"], "date": "2025-12-16", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1450429224241332327", "reply_count": 2, "message_id": "1450429224241332327", "tags": ["お尻", "回答済み", "股関節"]}, {"question": "お忙しいところ失礼します。\n足裏母指球、小指球、かかと3点均等に体重乗せるのを意識しているのですが。\n片足を前に出して着いた時、右足は膝が真っ直ぐになるのですが、左足は膝が内側に入ってしまいます。\n\nそういえば自転車漕ぐ時やスクワットの時も左膝が内側に入ってしまいます。\n\nL4〜5ヘルニア持ちで左側に足まで坐骨神経持ちではありますが、何か関係があるのでしょうか。\nそしてこの内側に入ってしまう膝をなおすには何を行えばいいでしょうか？", "question_author": "まい763441", "answer": "【タイチ】\n左足だけX脚のようなイメージですかね？🤔\nそうだとすれば坐骨神経痛もあると考えて、左の中臀筋や腹斜筋が弱くなっていることが考えられたり、ハムストリングスや内腿が硬くなっていることも考えられます！\n\nなので上記のトレーニングとストレッチをしながら足裏の3点感覚も意識して膝をしっかり外にひろげるようにしてみて下さい！\n\nちなみに！配信予定のX脚徹底改善動画は今の状態の改善に役立つと思うので是非閲覧するようにしてみて下さい🙂‍↕️\n\n---\n\n【まい763441】\nありがとうございます！！\n見た目はX脚でもO脚でもないのですが、たしかに左の中臀筋が弱いのと、ハムストリングスや内腿はいつもかなり硬いイメージです！\n一時臀筋かなり鍛えたときにひどい坐骨神経痛が出たので怖くて臀筋群はストレッチで伸ばす事ばかりしていて鍛えるのをやめてしまっていました💦\n足裏3点の意識をつけることと、伸ばすことばかりせず鍛えることも取り入れ、X脚改善動画もやってみます！\nありがとうございます😊", "answer_authors": ["まい763441", "タイチ"], "date": "2025-12-16", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1450444223089217644", "reply_count": 2, "message_id": "1450444223089217644", "tags": ["お尻", "ストレッチ", "トレーニング", "回答済み", "柔軟性", "脚の形", "膝"]}, {"question": "腸腰筋トレーニングで、足を空中に持ち上げる時、90度以上の屈曲で確実に四頭筋が効いてきて腸腰筋を全く感じる事ができません。一応インストラクターなので腸腰筋の聞かせ方は理解しているつもりなのですが…。そこで、質問です。\n\n・股関節90度以上屈曲脚持ち上げでは腸腰筋が活躍するとは言っても、ある程度ベースとなる四頭筋の筋力は必要ですか？（私は太ももが細いです）\n・下肢のリーチが長いと、脚を持ち上げる強度は高くなりますよね。（身長172㎝、強度が高いと四頭筋まで筋力が必要となりますか）\n\nちなみに膝をちょっとでも曲げた瞬間、一気に腸腰筋が入ります。\n今後の練習方法としては、四頭筋が筋肉痛になりつつも、膝を伸ばした状態でTaichiさんのブロック跨ぎをやるか、まずは膝を曲げて練習した方が良いか、どう練習するべきかアドバイス頂きたいです。\n\nいつも丁寧な回答をありがとうございます。よろしくお願いします！", "question_author": "Mizua", "answer": "", "answer_authors": [], "date": "2025-12-16", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1450 痛みは出ません。", "question_author": "よこす", "answer": "", "answer_authors": [], "date": "2025-12-18", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1451217698481635461", "reply_count": 0, "message_id": "1451217698481635461", "tags": ["LIVE回答", "トレーニング", "痛み", "腰"]}, {"question": "明日のLIVEレッスン2時間半！😳 質問です。初心者体幹時短メニューをした際にするサイドプランク。特に右側、外腿に力が入っているのを感じてしまいます💦左側は脇腹を感じるのですが、右側は足が力んでいるのをもろに感じます。以前からサイドプランク苦手なのですが何が足りないのでしょうか。無理せず膝をついたサイドプランクに変えてもいいですか？", "question_author": "Naomi390526", "answer": "", "answer_authors": [], "date": "2025-12-19", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1451570874770522260", "reply_count": 0, "message_id": "1451570874770522260", "tags": ["LIVE回答", "膝"]}, {"question": "レッグレイズのような動きをした時や、膝を胸に近づける動きをした時に股関節から音が鳴るのですが、改善策があれば知りたいです！", "question_author": "ちさ765165", "answer": "", "answer_authors": [], "date": "2025-12-20", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1451687724162613470", "reply_count": 0, "message_id": "1451687724162613470", "tags": ["LIVE回答", "股関節", "膝"]}, {"question": "レッスン47の中で質問です。\n\nうつ伏せで左手を真横、右手を胸の横につき、右足を後ろに立ててねじる動きのとき、\n左のお尻もしっかり力を入れますか？\n\n左のお尻&お腹にしっかり力を入れたときと、力を抜いて右お尻の力を強めたときとで、左肩の伸び方が違う気がします。", "question_author": "るおりん764873", "answer": "", "answer_authors": [], "date": "2025-12-21", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1452149775620378854", "reply_count": 0, "message_id": "1452149775620378854", "tags": ["LIVE回答", "お尻", "肩"]}, {"question": "レッスン39の横開脚で質問です。\n片足の開脚の状態でするストレッチですが、そもそも開脚の角度が開かず内転筋が伸びず、お尻の横が詰まって痛くて、片足の開脚状態がとれません。\n開脚の角度を開くにはどのアーカイブをみて練習すればいいでしょうか？", "question_author": "アルム469279", "answer": "", "answer_authors": [], "date": "2025-12-22", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1452653568883429406", "reply_count": 0, "message_id": "1452653568883429406", "tags": ["LIVE回答", "お尻", "ストレッチ", "内もも", "痛み", " question_author": "タイチ", "answer": "", "answer_authors": [], "date": "2025-12-25", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1453722658653999167", "reply_count": 0, "message_id": "1453722658653999167", "tags": ["LIVE回答"]}, {"question": "いつもありがとうございます。\n鳩尾のポジションについて、いつも迷っています。\nもともと反り腰で鳩尾が前に出やすい姿勢ではあったのですが、骨盤ニュートラルを意識しても鳩尾だけ出やすいです。無理にしまおうとすると肋骨が広がったり肩が上がったりしてしまいます。腹筋を固める意識で幾分凹ますことはできるのですが、呼吸が浅くなり、そもそも踊りの軸を作るためにの姿勢矯正なのに呼吸がしづらくて踊りに繋げられないというジレンマです。\n先日アーカイブ9の体幹Dayを実践したら、翌日鳩尾の収まり具合がすごく良かったので、このようなトレーニングを取り入れていけば少しずつ改善できるのかなと思い始めたところではあります。\nそもそも立ち姿勢の時に鳩尾はどんな意識でいるのか、どんな位置にあるべきなのか伺えたらありがたいです🙇‍♂️長文失礼しました。", "question_author": "masaya763494", "answer": "", "answer_authors": [], "date": "2025-12-26", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1454007114304458843", "reply_count": 0, "message_id": "1454007114304458843", "tags": ["LIVE回答", "トレーニング", "姿勢", "肋骨", "肩", "腰", "骨盤"]}, {"question": "こんにちは！いつもわかりやすい説明でのレッスンありがとうございます！\n質問です！12月8日のアーカイブ45の胸を開くレッスンで、うつ伏せになり肘90度屈曲し胸を開いていくポーズですの事なのですが、レッスンを受けるまでは肘を肩の高さで伸ばして同じように胸を開いていたのですが、肘屈曲で行うポーズの方が肩周りの色々な筋肉に効いている気がしますし、胸の開き具合が伸展より断然効果あります！\n違いはなんでしょうか！？\n効く場所にかなり違いがありますが！？", "question_author": "maki329318", "answer": "【maki329318】\n誤字多くてすみません笑\n違いがありますか！？笑", "answer_authors": ["maki329318"], "date": "2025-12-26", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1454035206729109575", "reply_count": 1, "message_id": "1454035206729109575", "tags": ["回答済み", "肩"]}, {"question": "リクエストです🙏 \n長期旅行中なんですが、ヨガブロックなどのグッズを持って行くのが難しいので、できることを細切れでやっています。\nグッズなし又は持ち運び可能な小さいグッズの範囲での、できるストレッチとかトレーニングコレクションがあると出先でもできて助かります。", "question_author": "しか414021", "answer": "【タイチ】\n旅行先や出張先シリーズですね！\nリクエストありがとうございます🙂‍↕️\n\n---\n\n【しか414021】\n今日のオンラインで途中から何もできないや！ってなってしまいました🙏よろしくお願いします！", "answer_authors": ["しか414021", "タイチ"], "date": "2025-12-27", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1454445028519710915", "reply_count": 2, "message_id": "1454445028519710915", "tags": ["ストレッチ", "トレーニング", "ヨガ", "回答済み"]}, {"question": "Taichi 先生、今日朝のレッスンありがとうございました。最後の鳩王とても難しく、上半身は床と90度にはなりますが、それ以上に後ろに反ることが出来ません。感覚としては、臀筋が硬くて邪魔して反れないような感じです。腸腰筋は本日の鳩王に至るまでの様々な動きで痛くなっていました💦　何に重点おいてトレーニングすると良いと思われますか？", "question_author": "LewesGlynde765570", "answer": "【タイチ】\nありがとうございます！\nまず先にお聞きしたいのですが、腸腰筋が痛くなってしまったということのは痛めてしまったという認識でしょうか？？\n\n---\n\n【LewesGlynde765570】\nTaichi 先生、お返事ありがとうございます。しばらくして痛みは消えましたので筋肉を痛めてはおりません。\n\n---\n\n【タイチ】\n臀筋が硬い感覚が強いのであればまずはリリースてすね！\n筋膜リリースボールで全体的にお尻に当ててほぐしてあげて下さい🙂‍↕️\n\nそこから入ると良いと思います！\n\n硬い感覚がなくなるまでほぐした後にお尻の収縮を意識しながら腸腰筋と前もものストレッチを入れてあげて下さい！\n\n呼吸は胸式呼吸で👍\n\n---\n\n【タイチ】\nちなみに補足で腰の柔軟性よりも腸腰筋と四頭筋、胸の柔軟性をつける事が近道です！\n\n---\n\n【LewesGlynde765570】\n早速ご回答をありがとうございます。スクワット、デッドリフトなど筋トレで筋肉硬くなっているのだと思います！リリースボールストレッチ、教えて頂きました部位のストレッチ行ってj柔軟性高めます！鳩王👑できたらご報告しますね！　お礼まで😉", "answer_authors": ["LewesGlynde765570", "タイチ"], "date": "2025-12-27", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1454458892422479966", "reply_count": 5, "message_id": "1454458892422479966", "tags": ["お尻", "ストレッチ", "トレーニング", "リリース", "前もも", "回答済み", "柔軟性", "痛み", "腰", "腸腰筋"]}, {"question": "筋膜リリースボールでほぐすのとマッサージガンでほぐすのは効果は全然違うのでしょうか？", "question_author": "いの765354", "answer": "【タイチ】\n筋膜リリースボールとマッサージガン、効果が「全然違う」とまでは言い切れないけど、狙えるポイントが結構違います🙂‍↕️\n\nマッサージガンは振動で広い範囲を手早くゆるめるのが得意なんですが、ガンは素早く小刻みに当たる→離れる→当たる→離れるを繰り返すので、狙った一点への圧が途切れやすい＝リリース感が弱くなることがあります。\n\n一方ボールは、ずっと触れた状態で圧をかけ続けられるので、同じポイントに連続して刺激が入りやすく、硬さや引っかかり（癒着っぽい感じ）がほどけやすいのが強みです。\n\nなので使い分けとしては、\n・ピンポイントのコリ/癒着を緩める→ボール\n・広い範囲を短時間でゆるめる→ガン\n\nの使い分けを覚えておくと良いと思います！\n\n---\n\n【いの765354】\nとてもわかりやすくて丁寧な回答をありがとうございます。\nまだ手元にボールがなくてマッサージガンで代用していましたが、早くボールを使って筋膜リリースしたいと思いました。\n今後ともよろしくお願いいたします。", "answer_authors": ["いの765354", "タイチ"], "date": "2025-12-28", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1454684757760671868", "reply_count": 2, "message_id": "1454684757760671868", "tags": ["リリース", "回答済み", "柔軟性"]}, {"question": "質問です！ライブレッスンの内容を3日に分けて細切れで行うのと、2時間分まとめて行うのと効果に違いはありますか？\n幼い子どもがいて一度に2時間取ることが難しい&体が硬過ぎて途中で疲れてしまいます😂", "question_author": "末山佳南", "answer": "【タイチ】\n効果は変わらないと思います！\nなので3日に分けてやって頂くのもありです！\n\nただ構成的には後半のメインパートまで繋がりを持たせてるので、1レッスンを通しでおこなった方が変化スピードはあると思っといて下さい🙂‍↕️\n\n育児と両立させれてる時点で偉すぎるので、ご自身を褒め讃えることもお忘れなく👍", "answer_authors": ["タイチ"], "date": "2025-12-28", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1454821785219498135", "reply_count": 1, "message_id": "1454821785219498135", "tags": ["回答済み"]}, {"question": "足を広げて前に伸ばし座った姿勢で、かかと横に置いたブロックを行ったり来たりまたぐ腸腰筋のエクササイズですが、大腿直筋にきいてしまってる気がします。そもそも骨盤を立てた状態キープで足を上げること自体難しいです。舟のポーズをとるのも苦手でやはり大腿直筋が痛くなってしまいます。(そもそも足の付け根の中央よりちょっと外側あたりは大腿直筋で合ってますか？)\n腸腰筋が入るための条件の何かが欠けているのでしょうが何だと思われますか？わたしのような代償が出やすい人間でも大腿直筋に入らずに腸腰筋を強化できるエクササイズは何かありますか？\nよろしくお願いいたします。", "question_author": "Ciel130959", "answer": "【タイチ】\nご質問ありがとうございます！\n\nその場合は主に内転筋が使われていないです！\n大腿直筋のやや外側だと大腿筋膜張筋or外側広筋の付け根になると思いますがどちらにせよエラーフォームなので内転筋を使えるようにしないといけないです！\n足を広げていたとしたも足を閉じる船のポーズだとしても内転筋が働かないと腸腰筋で足を持ち上げる事はできません。\n\n改善策\n①船のポーズの場合\nティッシュを膝の間に挟み落とさないぐらい内腿を締めて船のポーズをしてみて下さい！\nこの時お腹は薄く引っ込めて、胸式呼吸をおこなうことです☝️\n②足を広げた場合\n実際にやらなくても良いですが、広げた足の間に大きいバランスボールを挟んでるとイメージしてください。家にある場合は実際にバランスボールを挟んでも構いません！\nそのイメージで内転筋を使い、ここもお腹を薄く引っ込めながらやってみて下さい！\n\n最初はどちらの場合も外腿の付け根に効くようであれば大腿筋膜張筋の筋膜リリースをした方が良いです！\n横向きに寝転がって両膝を90度に曲げて重ねて大腿筋膜張筋に当てて体を前後に動かします🎾\nこの後にやるとかなり軽くなると思います👍", "answer_authors": ["タイチ"], "date": "2025-12-29", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1455090006124134644", "reply_count": 1, "message_id": "1455090006124134644", "tags": ["リリース", "内もも", "回答済み", "姿勢", "痛み", "腰", "腸腰筋", "膝", "骨盤"]}, {"question": "認証", "question_author": "のりこ765136", "answer": "", "answer_authors": [], "date": "2025-12-29", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1455136988280918131", "reply_count": 0, "message_id": "1455136988280918131", "tags": ["LIVE回答"]}, {"question": "認証" 02659436", "tags": ["LIVE回答"]}, {"question": "認証", "question_author": "Ken763473", "answer": "", "answer_authors": [], "date": "2025-12-29", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1455151022833139876", "reply_count": 0, "message_id": "1455151022833139876", "tags": ["LIVE回答"]}, {"question": "@のりこ765136 @765196 @ちさ765165 @Madoka710865 @tomo_ 125468 @いの765354 @akari.324935 @ずっきー763893 @Ken763473 \nメッセージありがとうございます🌿\n\n皆さんは既にMOSH IDのご入力をしていただいておりましたので、認証済ユーザーにご登録させていただいております。\nそのため「認証」のご入力を行なっていただく必要はございません😌\n今までと変わらずご利用いただけますのでご安心くださいね。\n\nMOSH ID未入力、ご連絡が確認できないお客様への対応としてこちらの認証システムを導入させていただいております。\n\nどうぞよろしくお願いします！", "question_author": "FBC運営サポート🌿", "answer": "", "answer_authors": [], "date": "2025-12-29", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1455151452027879541", "reply_count": 0, "message_id": "1455151452027879541", "tags": ["LIVE回答"]}, {"question": "認証", "question_author": "Asako765343", "answer": "【FBC運営サポート🌿】\n@ともみ764251 \n既にMOSH IDのご入力をしていただいておりましたので、認証済ユーザーにご登録させていただいております。\nそのため「認証」のご入力を行なっていただく必要はございません😌\n今までと変わらずご利用いただけますのでご安心くださいね。\n\nMOSH ID未入力、ご連絡が確認できないお客様への対応としてこちらの認証システムを導入させていただいております。\n\nどうぞよろしくお願いします！", "answer_authors": ["FBC運営サポート🌿"], "date": "2025-12-29", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1455152601753452606", "reply_count": 1, "message_id": "1455152601753452606", "tags": ["回答済み"]}, {"question": "認証", "question_author": "ともみ764251", "answer": "", "answer_authors": [], "date": "2025-12-29", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1455152815772270593", "reply_count": 0, "message_id": "1455152815772270593", "tags": ["LIVE回答"]}, {"question": "お世話になります。\n質問です。\nSTEP38の横開脚レッスンの後半にある腸腰筋を鍛えるエクササイズですが、軽く開脚した状態で膝を曲げて肩に近づけるときに股関節が詰まった様な嫌な感じの痛みが発生してしまいます。\nやり方が間違っているのでしょうか？\nもう一つあります。\n開脚が90度ちょっとしか開きません。\nそれ以上開こうとするとそのときも詰まるような(骨があたるような)嫌な痛みがでます。\nその場合、どこを鍛えていけばいいのか？どの部分のストレッチが必要なのか？ご教示いただきたいです。\nよろしくお願いします🙇", "question_author": "ともみ764251", "answer": "【タイチ】\nともみさん、質問ありがとうございます！\n\n恐らく長座してもらった時に骨盤立たない感じでしょうか？🤔\nあと、開脚した時も立たないようなイメージで動いてるかと思います！\nそもそも開脚で足を広げるには骨盤が前傾(お尻の筋力を使って内腿が伸びてる状態)であることと、お腹が薄く引き込まれている状態(お腹はドローインで胸式呼吸)でないとその詰まり感が出てきます！\n\n要はお腹の力が入っておらず、お尻の力も入ってない開脚の状態で膝を肩に近づけてしまってると思います！\n\nなのでまずはお腹を引き込むドローイングと胸式呼吸の練習をして下さい！⇨アーカイブ33\nそして今月の第4回目の\"初心者でも変われるロジカル開脚クラス\"で骨盤前傾の開脚に関しては詳しく解説します！\nぜひご都合合えばリアル参加して下さい！(もろちんアーカイブでも⭕️です)", "answer_authors": ["タイチ"], "date": "2026-01-01", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1456208188943761508", "reply_count": 1, "message_id": "1456208188943761508", "tags": ["お尻", "ストレッチ", "回答済み", "痛み", "股関節", "肩", "腰", "腸腰筋", "膝", "開脚", "骨盤"]}, {"question": "お世話になっております。\nまだ動画をあまり見れていません。\n私は\n①巻き肩・猫背改善\n②反り腰改善\n③全体的な柔軟性をだしたい\n④横開脚ができるようになりたい\nという優先順位がありますがどの動画からどのような頻度でやればよいかわかりません。\nよろしければアドバイスをいただきたいです。", "question_author": "りあ", "answer": "", "answer_authors": [], "date": "2026-01-02", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1456642801717612596", "reply_count": 0, "message_id": "1456642801717612596", "tags": ["LIVE回答", "姿勢", "柔軟性", "肩", "腰", "開脚"]}, {"question": "いつもわかりやすいレッスンをありがとうございます。\n質問です。\n12月27日のアーカイブを行ったのですが、腹筋をするときに首の筋肉に力が入ってしまい、回数を重ねる毎に痛みが辛く、15回続けられません。また、思ったほど腹筋上部に効果を感じられていません。\n腹筋が弱いからだと思うのですが、どのようなことに気をつければ首ではなく腹筋を使えますか？\n初心者向けの方法を教えていただけると嬉しいです。", "question_author": "あやの🍀はるち🎮かん🌧", "answer": "", "answer_authors": [], "date": "2026-01-03", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1457025459060478180", "reply_count": 0, "message_id": "1457025459060478180", "tags": ["LIVE回答", "痛み", "首"]}, {"question": "お世話になります。\nご相談です。\nダウンドッグなどの頭を下げるボーズが続いたり、長く続くと気分が悪くなったり、頭痛がしたりします。\nそういう方は少ないでしょうか？\nまた、他のポーズで代替え出来るのであれば、教えて頂きたいです。\n宜しくお願いします。", "question_author": "saeko.t764122", "answer": "", "answer_authors": [], "date": "2026-01-05", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1457399792945860648", "reply_count": 0, "message_id": "1457399792945860648", "tags": ["LIVE回答", "ヨガ"]}, {"question": "【質問です】\nこれまで姿勢が悪いことが原因でストレートバックになり、ぎっくり腰や腰痛を繰り返していると思っていました。\nしかし最近、実際はストレートバックが先にあり、身体の防御反応として猫背になりやすく、その結果痛みが出ている可能性が高いと分かりました。\n\n昨日の朝に軽いぎっくり腰を起こして病院を受診しましたが、レントゲンでは大きな異常はなく、「背中が丸まりやすい身体の使い方をしている」と説明を受けました。\n\nサロン参加後は、骨盤前傾や姿勢改善を意識して「背筋を伸ばす・胸を張る」ことを心がけていましたが、ストレートバックの自分にはその意識が逆効果になる場合もあることを最近知りました。\n\nストレートバックをどのように捉え、どんな方向性で改善していくのが適切か（姿勢意識・エクササイズの考え方）についてアドバイスをいただけると嬉しいです。\n長くなりましたがよろしくお願いします！", "question_author": "q 763408", "answer": "", "answer_authors": [], "date": "2026-01-06", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1457890980031369455", "reply_count": 0, "message_id": "1457890980031369455", "tags": ["LIVE回答", "姿勢", "痛み", "背中", "腰", "骨盤"]}, {"question": "ご教示ありがとうございました。\n早速、今夜から実践してみます。", "question_author": "ともみ764251", "answer": "", "answer_authors": [], "date": "2026-01-07", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1458297642433118414", "reply_count": 0, "message_id": "1458297642433118414", "tags": ["LIVE回答"]}, {"question": "いつもありがとうございます😊　質問です。\n\n・骨盤前傾→後ろ側がストレッチされる\n・骨盤後傾→前側がストレッチされる\nと、理解していたのですが、ショート動画の骨盤後傾での【前屈の練習】で骨盤前傾で背中が床と平行→後傾しながら背中丸めて、その時に後ろ側が伸びる。と、ガイドされているのですが、骨盤後傾にしても後ろ側が伸びるということですか？　それとも前屈の場合はということなのでしょうか？または、この時骨盤後傾しているので前側も伸びているのが正解でしょうか？(後傾を意識したら前側も伸びた感覚が少しありました！)\n骨盤後傾→前側が伸びる\nで、すごく理解しやすかったので、この前屈のガイドで少し混乱🌀😱してしまいました。後傾のことはあまり考えなくてもいい。と、ガイドされていたのでそこまで気にしなくていいのかもしれませんが😣\n気になったのでよろしくお願いいたします。", "question_author": "はる782206", "answer": "", "answer_authors": [], "date": "2026-01-07", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1458368368498315266", "reply_count": 0, "message_id": "1458368368498315266", "tags": ["LIVE回答", "ストレッチ", "背中", "骨盤"]}, {"question": "いつもたくさんの動画ありがとうございます！\n質問です。\nヨガのポーズのランジやウォリアー系で前腿に大きな負荷がかかってしまいます💦\n自分の理想の体型は「凹凸を抑えた、いわゆるワンライン」なので、極力前腿が張らないようにしたいです。\n ヨガの先生にこんな質問するのも失礼なのですが、\n前腿の荷重をこっそり逃がす方法はありますでしょうか？", "question_author": "あづみ：763608", "answer": "", "answer_authors": [], "date": "2026-01-07", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1458384364340641854", "reply_count": 0, "message_id": "1458384364340641854", "tags": ["LIVE回答", "ヨガ", "前もも"]}, {"question": "認証", "question_author": "유유", "answer": "【タイチ】\nユウコさん！\nこちらのページは認証と送られても反映されないです！\nちなみにこのページを見れるということは既に認証済みだと思います👍", "answer_authors": ["タイチ"], "date": "2026-01-07", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1458427025403547834", "reply_count": 1, "message_id": "1458427025403547834", "tags": ["回答済み"]}, {"question": "お疲れさまです！\n時短の胸椎の動画の中で、胸の後ろにブロックを置いて胸・首を反らせる動きで吐き気を催してしまうんですが、改善策ありますか？😭", "question_author": "ひ782024", "answer": "【Deleted User】\n同じく気持ち悪くなってしまったので気になります。\n\n---\n\n【BAL781721】\n私も…同感です🖐️", "answer_authors": ["BAL781721", "Deleted User"], "date": "2026-01-08", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1458805063857209522", "reply_count": 2, "message_id": "1458805063857209522", "tags": ["回答済み", "背中", "首"]}, {"question": "はじめまして。1/3に入りました。質問です。\n私は骨盤が後傾していて、あぐらをかいても、おそらく普通の方より骨盤が立っていないような気がします。全く立っていないわけではありませんが。\nその場合、あぐらをかいて行うストレッチ(例えば、肩甲骨を下制させるための筋膜リリース+ストレッチ)みたいなものも、骨盤が立たないでやっていたら、効果なしでしょうか？そうしたら、あぐら以外の体勢でやった方が良いのでしょうか？\n\nあとは、骨盤をまず先にケアしたほうが良いのか？同時にやってもいいものなのか？気になっています。私は巻き肩もあり、気になる部位がたくさんあります。", "question_author": "なこ642956", "answer": "", "answer_authors": [], "date": "2026-01-09", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1459052290416836731", "reply_count": 0, "message_id": "1459052290416836731", "tags": ["LIVE回答", "ストレッチ", "リリース", "肩", "骨盤"]}, {"question": "初めまして、質問させていただきます！\n\n初歩的な質問で大変恐縮ですが、「お腹を薄く、引き込む」という感覚がどうしても掴むことができず、背中・腰側に力が入ってしまい、背部の筋肉痛が激しいです・・。（普段過ごしている時も、お腹が前に出て見える姿勢なので、腹圧は入れることができていない気はしています）\n\n力の使い方が間違っている気がしており、どう意識すればいいか教えていただけないでしょうか？まだ入会したてで全ての動画を見ることができていないので、参考になる動画も教えていただけると嬉しいです🙌🏻", "question_author": "ぽんず 198016", "answer": "", "answer_authors": [], "date": "2026-01-09", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1459134035090739303", "reply_count": 0, "message_id": "1459134035090739303", "tags": ["LIVE回答", "姿勢", "背中", "腰"]}, {"question": "猫背巻肩、Ｘ脚内股、内腿筋力弱しです。\nジャンプなどすると時々膝の上部に痛みがでます。左膝です。不調は左側が多いです。\nどうすれば良いですか？", "question_author": "サチコ743135", "answer": "【タイチ】\n@everyone \n\n## 【1/17 質疑応答LIVEのアーカイブ配信】\nこんばんは🌃\n\n1月17日に配信しました質疑応答LIVE のアーカイブを公開しました！\nサチコ743135さんまでの質問を回答しています！\n\nご自身の質問への回答はもちろん、\n「他の人の質問を聞いて、自分の悩みも解決できた！」という声も多く届いています✨\n\n1人では気づけなかった発見や、\n体をより良く動かすためのヒントがたくさん詰まっています!\n\n🧘‍♀️ぜひお好きなタイミングでご視聴ください👇\nhttps://mosh.jp/user/memberships/224082/posts/102817", "answer_authors": ["タイチ"], "date": "2026-01-09", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1459137387094610084", "reply_count": 1, "message_id": "1459137387094610084", "tags": ["回答済み", "姿勢", "痛み", "肩", "膝"]}, {"question": "肋骨をしめる！について🙋‍♀️\n肋骨の開きがひどく（リブフレアってヤツですかね😅）なかなか内に引き込んで下げる。をキープする事が出来ません。息をしっかり吐いてしめて下げるはなんとか出来るのですが、息を吸うと広がってしまう🥺この時、呼吸はどの様にしたら？お腹に入れる、胸に入れる？", "question_author": "はるた", "answer": "【タイチ】\n前回の質疑応答LIVEで答えれなかったので、先にテキストで回答しますね！\n吐く時にお腹を締めて肋骨を中に入れた後の鼻から吸う息は、肺に入るので胸と背中が膨らむように吸います🫁\n\nそしてその時の肋骨はというと、肺に呼吸が入る為実は開きます！\nそしてその時のお腹の状態は薄くしたままです。\n特にお腹の下腹部あたりはかなり薄くなる必要があります。\nこれは過度に骨盤前傾するとお腹の力が抜けた肋骨の開きを導いてしまう為に、下腹部で骨盤をニュートラル(やや前傾)に保とうとする力を維持する事が大切です。\n\nなので下腹部が抜けて骨盤が前傾(反り腰)になり肋骨が開くのはダメですが\n下腹部に力が入った状態で、吸う呼吸が胸に入って肋骨が開いてるなら問題ないです！\n\nどっちも肋骨が開く動作が結果的に起こるのでそこの見極めが大切になります！", "answer_authors": ["タイチ"], "date": "2026-01-09", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1459175565880721428", "reply_count": 1, "message_id": "1459175565880721428", "tags": ["回答済み", "姿勢", "肋骨", "背中", "腰", "骨盤"]}, {"question": "質問です🙋🏻‍♀️\n\nお腹を薄く、引き込む\nは良く出てくる基本ワードではありますが\nその際のお腹は\nかためず柔らかい状態でしょうか？", "question_author": "ゆかり781723", "answer": "【タイチ】\nはい！表面の腹直筋は柔らかい状態です！\nただ指を奥に突っ込んで奥の深層が硬くなっていればできています👍\n要は胸式呼吸ですね！", "answer_authors": ["タイチ"], "date": "2026-01-10", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1459378748704030731", "reply_count": 1, "message_id": "1459378748704030731", "tags": ["回答済み"]}, {"question": "コブラのポーズで足の甲をつく時に、足の甲がつるのですが、どうしたら良いですか？🥲", "question_author": "H 781712", "answer": "【タイチ】\nシンプルに足底筋の運動不足だと思います！😅\nなので足裏を使うアーカイブ\n①月曜の時短トレ足首編\nをやったり、\n②タオルを指で掴むタオルキャッチトレーニング\nをやるようにしてみて下さい！", "answer_authors": ["タイチ"], "date": "2026-01-10", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1459379137729925319", "reply_count": 1, "message_id": "1459379137729925319", "tags": ["トレーニング", "回答済み", "足首", "首"]}, {"question": "いつもありがとうございます！\n質問です。\n\nスワンのポーズの時に、お尻の伸びも感じますが、同時に股関節付け根部分(鼠蹊部らへん？)の痛みがあります。\nストレッチを深めると痛みも強まります。\nどこをどう改善すればいいでしょうか？🙇‍♀️", "question_author": "みかん744394", "answer": "【タイチ】\nみかんさんありがとうございます！\n\n股関節が内旋しすぎていて内腿が詰まってる状態ですね🤔\nなので、アーカイブNo.50でもお伝えしてるのですが\n\n①小指側の側面で床を押す\n②膝の外側で開く(できたら床に近づける)\n\nこの感覚がまず前足に関しては重要になります！\n苦手であれば\n▪️クラムシェル\n▪️バンドウォーク\n\nのトレーニングが必要になります👍\n\nあとは、スワンのポーズ時に\n\n③お腹が薄くできているか\n④後ろ足のお尻を使えているか\n\nここに注目してみて下さい！\nさして最後に内腿の硬さ原因なので\n\n⑤内腿を伸ばすアーカイブ開脚編\nなどをやってみるのも良いと思います👍\n\n---\n\n【みかん744394】\n丁寧に教えていただきありがとうございます🙇‍♀️\nポイント押さえながらやってみます！\n⑤は横開脚のアーカイブということであってますでしょうか？🤔\n\n---\n\n【タイチ】\n⑤その通りです🙂‍↕️👍\n\n---\n\n【みかん744394】\nありがとうございます🙇‍♀️", "answer_authors": ["みかん744394", "タイチ"], "date": "2026-01-10", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1459383448300159116", "reply_count": 4, "message_id": "1459383448300159116", "tags": ["お尻", "ストレッチ", "スワン", "トレーニング", "回答済み", "柔軟性", "痛み", "股関節", "膝", "開脚"]}, {"question": "筋膜リリースボールで胸をほぐすとき、バストの肉でうまくボールが当たりません。対策ありますか？", "question_author": "サチコ743135", "answer": "【Naomi390526】\n私も同じです。最初の場所だけちゃんと当たるけど、移動するともうムリで、ずっと同じとこほぐしてます笑\n\n---\n\n【はる782206】\nわたしも他のところでコメントしましたが、同じです。同じところ解してます😅\n\n---\n\n【タイチ】\nブロックの上にボールを置いて\nその上にうつ伏せで乗ってみて下さい！\nいかがでしょう？？🤔\n\n---\n\n【サチコ743135】\nやってみました！よく入るようになりました。ありがとうございます。", "answer_authors": ["サチコ743135", "タイチ", "はる782206", "Naomi390526"], "date": "2026-01-11", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1459673580194500713", "reply_count": 4, "message_id": "1459673580194500713", "tags": ["リリース", "回答済み"]}, {"question": "全身を柔らかくするのが目標なんですが、アーカイブ動画のテーマ別を毎日ローテーションしたらいいんでしょうか？\nそれともある程度の期間同じテーマのストレッチを毎日続けた方がいいですか？", "question_author": "りな788081", "answer": "【タイチ】\n結論全身を満遍なくストレッチできていれば、同じテーマでもテーマを変えて頂いてもどちらでも問題ありません！\n\n気をつけたいのは、クラスレベルが合っているかどうか、そしてどういうふうに全身を柔らかくしたいかによって受けるレッスンの選び方が変わります！\n\n良ければより詳しくそれについて教えて下さい😊\n\n---\n\n【りな788081】\nお返事ありがとうございます🙇🏻‍♀️\n首肩背中肩甲骨の凝りが辛くて、そのせいで頭痛がすることもあるので、体の不調をなくすために全身を柔らかくして整えていきたいです。\n巻き方もあるのでとりあえず肩甲骨をテーマにしたアーカイブをしてます！現状は片方の手を腰に当て、反対の手を耳上に置いて首を傾ける動作で首が全然傾かなかったり、うつ伏せになり腕を90度にして腰を捻り、胸を伸ばすストレッチは右胸を伸ばす時はかろうじて左足が床に着きますが、左胸を伸ばす時は右足は床に着きません。\n後、お尻トレーニングをしてるのでお尻周りのストレッチや横開脚のストレッチもしてます。\nまだまだ全然で、骨盤を立てて前傾が難しく足を開いても膝が曲がってしまいます。\n横開脚のアーカイブをやり過ぎて今は右太もも付け根を痛めてしまってお休みしています。", "answer_authors": ["りな788081", "タイチ"], "date": "2026-01-11", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1459885726744186890", "reply_count": 2, "message_id": "1459885726744186890", "tags": ["お尻", "ストレッチ", "トレーニング", "回答済み", "肩", "背中", "腰", "膝", "開脚", "首", "骨盤"]}, {"question": "前屈で手が床につかないレベルの硬さで、運動不足もあり毎週のアーカイブはキツすぎてついていけてません。その場合はショート動画を毎日しながら体力をつけていく感じでしょうか？それとも、毎週のアーカイブをできるところまでやっていく方がいいですか？20〜30分くらいで限界がきてしまってます。", "question_author": "しのゆか765479", "answer": "【タイチ】\nなるべくアーカイブ動画を長くやることをおすすめします！\nが、その日の体調等も、含めて20分のショート動画でも問題ないです！\n2月からは15分、30分、45分のショート動画を増やしていくのでそちらもぜひ活用頂ければ1日の中で上手く取り入れられると思います！😊", "answer_authors": ["タイチ"], "date": "2026-01-11", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1459890028581748831", "reply_count": 1, "message_id": "1459890028581748831", "tags": ["回答済み", "柔軟性"]}, {"question": "10月横開脚のアーカイブでトレーニングする中で下記の2点について質問させていただきます。\n①内もも6種ストレッチをするときに内もも伸びよりもお尻や腸腰筋収張りを感じるのですが、お尻や腸腰筋が硬いからなのでしょうか？（筋肉の収縮とは違うような気がします。）\nお尻は脱力して脚を開くことができていないのかなっと思っています。開脚で必要なお尻のトレーニングを紹介いただきたいです。（腸腰筋は縦開脚のアーカイブで動かしております。）\n②カエルのポーズのストレッチで足先が痙攣してしまいます。開脚や内ももストレッチの時にもたまになります。考えられる要因と解決できそうなトレーニングがあれば教えていただきたいです。（膝90°、足首背屈にするときにたまになります）", "question_author": "ひでゆき765314", "answer": "", "answer_authors": [], "date": "2026-01-12", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1459928241505697886", "reply_count": 0, "message_id": "1459928241505697886", "tags": ["LIVE回答", "お尻", "ストレッチ", "トレーニング", "内もも", "柔軟性", "腰", "腸腰筋", "膝", "足首", "開脚", "首"]}, {"question": "横開脚を目指すには縦開脚動画のストレッチもした方がいいですか？", "question_author": "りな788081", "answer": "【タイチ】\nりなさんの現状の中で、膝が伸び切らなかったり足首が90度にならなかったり、足を開いた時に前ももを使ってしまうなど、足の前後にエラーがあるのであれば同時並行で縦開脚も練習させた方が良いです👍\n\n---\n\n【りな788081】\nありがとうございます🙇🏻‍♀️\n縦開脚も練習してみます！！", "answer_authors": ["りな788081", "タイチ"], "date": "2026-01-12", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1460083238314705001", "reply_count": 2, "message_id": "1460083238314705001", "tags": ["ストレッチ", "前もも", "回答済み", "膝", "足首", "開脚", "首"]}, {"question": "1/13レッスンで、スライドディスクを使った腕立てとヒップリフト？の腕と足を戻すときの動作が良くわかりません。どこに力を入れるのか？床を押すようなイメージ？スーッと戻るのか？小刻みに戻る感じなのか？できないのはただの筋力不足でしょうか？", "question_author": "サチコ743135", "answer": "", "answer_authors": [], "date": "2026-01-14", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1460830491379761163", "reply_count": 0, "message_id": "1460830491379761163", "tags": ["LIVE回答"]}, {"question": "お腹を伸ばす感覚がいまいち掴めません。特に前屈の動きのストレッチ全般、お腹を使ってのストレッチが難しいです。コツはありますか？", "question_author": "りな788081", "answer": "", "answer_authors": [], "date": "2026-01-14", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1461005307718275206", "reply_count": 0, "message_id": "1461005307718275206", "tags": ["LIVE回答", "ストレッチ"]}, {"question": "質問です！野球の投球をする上で三角筋が固くて、最大外線があまり出ないです！\n三角筋の拮抗筋はどこになりますでしょうか！？", "question_author": "まつもとひびき   310264", "answer": "", "answer_authors": [], "date": "2026-01-15", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1461219370540994734", "reply_count": 0, "message_id": "1461219370540994734", "tags": ["LIVE回答"]}, {"question": "既にどなたか質問していたらすみません💦\n巻肩で肩の可動域が狭いので、壁に両手をついて胸を下げる動きや、パピーポーズなどで体重をかけると、肩の前側が痛くて脇や胸の伸びを十分に感じられません。\n痛みを感じずにこのストレッチを効かす方法はありますか？\nあと、床にうつ伏せになってリリースボールで胸のリリースをする時、腕を真横に伸ばしていると身体をひねって反対側の足が床につくのですが、肘を曲げるとつかなくなります。これ関係あるでしょうか？", "question_author": "Naho 376992", "answer": "", "answer_authors": [], "date": "2026-01-18", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1462235676652081244", "reply_count": 0, "message_id": "1462235676652081244", "tags": ["LIVE回答", "ストレッチ", "リリース", "柔軟性", "痛み", "肩"]}, {"question": "呼吸が深く吸えません。\n深く吸えるようにするにはどうしたらいいですか？", "question_author": "りな788081", "answer": "【Kaori 744755】\nりなさん、私も過去に呼吸が浅くて胸が苦しくなる感覚があったのですが、深く呼吸しようとして、知らず知らずに力が入ってしまっていたのが原因でした🥺私の場合は背中を地面につけようと意識しすぎていたようです。\nリラックスして、全身の力を抜いて口をぽかんと開けてゆっくり深呼吸してみてください✨", "answer_authors": ["Kaori 744755"], "date": "2026-01-19", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1462607350002352353", "reply_count": 1, "message_id": "1462607350002352353", "tags": ["回答済み", "背中"]}, {"question": "ピジョンのポーズなど足を体のほうに引き寄せるポーズの時、すぐもも裏ハムストリングをつってしまいます。\nそれは常に収縮がかかっているからでしょうか？\n対処法などあれば教えていただきたいです！", "question_author": "Mariko229228", "answer": "", "answer_authors": [], "date": "2026-01-19", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1462712717449363507", "reply_count": 0, "message_id": "1462712717449363507", "tags": ["LIVE回答", "ピジョン"]}, {"question": "時短トレの足関節で質問です。\n最後の正座から両膝を上げるところでお尻が踵から離れて浮いてしまいます。\n浮く原因は足首が硬いということでしょうか？\nまた、正しいやり方としては、どちらを意識するのが良いですか？\n①お尻が浮いてもいいから膝を上げる\n②膝は上がらなくてもいいので踵とお尻が離れないようにする", "question_author": "あみ_782401", "answer": "", "answer_authors": [], "date": "2026-01-19", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1462795407355543601", "reply_count": 0, "message_id": "1462795407355543601", "tags": ["LIVE回答", "お尻", "柔軟性", "膝", "足首", "首"]}, {"question": "こんばんは。\n週末に、通っているジムのイベントでベンチプレスを競います。\n女性は、BULL30キロ、制限時間2分です。\n7年前は普通に20回くらい上げてた記憶があるのですが、肩と腕の付け根の骨が痛くなるようになって肩のトレーニングを全くしていません。\nトレーナーの人に見てもらったら、胸が硬いのでストレッチをしてからチェストプレスをした方がいいと言われました。\n重量を少しづつ上げて週末に向けるようにトレーニングするか、肩周りを柔らかくして痛めず楽に上げれる肩周りを作るのがいいか悩んでいます。\nどちらがいいでしょうか？\nアーカイブなら体幹と肩甲骨でしょうか？\nちなみに、先月末インボディで測定したら、筋肉量は40.4キロと標準と高いの境目で、インボディ点数は76点でした。\n大会参加者は参加できないと噂を聞き、ワンチャンあるかもしれないので、ダメ元で参加しようと思っています。\nでも、1回も上げれないと恥ずかしいとも思っています。", "question_author": "れいちゃん765591", "answer": "", "answer_authors": [], "date": "2026-01-19", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1462805317435002912", "reply_count": 0, "message_id": "1462805317435002912", "tags": ["LIVE回答", "ストレッチ", "トレーニング", "柔軟性", "痛み", "肩"]}, {"question": "カオリさん、同じ経験のある方からのアドバイスとても嬉しいし参考になります🙇🏻‍♀️\nそうなんです、深く呼吸をしようと思うと力が入ってしまいます。\n全身の力を抜いて、リラックス状態で深呼吸してみます！\nありがとうございます😌", "question_author": "りな788081", "answer": "", "answer_authors": [], "date": "2026-01-20", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1463050850250526740", "reply_count": 0, "message_id": "1463050850250526740", "tags": ["LIVE回答"]}, {"question": "横開脚、お尻を使って\n骨盤前傾にしてもまだ硬く、ずっと伸ばしてると足が閉じなくなるくらいしばらく痛いのですが\nこの感覚は合っていますか？", "question_author": "らな　742193", "answer": "", "answer_authors": [], "date": "2026-01-22", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1463596815382483190", "reply_count": 0, "message_id": "1463596815382483190", "tags": ["LIVE回答", "お尻", "痛み", "開脚", "骨盤"]}, {"question": "最近長時間の動画視聴が難しいので前半40分みて帰宅後に後半30分視聴しています。こんな感じでもよろしいでしょうか🥹", "question_author": "ウェンズデー706284", "answer": "", "answer_authors": [], "date": "2026-01-23", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1464098414831734785", "reply_count": 0, "message_id": "1464098414831734785", "tags": ["LIVE回答"]}, {"question": "痛気持ちいいところで伸ばしていましたがオーバーストレッチングになっていたようで軽くハムストリングや内転筋群を痛めてしまいました。\nこの場合は少し休んだ方がよいでしょうか？", "question_author": "こーたろー　782388", "answer": "", "answer_authors": [], "date": "2026-01-24", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1464413740333011117", "reply_count": 0, "message_id": "1464413740333011117", "tags": ["LIVE回答", "ストレッチ", "内もも"]}, {"question": "左肩甲骨下に違和感のある四十肩とストレートネックが辛いです。\nショート動画の肩甲骨や胸すいをやったり、ボールで肩甲骨周りやチェストをほぐしたりしています。\n首に関しては、肩を下げて首を倒すストレッチをやっています。\n全てやった直後は痛気持ち良く、すっきりするのですが、こうして携帯を触ったり、デスクワークをするとすぐ戻ってしまいます。\n上記を日々続ける他に、どんなトレーニングをすれば良いでしょうか。\n背が高めで、首長く、肩幅狭く撫で肩な体型も原因かなと思っています。\nススキのポーズなどは、首が硬い&痛めてしまいそうで怖くて出来ないでいます。", "question_author": "Chika764850", "answer": "", "answer_authors": [], "date": "2026-01-24", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1464467492159098910", "reply_count": 0, "message_id": "1464467492159098910", "tags": ["LIVE回答", "ストレッチ", "トレーニング", "柔軟性", "肩", "首"]}, {"question": "呼吸で、教えて下さい。深く吸う時に、胸の奥、肋骨の下あたりで何か詰まるような感じを覚えるですが、配信された、呼吸の動画を繰り返し行っていると解消されて来ますでしょうか？何かコツか間違えている事ありましたらご教示下さい。", "question_author": "Deleted User", "answer": "", "answer_authors": [], "date": "2026-01-25", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1464815278172143708", "reply_count": 0, "message_id": "1464815278172143708", "tags": ["LIVE回答", "肋骨"]}, {"question": "側屈について教えて下さい😌\n1/24のレッスンをアーカイブで受けました。\n側屈を深めていくと、足を曲げている方のお尻や坐骨が最後浮いて来てしまいます。左右両方の坐骨とお尻は均等にマットに下ろした状態で側屈できるところまで深めていくべきですか？片方の坐骨やお尻は多少浮いても大丈夫でしょうか？", "question_author": "mari481515", "answer": "", "answer_authors": [], "date": "2026-01-26", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1465346147420733513", "reply_count": 0, "message_id": "1465346147420733513", "tags": ["LIVE回答", "お尻"]}, {"question": "●横開脚で180度開かないけど\n上半身は倒せる(胸、腹が床に近い)\n●180度開くけど上半身が倒れない(胸、腹が床から遠い)\n\nこの場合考えられる原因は何でしょうか？今日(1月最後)のライブレッスンで後者の質問がチャットにあったのですが回答聴き逃したので知りたくて…(すみません)\n\nちなみに私は前者なんですが足が開かない原因は今日のライブレッスンとこれまでのレッスンでもお尻と内腿の筋力不足だなと感じています。\n上半身が倒せるのは骨盤が元々前傾で腹圧もなく勝手に倒れちゃう感じにも近い気がしています。\n\n自分と真反対のパターンの質問で興味深かったので、また教えて頂けるとありがたいです。", "question_author": "MK502006", "answer": "", "answer_authors": [], "date": "2026-01-31", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1467005143038951547", "reply_count": 0, "message_id": "1467005143038951547", "tags": ["LIVE回答", "お尻", "開脚", "骨盤"]}, {"question": "太一さん\nO脚の脚用のストレッチやトレーニングあったら教えてください。\n\n私は真っ直ぐな脚になりたいのですが、O脚で(左右差はありますが)\n膝下のねじれがあり、ふくらはぎの外側が張ってしまいます。\nよろしくお願いします。\n\nまゆ", "question_author": "14期生　両角真夕(もろずみまゆ)", "answer": "", "answer_authors": [], "date": "2026-02-02", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1467693760640057377", "reply_count": 0, "message_id": "1467693760640057377", "tags": ["LIVE回答", "ふくらはぎ", "ストレッチ", "トレーニング", "脚の形", "膝"]}, {"question": "ギックリ腰の痛みは徐々に落ち着いてきており、回復している実感はあるのですが、まだ再発への不安が残っています。\n昨日からストレッチ（主にお尻やハムストリング）を再開したところ、筋肉痛のような痛みや重だるさが下半身に残っています。これは間違ったやり方なのでしょうか。\n\nたいちさんのInstagramか忘れましたが「ストレッチ後に筋肉痛のような症状が出ることがある」といった内容の記事を見た記憶があるのですが、見当たらず、教えていただけると嬉しいです。", "question_author": "q 763408", "answer": "", "answer_authors": [], "date": "2026-02-03", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1468070894294401074", "reply_count": 0, "message_id": "1468070894294401074", "tags": ["LIVE回答", "お尻", "ストレッチ", "痛み", "腰"]}, {"question": "グッズを揃えて、時短トレから始めた初心者です！\n足首トレを行ったんですが、バンドを挟む足指の間がどうしても痛くてできませんでした…\n強度が一番低いバンドにしたんですが、ダメでした…\nどうしたらいいのでしょうか？\nまた、母指球と小指球に引っかけてアキレス腱を伸ばすところは、バンドが滑ってしまってうまく当てられません…\nご回答頂けるとありがたいです🥺\nよろしくお願いします🙇🏼‍♂️", "question_author": "Deleted User", "answer": "", "answer_authors": [], "date": "2026-02-05", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1468967682769686671", "r 1479114343563006032", "reply_count": 0, "message_id": "1479114343563006032", "tags": ["LIVE回答", "膝"]}, {"question": "質問です！\n腸腰筋を鍛えるトレーニングで、足を片方ずつ上げる動きなんですが、右足は腸腰筋に効いてる感覚があるんですが、左足はどうしても前腿に入ってしまいます。\nタイチさんの説明にある、かかとを床に押しながら膝を伸ばしてしても内転筋が使われてる感覚も掴めません。側屈も右より左の方が固いです。\n左の腸腰筋が弱すぎるせいでしょうか？", "question_author": "りな788081", "answer": "【タイチ】\n弱いのもあると思うのですが、足裏が使えてない可能性が高いです！\n腸腰筋を使うには母指球から内腿を繋げれないといけません。👍\nなので、右足は母指球から内股の繋がりがあって腸腰筋から折れる感覚があると思います！\n左も同じようにできる必要があります。\n月曜の足首編を実践してから左足の母指球から内腿を繋いであげるように一度試してみて下さい🙏\n\n---\n\n【りな788081】\nお返事ありがとうございます。\n腸腰筋とばかり思っていましたが、足首編やってみます！！", "answer_authors": ["りな788081", "タイチ"], "date": "2026-03-06", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1479143838810374285", "reply_count": 2, "message_id": "1479143838810374285", "tags": ["トレーニング", "内もも", "前もも", "回答済み", "腰", "腸腰筋", "膝", "足首", "首"]}, {"question": "今日のライブレッスンありがとうございました！自分史上最高に前屈できました！\n\nそこで、腸腰筋と内腿を使う話があったのですが、母指球を前にすることはできるのですが、どうしても内腿が使える感覚がありません。O脚でもあり、内腿が相当弱いんだと思います。(ライブでたいちさんが「危機レベル」と言ってたくらいのレベルです)\n\nそこで、質問というかお願いなのですが、内腿を使えるようになるレッスンをお願いできないでしょうか？(すでにアーカイブあったらすみません)\nO脚もずっと悩みなので、改善したいです。\n\n書き込む場所が不適切でしたら、すみません🙇‍♀️よろしくお願いします！", "question_author": "あきえ728514", "answer": "【タイチ】\nあきえさんご意見ありがとうございます！\nO脚だと中々難しいですよね😓\n僕もO脚なので気持ちわかりますよ！\n股関節から内旋させる感覚はわかりますでしょうか？\n昨日のレッスンで座って膝を90度にしたまま手を膝の内側から添えて、手と膝の内側で押し合う動きです！\nあれを実践して頂くと母指球から内腿が繋がる感覚がわかると思います👍\n\n---\n\n【あきえ728514】\nお返事ありがとうございます！\n手と膝で押し合う動きで内腿の感じわかります！しばらくこれを続けてみようと思います。\nあと、股関節のアーカイブ(昨日見ました)でも内腿使う動きがたくさんあったので、こちらも繰り返しやってみようと思います！", "answer_authors": ["あきえ728514", "タイチ"], "date": "2026-03-08", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1480188775320653997", "reply_count": 2, "message_id": "1480188775320653997", "tags": ["回答済み", "股関節", "脚の形", "腰", "腸腰筋", "膝"]}, {"question": "3日連続レッスンありがとうございましたー！\n\n肩が詰まる、股関節が詰まるって感覚がよくわからないんですが、実際どんな感じになるんでしょうか？\n特に違和感感じてないと思ってるんですけど、そーすると詰まって無いってことでしょうか？？", "question_author": "ずっきー763893", "answer": "【タイチ】\nそうで date": "2026-03-11", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1481213669948919909", "reply_count": 2, "message_id": "1481213669948919909", "tags": ["ストレッチ", "回答済み", "柔軟性"]}, {"question": "今日のライブレッスンありがとうございました。\n長年、趣味ではありますがクラシックバレエをしております。\n股関節を傷め、よくないコンディションのままコロナ禍に入り、閉じこもっているうちに股関節が悪い状態で固まってしまいました。\n少しずつ戻ってきてはいるのですが、なかなか苦労しています。\nよいリリースとストレッチのアーカイブ動画があったら教えてください。", "question_author": "yukiyuki511927", "answer": "【タイチ】\nライブレッスンご参加ありがとうございました！😌\n長年バレエの中で股関節を傷められたということで、無理せず少しずつ戻していきたいですね\n\nリリースとストレッチが入ったアーカイブをおすすめさせて頂く前にいくつか質問させて下さい！\n\n①どこが硬くなっていると感じていますか？(どこをリリースしたいか)\n②どんな動きができるようになることを目標としていますか？(これによって行うストレッチとトレーニングが変わってきます)\n\nご回答お待ちしてます！\n\n---\n\n【yukiyuki511927】\nタイチさん、お忙しい中、ご返信ありがとうございます。\n\n悪いのは左なのですが、硬くなっていると感じるのは臀筋の奥の方と、左の大腿骨の付け根の外側(腸骨の突起からまっすぐ下に下ろしたあたりの脚の付け根)が癒着したみたいに張り付いているように感じていて、それが股関節内外旋、脚を凱旋した状態で股関節を折り畳む動きを阻害しているように感じています。\n\nまた、片脚で屈伸した時に、左はうまく股関節を折り畳むことが難しくて、変な代償動作が出てきます。\n固めて守る癖がついてしまってるようです。\n\n一時は普通に歩くのも難しかったのですが、いろいろな先生方にお世話になり、日常生活には支障のないところまで回復しています。整形外科の先生からも手術は不要と言っていただきました。\nが、バレエの動きにおいては、片脚でまっすぐおりて(関節を折り畳んで)床を踏んでまっすぐ上がる、ということがうまくできません。\nまた、股関節がうまく折り畳まらないので、股関節外旋した状態で、脚もあがりません。\n\n左半身は、人が当たり前に生まれつき身につけているプログラム(歩くとか走るとか、片脚に立つとかとっさにバランスを取るとか)が壊れてしまったように感じており、脳と体の再教育と股関節の可動域をできるだけ取り戻したいと思っています。\n\n---\n\n【タイチ】\nyukiさん\n\nお返事大変お待たせしました🙏\nまた、ご丁寧にご自身の状況も共有いただきありがとうございます。\n\n長年クラシックバレエをされているとのこと、本当に素晴らしいですし、\n股関節を痛めながらも少しずつ戻していけてるのはな過程だと思います！\n\nコロナ禍で動けなかった期間も含めて\n「悪い状態で固まってしまった感覚」があるのは良く聞く話なので心配しすぎないように！\n焦らずに“正しく緩める⇨正しく使う”を積み重ねていきましょう◎\n\n⸻\n\nおすすめのアーカイブをお伝えすると、いきなり伸ばすよりも\n**「リリース→可動域を出す→筋肉を使う」**の流れがかなり大切だと思います。なので👇\n\n① 下半身の特化筋膜リリース\n\nhttps://youtu.be/va5o1hiKfhQ?si=8bP9jihi1OvuvpZN\n\n→ まずは股関節まわり（お尻・内もも・前もも）をしっかりゆるめる\n→ 固まっている状態を一度リセットするイメージです\n\n② 股関節クラス\n\nhttps://youtu.be/Zt76wm92JmU?si=h66OBwXBjgiGyHl3\n\n→ 無理に開脚を狙うというより、\n　股関節の“はまり”や動かし方を知って、整えるクラスがおすすめです\n\n③ 全身調整\n\nhttps://youtu.be/YhO6MQUsMhY?si=j4on_duXFYKRcbp0\n\nhttps://youtu.be/j0nISjUU-Yw?si=70BHnLBcrC92k7Dz\n\n→ バレエやスポーツをされている方は特
