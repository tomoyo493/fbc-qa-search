ついてきている気がします。骨盤内とか股関節の癒着とかもあるのかな？解剖学が好きだし分かりやすいので時間がある時に教えてほしいです🙏マスターして前屈 で上半身と下半身をペッタリしたいです💪", "question_author": "hiroe585658", "answer": "", "answer_authors": [], "date": "2026-04-18", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1494977083833712721", "reply_count": 0, "message_id": "1494977083833712721", "tags": ["LIVE回答", "股関節", "膝", "骨盤"]}, {"question": "質問です！\n腸腰筋が弱いです。\n腸腰筋を鍛える動きで、長座で足を上げる動きの時、内転筋を入れながら足を上げることが大事だとレッスン中に説明されてたんですが、ブロックやピラティスボールを挟みながらだと内転筋が入っていることがわかるんですが、ブロックなどを抜いた途端に内転筋の入れ方がわからなくなってしまいます。\n開脚して足を上げる動きも同じで内転筋の入れ方がわかりません。\nどのようにしたらいいでしょうか？\nアドバイスを頂けたら嬉しいです！", "question_author": "りな788081", "answer": "", "answer_authors": [], "date": "2026-04-20", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1495797212024668252", "reply_count": 0, "message_id": "1495797212024668252", "tags": ["LIVE回答", "内もも", "腰", "腸腰筋", "開脚"]}, {"question": "No.51膝を曲げるのアーカイブをやりました。\nボールをお腹に挟んで前屈するとモモ裏は痛くない。\nボール無しだとモモ裏が張っていたい。付け根から痛みがきます。\nこの違いは何でしょうか❓\nボール有りだとお尻がプリと出来てないからでしょうか\n\n最近モモ裏と付け根が痛くて逆にやらない方がいいのか、縦開脚や横開脚しても痛いけどちょっとむりしてやってしまいます。\n痛いときは他に何かやり方はあるんでしょうか。", "question_author": "岡本陽子111559", "answer": "", "answer_authors": [], "date": "2026-04-21", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1495994931746046064", "reply_count": 0, "message_id": "1495994931746046064", "tags": ["LIVE回答", "お尻", "痛み", "膝", "開脚"]}, {"question": "こんばんは😊\nタイチさん、お忙しい中お返事ありがとうございます。\n\n内側を意識しようと思うと、どうしても母指球を強く踏み込まないといけないと思ってしまい、そのために足首にも違和感を感じて気にしてしまうと、バランスのとれる慣れた外側に重心をかけてしまいます。\n\n常に外側に少し開いてしまう足先を真っ直ぐに整える意識を優先して、母指球に体重を乗せるイメージをつかみたいと思います。\n\nヨガで土台をしっかり保ちたいのに、どうしても上半身に意識が向いてしまい常に力んで肩がガチガチで足元グラグラになってしまいます😢\n\n骨盤前傾後傾、坐骨で床を踏む、腹圧、腸腰筋など苦手なものばかりで出来ない事に目がいき、皆さんのコメントをみると頑張ってるなーっと思いながらも、自分はやらない理由ばかりを考えてしまいアーカイブを少し眺めるだけで次は頑張るから今日はいいかと休んでばかりですが、少しずつでも変化を掴めるように、まずは自分も身体を動かして行きたいと思います😊\n\nお返事いただけて嬉しいです。\nまずは眺めるだけでなく、やってみて身体の変化を楽しみたいです！\n\nありがとうございます😊", "question_author": "いぬみ822116", "answer": "", "answer_authors": [], "date": "2026-04-21", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1496107185040785468", "reply_count": 0, "message_id": "1496107185040785468", "tags": ["LIVE回答", "ヨガ", "肩", "腰", "腸腰筋", "足首", "首", "骨盤"]}, {"question": "おはようございます😊\n\n毎日楽しくトレーニング動画見ています！\n\n1つ質問です☝️\n\n90分など長い時間の\n動画を最初から最後まで見る時間がなかなかなくて\n\n朝と夜に分けて\n運動してるのですが\n\n1つの動画を\n朝と夜で分けているのは、あまり良くないのでしょうか🥺\n\n毎日、朝と夜に\n運動する時間をとってるのですが、\n今までは、朝と晩15分ずつ位で\n最近ちょっと伸びて\n朝と晩30分ずつ位運動してるんですが、それでも時間が足りなくて🤣🤣\n\nもうこれ以上運動の時間\n伸ばせなく。。はないけど。。笑\n\nどうしたらいいんでしょうか？🤣😂🤣😂\n\n他の皆さんはどうしてるのかなぁー\nと思いながらいつも運動しています笑", "question_author": "香織　45058", "answer": "【アルム469279】\nおはようございます。\n\n僕は時間がない時はショート動画などをみてます。\n\n15から20分とか短い時間なので。\n\n朝と晩で30分時間があるのであれば、30分とかの動画とかもあったと思うのでそちらもおすすめです。\n\n休みの日とか時間が取れるときがあれば90分のアーカイブをやってみるといいと思います。\n\n---\n\n【香織　45058】\nありがとうございます😭😭\n\nそれがーー\n\n毎日ショート動画じゃないやつをやりたい気持ちでいっぱいでー😂😂🤣🤣\n\nショート動画も、朝にやったりとかしてるんですが\n\n魅力的なのがたくさんありすぎて\n\nやりたい気持ちと\n時間が反比例してます🤣🤣\n\n---\n\n【なな426430】\n香織さん、おはようございます。私はできるだけ一度にやりたいけれど、分けてやることあります。\n\nアーカイブはゴールのポーズに向けて、複数の要素の組み合わせになっているので…2回目以降に続きからやるときは、早回しで前に何やったかな？と確認して、各エクササイズの位置付けや全体の流れをザックリ把握してからやるようにしています。\n\nあとは、アーカイブは一度やって終わりではなく、何回もやって効果が出るものだと思うので…とりあえず、1回目は細切れでも1つ1つのエクササイズに慣れ、2回目は位置付けを意識しながら分けてやり、3回目は時間のある時にできればまとめてやる、みたいなやり方もありかなと思います。\n\n---\n\n【香織　45058】\nありがとうございます😍😍\nたしかに\n2回目やったものは\n1回目よりも、すんなりと頭に入ってきて\n腑に落ちるところが多かったです！\n\nがんばってやってみます！\n\n皆さんのやり方、めちゃくちゃ参考になります！", "answer_authors": ["アルム469279", "香織　45058", "なな426430"], "date": "2026-04-22", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1496283025804365844", "reply_count": 4, "message_id": "1496283025804365844", "tags": ["トレーニング", "回答済み"]}, {"question": "いつもレッスンやアーカイブ配信ありがとうございます！\n\n質問です。\n【ダウンドッグの基礎作りクラス】でレッスン後の質問タイムで「坐骨を引くのがあまりうまくできなかったのですが、長座で骨盤立てられないのと関係ありますか？」と質問したら、「長座で骨盤立てられないのは坐骨引くのか苦手で、膝と坐骨の距離が縮まってる」と答えていただきましたが、距離を伸ばすにはどうしたら良いでしょうか？ハムストリング緩めるストレッチをしたり、ダウンドックのアーカイブで坐骨を引く練習すれば良いでしょうか？？他にオススメのアーカイブがあれば教えていただきたいです🙏✨", "question_author": "asami 744405", "answer": "【Hitomi179012】\nasamiさん、初めまして！\nタイチさんへの質問かと思いましたが、お待ちの間に私が普段やっている事を共有させて頂ければと思い、コメント失礼します☺️\n\nアーカイブは私もまだあんまり出来てないのですが、私もハムストリングが突っ張る感じがする時多々あるので、筋膜リリースをやっています！ストレッチポールや筋膜リリースボールをお持ちでしたら、それをお尻と裏ももの境目から膝裏の手前にかけてコロコロすると、かなり突っ張り感がなくなります🙆🏻‍♀️\n筋膜リリースする方の足は伸ばして、反対の足は膝を立てて、手を床について支えながらやるとバランスが取れると思います😌\n\n---\n\n【asami 744405】\nHitomiさんはじめまして✨\n私の質問を気にかけてくだりとても嬉しいです🥹💕\n\n私は普段の生活でもつい前腿使ってしまいハムストリングがパイプの様に硬いんです😅\nそのせいで腸腰筋が冬眠状態なので今は目覚めてもらえるlessonを中心にやっています🐻\nやっぱりリリースも大切ですよね！！\n平日は1時間位しか時間が取れないので筋膜リリースあまりしてませんでした💦\n具体的に説明していただいてとてもわかりやすいです🙌\n早速やってみますね！\n\nアドバイスありがとうございました😊✨\n\n---\n\n【Hitomi179012】\nasami さん、\n平日でもしっかり1時間確保されてるの凄いです👏🏻\n\n私もハムストリングはすぐ硬くなってしまいますが、ほぐすしてダウンドックとかするとお尻の上がり方が全然違うので、やっぱり縮んでたんだ😲と実感します笑\n\nお世話になっているセラピストさんからアドバイスされたのですが、負荷が強めな運動をいきなりすると体がビックリして、余計に硬くなってしまうと言われ、私はその状態だったので、平日は運動するよりもリリースを中心に実施しています😊\n休日にリリースからしっかり動く所までフルコースです笑\n\n何か良さそうなアーカイブ見つけたらぜひ教えてください☺️\n\n---\n\n【asami 744405】\nHitomiさん✨\n確かにある程度ほぐしてからトレーニングしないとですよね💦\n\nタイチさんが柔軟には筋力も必要とおっしゃっていて、リリースと筋トレ両方大切なのですが私はどちらも足りてないので、自主トレの時は両立できるよう心がけたいです✨\n\nアーカイブですが、【No.51膝が曲がるを変える】の中の椅子に座ってストレッチポールを裏腿に当て膝を屈伸させるリリースは私に合ってる気がします。\n私はハムストリングが収縮して膝が伸びないので💦\nお尻の硬さや筋肉不足も原因だと思うので【4/13の45分クラス】や【No.27】でお尻鍛えてます🍑\nもうご覧になってるかもしれませんが😅\n\nHitomiさんもおすすめアーカイブあったらぜひ教えてくださーい🥰\n\n---\n\n【Hitomi179012】\nasamiさん、\nアーカイブありがとうございます😊\n\n確かに！ハムストリングが硬い方は膝が伸びないので、私がお伝えした方法だと難しいですね💦盲点でした🥹勉強になります！\n\nタイチさんからもメールが来ていたのでご覧になっているかもしれないですが、「下半身に特化した筋膜リリース」は本当に下半身全体がリリース出来るのでとても良いと思います🙆🏻‍♀️ 私も普段はここまで丁寧に出来ない事が多いですが、自分のお悩み別に取り入れるのも良いかもしれないです😊\n\n---\n\n【はる782206】\n@タイチ タイチさん、いつもご丁寧な返信ありがとうこざいます😊\n承知しました。\n\n朝早くに起きる意味もなくなってしまいますもんね😆\n頑張って早起きも習慣にしていきたいと思います🌞\n\nありがとうございました。", "answer_authors": ["asami 744405", "はる782206", "Hitomi179012"], "date": "2026-04-22", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1496442590038458471", "reply_count": 6, "message_id": "1496442590038458471", "tags": ["お尻", "ストレッチ", "トレーニング", "ヨガ", "リリース", "前もも", "回答済み", "柔軟性", "腰", "腸腰筋", "膝", "骨盤"]}, {"question": "いつもありがとうございます。\n3月に入会させていただき、動画はアーカイブを拝見しております。\n初めての書き込みとなります。\n\nディスコードとアーカイブ動画をすべて見れていないのですが、まずどの動画を見て取り組むべきなのか、自分のレベルもわからずにいます。\n横開脚を頑張っていきたく、いくつか拝見して取り組んでますが、アーカイブ動画はどれがいちばん初めに見るべきだったのか、また一度見た動画を繰り返し取り組むべきなのか、それともステップアップしていくのか、ステップアップするには何の動画をどの順番で見る必要があるのかわからずにいます。\nたくさん提供してくださってるコンテンツの内容をしっかりいかせてない自分にもどかしさを感じており…\n質問内容もまとまらず申し訳ありませんが、アドバイスいただけますと幸いです。\nよろしくお願いいたします。", "question_author": "うめ822594", "answer": "【タイチ】\nいつもありがとうございます😊\nそして初めての書き込み、とても嬉しいです！\n\n今のように\n「どれからやればいいか分からない」\nという状態になるのは恐らくほとんどの方が思っていることだと思うので１つご安心頂ければと思います！\n\nその対策として今、ちょうど\n開脚までのSTEPを4段階に分けたカリキュラムを作成しており、\n本来であれば昨日配信予定だったのですが、\n息子の事情で少し遅れてしまっています🙏\n\n申し訳ございません。\n\n完成次第、全体告知で配信しますので\nまずはそちらをベースに進めていただければ大丈夫です！\n\nそれまでの間は👇\n\n・前屈系・ダウンドッグの基礎クラス\n・上半身・下半身の筋膜リリース編\n\nこの2つを中心に、\n同じ動画を繰り返し取り組む形でOKです！\n\n開脚は\n「いろんな動画をやる」よりも\n1つ1つの動きを正しく積み重ねることが一番大事なので、筋肉痛がひどくない限りは同じものを繰り返しおこなって頂いて問題ありません⭕️\n\n---\n\n【うめ822594】\nお忙しい中ご回答くださりありがとうございます🙇‍♀️\nカリキュラム作成してくださってるとのこと、楽しみです！\n小さなお子様がいらっしゃるとても貴重な毎日の中で、コンテンツを提供してくださってること、本当にありがたく思ってます🙏\n\nご教示いただいた動画にまずは取り組んでいきます✨\nありがとうございます！", "answer_authors": ["うめ822594", "タイチ"], "date": "2026-04-26", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1497914379734220831", "reply_count": 2, "message_id": "1497914379734220831", "tags": ["ヨガ", "リリース", "回答済み", "開脚"]}, {"question": "こんばんは！本日の毎日LIVE、夜レッスンはありますか？？", "question_author": "K 822392", "answer": "", "answer_authors": [], "date": "2026-04-27", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1498292675634528417", "reply_count": 0, "message_id": "1498292675634528417", "tags": ["LIVE回答"]}, {"question": "毎日ボディメイククラスのところを見ると、zoomのIDとPW出てますよ", "question_author": "まみぞう(９期生)822109", "answer": "【K 822392】\nまみぞうさん、ありがとうございます！！迷子になってました。参加できました。\n\n---\n\n【まみぞう(９期生)822109】\n良かったです🧡\n\n---\n\n【K 822392】\nほんとに助かりました🥹 こちらの質問に気づいて教えてくださりありがとうございました❤️\n\n---\n\n【まみぞう(９期生)822109】\n実は私も少し前に迷子になってました😅\nちょうどスマホを見ながら、zoomを開いた直後でしたので、タイミング良かったです👍", "answer_authors": ["K 822392", "まみぞう(９期生)822109"], "date": "2026-04-27", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1498293636063039529", "reply_count": 4, "message_id": "1498293636063039529", "tags": ["回答済み"]}, {"question": "@everyone\n\n皆さん質問部屋にたくさんのご質問をありがとうございます✨\n\n現在、ご返信が十分にできておらず\nご迷惑をおかけしてしまい申し訳ございません🙇‍♀️\n\nいただいているご質問につきましては、\n**1週間以内に順番にご返信させていただきます。**\n今しばらくお待ちいただけますと幸いです😌\n\nよろしくお願い致します！", "question_author": "タイチ", "answer": "", "answer_authors": [], "date": "2026-04-30", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1499309004743250072", "reply_count": 0, "message_id": "1499309004743250072", "tags": ["LIVE回答"]}, {"question": "いつもご丁寧な返信、レッスンをありがとうこざいます😊\n質問です。\n早朝LIVEレッスンのアーカイブはありますか？\nどなたかご質問されていたらすみません🙏\n\nよろしくお願いいたします。", "question_author": "はる782206", "answer": "【タイチ】\n早朝クラスのアーカイブは一応データとして残してはいるのですが、コンテンツを全てアーカイブ化すると、あまりにも増えすぎて、皆さんが何をすればいいのかさらに迷われると思うので、今のところ残す予定はないです！\n\n基本的にアーカイブは僕のコンテンツをおこなうことを推奨しています！\n時短トレや、筋膜リリース編、最近では30分〜45分ショートバージョンのクラスも出してるのでそちらのアーカイブを視聴することをオススメします🙂‍↕️\n\nhttps://www.notion.so/FBC-2b6079b8449d80a59f72f26ab6ffa417?source=copy_link", "answer_authors": ["タイチ"], "date": "2026-04-30", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1499330465193136218", "reply_count": 1, "message_id": "1499330465193136218", "tags": ["リリース", "回答済み"]}, {"question": "上半身特化 筋膜リリースの質問です。\n二の腕ほぐしで、フォームローラーに二の腕を乗せて肘を曲げる動きで、肘を伸ばした状態から曲げる時に「クネ」ってなるんですが、これは二の腕が硬いからですか？フォームローラーに二の腕乗せてない時は普通にまっすぐ？曲げれるのに、ローラーに乗せた途端「クネ」ってなるので改善策があれば教えて欲しいです。", "question_author": "ryoko818 822328", "answer": "", "answer_authors": [], "date": "2026-05-03", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1500300467299942581", "reply_count": 0, "message_id": "1500300467299942581", "tags": ["LIVE回答", "リリース", "柔軟性"]}, {"question": "5/3タイチさんのLIVEレッスンに参加しました。\n股関節の外旋の動きで、最後のバンドを使ったトレーニングの時、膝を床方向に動かすと股関節らへんの骨がポキポキズレるように動く感じがあります。股関節の硬さのせいなのか、動かし方が悪いのかわからず…改善できる方法があれば教えて頂きたいです。", "question_author": "hana781979", "answer": "", "answer_authors": [], "date": "2026-05-03", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1500480610689351853", "reply_count": 0, "message_id": "1500480610689351853", "tags": ["LIVE回答", "トレーニング", "柔軟性", "股関節", "膝"]}, {"question": "hanaさんと、似たような質問になりますが、\n5/3の【股関節のリセット外旋を上手くなろう‼︎】の、バンドを使った動きで、股関節に近い裏腿のあたりの筋？がゴリゴリいいます。\n\n以前、アーカイブにて似たような動きをした際に、すごく痛かったので、弱いと思い、できるだけ練習するようにしたので、マシにはなりましたが、繰り返し行っていると、ゴリゴリしなくなるのでしょうか⁇", "question_author": "mayu763614", "answer": "", "answer_authors": [], "date": "2026-05-03", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1500483285392822414", "reply_count": 0, "message_id": "1500483285392822414", "tags": ["LIVE回答", "股関節"]}, {"question": "お世話になります。\n\n5/3の外旋トレーニングで\n四つん這いになり足上げをする動きのことで質問があります。\n足を膝が高くなるように上げるときに手(上げている側)もかなり強く押されてしまいます。\n押す力の左右差が大きすぎていますがあっているでしょうか？\nよろしくお願いします🙇", "question_author": "ともみ764251", "answer": "", "answer_authors": [], "date": "2026-05-04", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1500658322905235560", "reply_count": 0, "message_id": "1500658322905235560", "tags": ["LIVE回答", "トレーニング", "膝"]}, {"question": "「No51 膝が曲がるを変える」のアーカイブを受けました！\n\nやる前は大腿四頭筋を使って膝を伸展していましたが、明らかにハムストリングを使って膝を伸展出来るようになりました🙌🏻\n\n質問ですが、ヨガを10年くらいやっていますが、インストラクター10人いたら10人とも、膝を伸ばし過ぎるのは良く無いと言われました。ピンと伸ばし過ぎるのは膝がロックされて痛めてしまうと。このアーカイブでは、膝を向こうに押し出すと言うような説明があったかと記憶しているのですが、それは、膝を伸ばし過ぎる事に繋がらないのでしょうか？所謂ロックになっている感じがしまして、質問です！", "question_author": "Hitomi179012", "answer": "", "answer_authors": [], "date": "2026-05-05", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1501187967341822093", "reply_count": 0, "message_id": "1501187967341822093", "tags": ["LIVE回答", "ヨガ", "膝"]}, {"question": "いつもお世話になっております\n\n縦開脚、横開脚を頑張るにあたって、動画内でレクチャーしていただいてるお尻トレーニングを普段の筋トレに取り入れたりと試みています。\n\nお尻外側とお尻と腿の付け根あたりに筋肉痛が出てきました。そうすると、縦開脚や横開脚の深さが筋肉痛になる前よりも浅くなって、焦ってしまいます。\n\nこのまま、お尻トレーニングは継続した方が良いのか、筋肉痛が出た際の対処法や、ストレッチにどう向き合っていくのか、教えてもらえたら嬉しいです！", "question_author": "まつだ822477", "answer": "【asami 744405】\nまつださんはじめまして☺️\n\nタイチさんが筋肉痛について\n『運営発信♯タイチの呟き【筋肉痛をどう捉えるべきか】』\nでお話しされてますので、タイチさんからご返答があるまで参考になると思います！\nすでにご覧になっていたらごめんなさい🙏💦\n\n私はサロンに入るまであまり体動かす生活してなかったので初めは筋肉痛との戦いでしたが、これを読んで筋肉痛は「成長痛」だと思って体の変化を楽しんでいる最中です✨\n\n---\n\n【アルム469279】\nhttps://discord.com/channels/1441619538293686387/1446502415070269571/1451055033893392384\n\nあさみさんがいってるのは\nこの話だと思います。\n\n---\n\n【asami 744405】\nアルムさん\nリンク貼ればわかりやすかったですね😅\nありがとうございます😊\n\n---\n\n【タイチ】\n筋肉痛が出るのは、\n“使えていなかったお尻”が働き始めた良い反応の可能性が高いです！\nその状態で開脚が浅くなるのも自然です！\n\n硬くなったというより、\n痛みから守ろうとして身体が力んでいる状態なので柔軟性が落ちたわけではありません🙂‍↕️\n\nお尻が使えるようになると、\n✔ 骨盤が安定する\n✔ 股関節がハマる\n✔ 痛めにくくなる\nので、最終的に深い開脚へ繋がります🙆‍♂️\n\nただ筋肉痛が強い日は、\n\n・無理に開かない\n・軽く動かす\n・筋膜リリースをする\n\nくらいで大丈夫なので、筋肉痛後には戻り、また柔軟をおこなえば問題なく可動域は上がっていきますのでご安心下さい👌", "answer_authors": ["アルム469279", "asami 744405", "タイチ"], "date": "2026-05-08", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1502273976309776384", "reply_count": 4, "message_id": "1502273976309776384", "tags": ["お尻", "ストレッチ", "トレーニング", "リリース", "回答済み", "柔軟性", "痛み", "股関節", "開脚", "骨盤"]}, {"question": "5/8脚の後面ワークアウトに参加しました。\nかかとを床に押し付けながら膝を曲げる時は腿裏に力が入ってるのは分かるんですが、脚を床から離して膝を曲げると、前腿にどーしても力が入ってしまいます。お腹薄くして姿勢も意識はしてますが腸腰筋の使い方がイマイチ分かりません\nあと、どのアーカイブを参考にすればいいのか教えて頂けるとありがたいです。", "question_author": "岡本陽子111559", "answer": "【タイチ】\nお腹を薄くキープできているのは⭕️です！\n\nその上で、\n\n✔ 下腹部まで締まっているか\n✔ 坐骨で床を押せているか\n✔ 骨盤前傾が少し作れているか\n\nここも確認してみてください！\n\nさらに、\n“内腿を軽く使う意識”を入れながら膝を引き寄せると、\n前腿の力みが減りやすいです！\n\nもし感覚が掴みにくければ、\n最新の「床反力クラス」アーカイブがおすすめなので、トライしてみて下さい🙂‍↕️\n\n---\n\n【タイチ】\nお返事遅くなり、お待たせしました🙇‍♂️\n\n脚を床から離した瞬間に前腿に入りやすいのは、\n「床を押す感覚」が抜けてしまっているのが原因の1つかと思います！\n\nまずは、坐骨で床を押し骨盤を起こす。\nそこからもも裏を使う意識で引き込む。\n\n特に“床反力”を使えるようになると、\n前腿で無理に持ち上げる感覚が減って、腸腰筋やもも裏がかなり使いやすくなってきます！\n\nそれでも前腿に入りやすい場合は、内腿（内転筋）のトレーニングもかなり重要なので、そちらも意識してみてください！\n\nおすすめアーカイブは、\n①床反力クラス\n②54 ブレない軸を作る ボートポーズチャレンジ\n\nあたりが特に参考になると思います🔥", "answer_authors": ["タイチ"], "date": "2026-05-08", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1502306282646929659", "reply_count": 2, "message_id": "1502306282646929659", "tags": ["トレーニング", "内もも", "前もも", "回答済み", "姿勢", "腰", "腸腰筋", "膝", "骨盤"]}, {"question": "アルムさん、あさみさん\nありがとうございます。参考になりました！！\n\n焦りもなくなり、成長痛と捉えて参ります⭐️\n\nサロンに入会したのが3月からだったので、過去のアーカイブを先輩方に共有してもらえて大変助かりました。", "question_author": "まつだ822477", "answer": "", "answer_authors": [], "date": "2026-05-08", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1502316300922392628", "reply_count": 0, "message_id": "1502316300922392628", "tags": ["LIVE回答"]}, {"question": "タイチさんいつもご丁寧なレッスンをありがとうこざいます😊\n質問です。\nLevel10のオンラインパーソナル申し込みの期限はありますか？", "question_author": "はる782206", "answer": "【タイチ】\nはるさんお問い合わせありがとうございます✨\n特典のパーソナル機嫌に関しては、特に設けていませんのでご周知下さい😊\n\n---\n\n【はる782206】\nタイチさん、いつもありがとうございます。\n特に設けてないのですね👀\n助かります✨\nタイミングを見て、ゆっくり返信したいと思います。\nよろしくお願いします😊", "answer_authors": ["はる782206", "タイチ"], "date": "2026-05-10", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1502855223205564538", "reply_count": 2, "message_id": "1502855223205564538", "tags": ["回答済み"]}, {"question": "皆さまに質問です🙇‍♂️\nメンズのヨガウェアを探しているのですが、実際に使って良かったメーカーさんや、おすすめの商品があれば教えていただけないでしょうか？\n\n動きやすさ重視で、ヨガやストレッチに向いているものを探しています。よろしくお願いします🙇", "question_author": "たーくん 782461", "answer": "【タイチ】\nルルレモンorゼクシィミックスおすすめです！\n匂いも気になりにくいし、長持ちもします！\n可動域MAXで動いてもよれにくい👕\n\nオススメです！\n\n---\n\n【たーくん 782461】\nタイチさんありがとうございます🙇　早速探してみます！", "answer_authors": ["たーくん 782461", "タイチ"], "date": "2026-05-13", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1503980797789606000", "reply_count": 2, "message_id": "1503980797789606000", "tags": ["ストレッチ", "ヨガ", "回答済み", "柔軟性"]}, {"question": "お世話になります。　\nいつもわかりやすいレクチャーありがとうございます😊\n「床反力を鍛えて、痛めないしなやさかを作る」に参加しました。\n長座で膝を曲げた状態から、片足ずつ引き寄せる動きで、どうしても右足だけ軽くしか引くことが出来ず、骨盤も倒れやすいような気がします。左右差が大きいです。\nいつも右の腸腰筋の詰まりを感じて、たまにリリースボールでほぐすのですが、変化する感じがしないです。\n何かアドバイスいただけたらうれしいです。\nよろしくお願いします。", "question_author": "あず45454", "answer": "【タイチ】\n左右差がある状態ですね！\n\n特に右足は、\n腸腰筋の“使える可動域”がまだ脳にインプットされていない可能性があります💡\n\nなので、\n右足だけバンドを足裏に巻いて、\n外的補助を使いながら引き寄せるのもおすすめです✨\n\nそうすると脳が\n「右足ってここまで腸腰筋で動かせるんだ！」\nと少しずつ覚え始め、\n神経系の動きが繋がりやすくなります🙂‍↕️\n\n無理に高く上げるより、\n骨盤を安定させながら丁寧に繰り返すのがポイントです！\n\n---\n\n【あず45454】\nお忙しい中、ありがとうございます‼️\nバンドを使ってコツコツやってみます💪", "answer_authors": ["あず45454", "タイチ"], "date": "2026-05-13", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1504108274503389336", "reply_count": 2, "message_id": "1504108274503389336", "tags": ["リリース", "回答済み", "柔軟性", "腰", "腸腰筋", "膝", "骨盤"]}, {"question": "質問失礼します。\n床反力を鍛えるレッスンに参加させていただきました😊\n\n側屈の際、伸ばしている足側の坐骨を押してしまい、曲げている足側の坐骨を上手く押せなかったのですが、可動域よりも倒しすぎているのか、やり方が間違っているでしょうか。\nなるべく倒すことよりも坐骨を押せる範囲で倒すようにした方が効果は高いですか？\nご多忙中とは存じますが、またお手隙の際に教えていただけましたら幸いです😊\nよろしくお願いいたします🙇‍♀️", "question_author": "Aki763562", "answer": "【タイチ】\nおっしゃる通りなるべく倒すことよりも、\n曲げている脚側の坐骨で床を押し、骨盤が安定したままおこなう方が効果は高いです✨\n\n特にその感覚があると、\n腰の側面奥側のインナーまでしっかり伸びやすくなります！\n\n逆に、\n倒すことを優先しすぎると、\n骨盤が傾くことでお腹側面が潰れ伸ばしたい場所が抜けるので、押せる範囲で倒す意識で大丈夫です🙆‍♂️\n\n---\n\n【Aki763562】\nご回答ありがとうございます😊\n承知しました🫡！\n押す方を意識して行っていきたいと思います😊\nお忙しい中ご回答ありがとうございます✨", "answer_authors": ["Aki763562", "タイチ"], "date": "2026-05-14", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1504162018557427713", "reply_count": 2, "message_id": "1504162018557427713", "tags": ["回答済み", "柔軟性", "腰", "骨盤"]}, {"question": "5/13のレッスンの際、坐骨の方は分かりやすかったのですが、足底で床を押す感覚が掴めませんでした。\n踵と母指球、踵と小指球はそれぞれできるのですが、3点で満遍なく押す感覚がわかりません。また、母指球側を意識すると内側の筋肉が使われるとおっしゃっていたような気がするのですが、それもあまり分かりませんでした。ショート動画でも同じような動画があったのでやってみたのですが、こちらも使っている感覚が分からず…。\n内転筋が弱いorストレッチが足りていないのでしょうか…？\n\nコツや参考になるアーカイブ動画などがあれば教えていただきたいです！", "question_author": "蒼743048", "answer": "【タイチ】\n母指球側でボールを踏んでおこなった時は、\n足裏で押す感覚はありましたか？🤔\n\n基本的に「3点で立つ」とは言いますが、\n実際は“3点だけに乗る”というより、つま先側だけ小指側だけ\n踵だけなどに偏らず、\n足裏全体で満遍なく踏めている感覚に近いです💡\n\nなので、\n「3点を完璧に感じなきゃ！」と思わなくて大丈夫です👌\n\nまた、\n母指球側を使うと内転筋が入りやすいのはありますが、\n最初はかなり感覚が分かりづらい方も多いです！\n\nなので、内転筋が弱いというより“まだ神経的に繋がっていない段階”の可能性が高いです！\n\nもし踏めている感覚が薄ければ、①母指球側②小指球側③踵側\n\nそれぞれにボールを置いて、\n踏みながらお辞儀するエクササイズを試してみてください！\n\n感覚が繋がりやすくなると思います🦵", "answer_authors": ["タイチ"], "date": "2026-05-15", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1504681999871512747", "reply_count": 1, "message_id": "1504681999871512747", "tags": ["ストレッチ", "内もも", "回答済み"]}, {"question": "本日のLIVEレッスン参加しました。\n股関節を外旋して　縦開脚・スワンのポーズ・更にピジョンと進む中でどうしても左右差が。\n右膝は落としてある程度床に届きますが左はどうにも無理で……お尻の筋肉も使えている感じがしません。😖 \nロードマップを初めから！が重要ですか？", "question_author": "murao 763400", "answer": "【Tomoyo821741】\n私も左右差がハッキリ！\n\nmuraoさんと逆で、\n左のお尻にききましたが、右は上手く使えませんでした！\n今もジンジン感は左がより強く……\n\nどこに戻ってトレーニングしたらよいか、とっても気になりますね🥺😄\n\n---\n\n【タイチ】\nクラムシェルをした時も、\n左右差は感じましたか？\n\n片側の腰側面が硬くなっていると、お尻の筋肉が入りづらくなり、股関節の外旋にも左右差が出やすくなります💡\n\nなので、①側屈や\n②【30分クラス】背骨をリセット｜胸椎伸展をスムーズにしよう！\nなども入れながら、腰側面の左右差を減らしていくのもおすすめです✨\n\n特に、\n骨盤底筋＋お腹を薄く保ちながらクラムシェルをおこなうと、\nお尻の入り方がかなり変わりやすいです🔥\n\nなのでクラムシェルは継続しつつ“腰側面の硬さの左右差”も一緒に整えてみてください😊\n\n---\n\n【タイチ】\nTomoyoさんも\nぜひ☝️の回答を参考にしながら\n\n・クラムシェル\n・側屈\n・胸椎伸展クラス\n\nなどを組み合わせて取り組んでみてください😊🔥\n\n---\n\n【murao 763400】\n・クラムシェルはどちらも出来てない状態で左右差はない感じ\n・側屈は左右とも全く爪先には届かず　硬いです。\n・膝痛があり　正座あぐらは上手く出来ない状態\n\nでも、それなりに整えていけるように少しずつ取り組んでみます", "answer_authors": ["Tomoyo821741", "murao 763400", "タイチ"], "date": "2026-05-16", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1505078404565958737", "reply_count": 4, "message_id": "1505078404565958737", "tags": ["お尻", "スワン", "トレーニング", "ピジョン", "回答済み", "柔軟性", "股関節", "背中", "腰", "膝", "開脚", "骨盤"]}, {"question": "「背骨をリセット、胸骨伸展」のリアタイ、アーカイブどちらでも感じたのですが、肘を肩の高さに上げた状態から90度に曲げてくる動きと、その後体側を側屈させる動きで、特に体側側屈の方は、普通に体を曲げてしまえば側屈になるので、どこをどう使って側屈を取るのが正解か分かりませんでした💦\n\nまた、正座の状態で肘を90度に曲げて回旋する動きで、途中まで行くと、肩周辺が痛くなりどんどん肘が肩の高さよりも下がっていってしまいます。\n\nこの2点の正しい動きについて教えて頂きたいです！", "question_author": "Hitomi179012", "answer": "【タイチ】\n側屈の動きは、“ただ体を横に倒す”ことが目的ではなく、\n最初に肘を引き寄せる時に使った広背筋と大円筋の収縮を、\n側屈した時により強く感じられるかがポイントです💡\n\nなので、\n「どこを伸ばすか」よりも、\n“脇〜背中側面で側屈する”感覚でいきなり側屈せずに、まず①背中を使った②感じたままゆっくり丁寧に側屈を深める\nを意識してみてください！\n\nまた、\n回旋で肩が辛くなるのは、\n①肩甲骨が上がる\n②僧帽筋や肩が力む\nこの状態になっている可能性が高いです💡\n\nなので、①肩甲骨を下げる\n②鎖骨を長く保つ③胸を軽く立てる\n\nを意識したまま、\n肘を後ろへ引いてみてください！\n\n☝️最初の肘を曲げて引き寄せる時に使った広背筋・大円筋で肩甲骨を下げられると、\n肩甲骨が寄る感覚がかなり分かりやすくなると思うので、\n感じられるとはなまるです💮\n\n---\n\n【Hitomi179012】\nタイチさん、ありがとうございます🙇🏻‍♀️\n\n教えて頂いた事を意識して、もう一度やってみます💪🏻", "answer_authors": ["Hitomi179012", "タイチ"], "date": "2026-05-16", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1505142213426942013", "reply_count": 2, "message_id": "1505142213426942013", "tags": ["回答済み", "痛み", "肩", "背中"]}, {"question": "5/16LIVEレッスン参加しました。\n①スワンのポーズで前脚をマットと平行、足首90度にセットするのもやっとです。徐々に前脚が手前に引き込んでしまうようになってしまいます。床についている小指側側面押す意識はありますが、痛いです。改善できないでしょうか？\n\n②横開脚で膝を床に押しつける感覚、お尻をプリっとするのがわかるようになってきました。胸から前屈というときに背中が丸まってしまいます。どうしたらよいでしょうか？", "question_author": "ようこ 772420", "answer": "【タイチ】\n①痛いのは、床を押している足側でしょうか？\n\nその場合は、まずタオルなどを敷いて調整してみてください✨\n\nまた、脚が手前に戻ってきてしまうのは、まだ股関節の外旋＋お尻の筋力が足りていない状態の可能性が高いです💡\n\nなので今は、お尻の筋力UPと\n外旋可動域UPを優先したいのでアーカイブは引き続きおこなって下さい！\n\n加えて、膝が曲がってくる場合は、裏ももに力が入りすぎていることもあるので、適時チェックしながらおこなってみてください💡\n\n②横開脚の感覚が芽生えてきているの素晴らしいです🔥\n\nこの時の前屈は、“胸から倒す”\nというより、\n①背骨の反りを保ったまま\n②骨盤を前傾し続ける\n\nことで倒れていく感覚が理想です✨\n\nなので、上半身は「反ったまま」の意識でOKです\n\n“前に倒す”ではなく、\n「あ、骨盤が前傾したから、\n反ったまま勝手に倒れていく。」\nこの感覚を目指します！\n\n---\n\n【ようこ 772420】\nありがとうございます🙏 ❤️ \n①アーカイブをコツコツ続けてみます。股関節外旋とお尻🍑✨ \n②骨盤前傾すれば勝手にうごく。前傾のアーカイブをチャレンジしてみます。\n\n---\n\n【タイチ】\n背中トレも意識してやってみて下さいね✨\n\n---\n\n【ようこ 772420】\n背中も👀❗やってみます✨", "answer_authors": ["ようこ 772420", "タイチ"], "date": "2026-05-16", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1505152468223262920", "reply_count": 4, "message_id": "1505152468223262920", "tags": ["お尻", "スワン", "回答済み", "柔軟性", "痛み", "股関節", "背中", "膝", "足首", "開脚", "首", "骨盤"]}, {"question": "みなさんのLIVEレッスンいつも楽しみにしています😊\n久し振りに体重計に乗ったらかなり増えていて😱💧テンションガタ落ちしました…😭\nでも、筋肉量が結構増えてて、その分の増加だと信じたいです…😢\n\nちなみにLIVEレッスンはここ最近毎日のように頑張って参加してました。\n\nトレーニングしていて一時的に増えたことってありますか？", "question_author": "はる782206", "answer": "", "answer_authors": [], "date": "2026-05-17", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1505411022507479223", "reply_count": 0, "message_id": "1505411022507479223", "tags": ["LIVE回答", "トレーニング"]}, {"question": "ブリッジのアーカイブを繰り返しやっています。\n足で床を押す、胸を上に、肋骨を上にあげる、膝裏を伸ばす方向は胸と連動、スライドディスクを使っても前にすべらず足で押せてる、お尻ともも裏もつりそうになるから使えてる、背中に(胸の後ろ側)ブロックを当てて頭頂部を床に付ける、、、\nそこで手を頭の横に持ってきても上がらないのは、腕力が足りないからですか？😅", "question_author": "いづみん　331395", "answer": "", "answer_authors": [], "date": "2026-05-18", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1505867259371851806", "reply_count": 0, "message_id": "1505867259371851806", "tags": ["LIVE回答", "お尻", "肋骨", "背中", "膝"]}, {"question": "お世話になっております😊\n膝が曲がるを変えるレッスンを受講したのですが、\n意識を抜くとどうしても前腿に力が入ってしまっています。\n前腿で押してるというよりは、\n前腿を上に引き上げて緊張させてしまっている状態です。\n何度かアーカイブ見て注意点も気にしながらやってるのですが、どうしても前腿を緊張させてしまうのを止められません。\nどのようにアプローチしたら良いでしょうか😣\nもし既出の質問でしたらすみません💦\n\nちなみにですが、前屈はかなり深まって、ほぼガラケー状態までもっていけています！（まだまだ腿裏ふくらはぎ痛いですが😂）\nまたお手隙の際にご回答いただけたら幸いです。\nよろしくお願いいたします🙇‍♀️", "question_author": "Aki763562", "answer": "【Aki763562】\n繰り返し行ううちに裏腿、膝裏の使い方がわかってきて、前腿を使わずにできるようになりました！\nありがとうございました😊", "answer_authors": ["Aki763562"], "date": "2026-05-19", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1506254149736468502", "reply_count": 1, "message_id": "1506254149736468502", "tags": ["ふくらはぎ", "前もも", "回答済み", "痛み", "膝"]}, {"question": "5月16日のアーカイブ配信がされていないようなのですが、配信はされないのでしょうか？\nよろしくお願い致します。", "question_author": "Himeka25585", "answer": "【タイチ】\n返信お待たせしております。\n\n確認したところ、5月16日のクラスは機材トラブルにより録画が正常に保存されておらず、アーカイブを残すことができておりませんでした。\n\n楽しみにお待ちいただいていた中、申し訳ありません🙇‍♂️\n今後は再発防止に努めますので、ご理解いただけますと幸いです。", "answer_authors": ["タイチ"], "date": "2026-05-28", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1509510336552632330", "reply_count": 1, "message_id": "1509510336552632330", "tags": ["回答済み"]}, {"question": "タイチさんのレッスン(5月の平日の夜の会だと思います)終わりの質疑応答のところで骨盤底筋を鍛えることについてお話してくださってた会があったと思うのですが、どの会だったかわかる方いらっしゃいますか？\n\nすぐにメモが取れたら良かったんですが、骨盤底筋を鍛えるにあたっていくつかの部位を鍛えるかほぐすということをおっしゃっていたように記憶してるのですが、肝心な部位がまったく思い出せず教えていただけたら嬉しいです。", "question_author": "しのゆか765479", "answer": "", "answer_authors": [], "date": "2026-06-04", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1511751145779888178", "reply_count": 0, "message_id": "1511751145779888178", "tags": ["LIVE回答", "骨盤"]}, {"question": "こんにちは！\n今日はオフ会ありがとうございました。\nとても有意義な時間でした。\n\nオフ会のランチタイムに聞けばよかったのに、うかれておしゃべりに興じてしまい、質問しそびれました。\n\nスワンのポーズで、前の脚の膝下をマットと並行のところまで持っていく柔軟性が足りないようです。\nその柔軟性を得れば、いま私が抱えている不具合の解消に繋がる気がするのですが、これを少しずつでも解消するのに必要なものはなんでしょうか？\n自覚としては、お尻の柔軟性もさることながら(それも一因だとは思いつつ)、内腿が短くて伸びないのが一番強い気がしています。\nお尻の下にブロックを置いて、正しい姿勢を保ちつつ、少しずつ伸ばすかな…とは思っているのですが、なにかほかに効果的なものがあったらアドバイスをお願いします🙇‍♀️\nもしかして少しボールでリリースしてから伸ばしたほうが良いのですかね？？？", "question_author": "yukiyuki511927", "answer": "", "answer_authors": [], "date": "2026-06-07", "discord_url": "https://discord.com/channels/1441619538293686387/1444479247669530664/1513065306950471831", "reply_count": 0, "message_id": "1513065306950471831", "tags": ["LIVE回答", "お尻", "スワン", "リリース", "姿勢", "柔軟性", "膝"]}];

function renderTags() {
  const statusEl = document.getElementById("statusTags");
  const catEl = document.getElementById("categoryTags");

  statusEl.innerHTML = STATUS_TAGS.map(tag => {
    const count = QA_DATA.filter(qa => qa.tags.includes(tag)).length;
    return `<button class="tag-btn" data-tag="${tag}" onclick="toggleTag('${tag}')">
      ${tag} <span class="count">${count}</span>
    </button>`;
  }).join("");

  catEl.innerHTML = CATEGORY_TAGS.map(tag => {
    const count = QA_DATA.filter(qa => qa.tags.includes(tag)).length;
    return `<button class="tag-btn" data-tag="${tag}" onclick="toggleTag('${tag}')">
      ${tag} <span class="count">${count}</span>
    </button>`;
  }).join("");
}

function toggleTag(tag) {
  if (activeTags.has(tag)) {
    activeTags.delete(tag);
  } else {
    activeTags.add(tag);
  }
  document.querySelectorAll(".tag-btn").forEach(btn => {
    btn.classList.toggle("active", activeTags.has(btn.dataset.tag));
  });
  renderResults();
}

function filterQA() {
  let results = [...QA_DATA].sort((a, b) => b.date.localeCompare(a.date));

  // Filter by tags
  if (activeTags.size > 0) {
    results = results.filter(qa =>
      [...activeTags].every(tag => qa.tags.includes(tag))
    );
  }

  // Filter by search query
  if (searchQuery) {
    const keywords = searchQuery.split(/\s+/).filter(k => k.length > 0);
    results = results.filter(qa => {
      const text = (qa.question + " " + qa.answer).toLowerCase();
      return keywords.every(kw => text.includes(kw.toLowerCase()));
    });
  }

  return results;
}

function highlightText(text, maxLen) {
  if (!text) return "";
  let display = text;
  if (maxLen && display.length > maxLen) {
    display = display.substring(0, maxLen) + "...";
  }
  if (!searchQuery) return escapeHtml(display);

  const keywords = searchQuery.split(/\s+/).filter(k => k.length > 0);
  let result = escapeHtml(display);
  keywords.forEach(kw => {
    const re = new RegExp("(" + escapeRegex(escapeHtml(kw)) + ")", "gi");
    result = result.replace(re, "<mark>$1</mark>");
  });
  return result;
}

function escapeHtml(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

function escapeRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
}

function renderResults() {
  const filtered = filterQA();
  const el = document.getElementById("results");
  const infoEl = document.getElementById("resultsInfo");

  if (searchQuery || activeTags.size > 0) {
    infoEl.textContent = `${filtered.length} 件見つかりました`;
  } else {
    infoEl.textContent = `全 ${QA_DATA.length} 件のQ&A`;
  }

  if (filtered.length === 0) {
    el.innerHTML = `
      <div class="empty-state">
        <div class="icon">🔍</div>
        <p>該当するQ&Aが見つかりませんでした</p>
        <p style="margin-top:8px;font-size:0.85rem">
          キーワードを変えるか、質問部屋で直接質問してください
        </p>
      </div>`;
    return;
  }

  el.innerHTML = filtered.map((qa, i) => {
    const tagHtml = qa.tags.map(tag => {
      const color = TAG_COLORS[tag] || "#999";
      return `<span class="qa-tag" style="background:${color}">${tag}</span>`;
    }).join("");

    const hasAnswer = qa.answer && qa.answer.trim();
    const answerHtml = hasAnswer
      ? `<button class="qa-answer-toggle" onclick="toggleAnswer(this)">
           <span class="arrow">▶</span> 回答を見る
         </button>
         <div class="qa-answer" id="answer-${i}">
           <div class="qa-answer-label">回答</div>
           ${escapeHtml(qa.answer).replace(/\n/g, "<br>")}
         </div>`
      : `<div class="no-answer">💡 質疑応答LIVEで回答済み（テキスト回答なし）</div>`;

    return `
      <div class="qa-card">
        <div class="qa-question" onclick="toggleAnswer(this.parentElement.querySelector('.qa-answer-toggle'))">
          ${highlightText(qa.question, 200)}
        </div>
        <div class="qa-tags">${tagHtml}</div>
        <div class="qa-meta">
          <span class="author">👤 ${escapeHtml(qa.question_author)}</span>
          <span>📅 ${qa.date}</span>
          ${qa.reply_count > 0 ? `<span>💬 ${qa.reply_count}件の返信</span>` : ""}
        </div>
        ${answerHtml}
        <a class="discord-link" href="${qa.discord_url}" target="_blank" rel="noopener">
          🔗 Discordで見る
        </a>
      </div>`;
  }).join("");
}

function toggleAnswer(btn) {
  if (!btn) return;
  const answer = btn.nextElementSibling;
  if (!answer) return;
  const isOpen = answer.classList.contains("show");
  answer.classList.toggle("show");
  btn.classList.toggle("open");
  btn.innerHTML = isOpen
    ? '<span class="arrow">▶</span> 回答を見る'
    : '<span class="arrow">▶</span> 回答を閉じる';
}

// Start
init();
</script>
</body>
</html>
